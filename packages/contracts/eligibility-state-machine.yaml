$schema: ./schemas/state-machine-schema.yaml
version: "1.0"
domain: eligibility
apiSpec: eligibility-openapi.yaml

machines:
  # ---------------------------------------------------------------------------
  # Determination — aggregate tracking resolution across all program Decisions.
  # ---------------------------------------------------------------------------
  - object: Determination
    states:
      - id: in_progress
        slaClock: running
      - id: completed
        slaClock: stopped
      - id: withdrawn
        slaClock: stopped
    initialState: in_progress
    triggers:
      onCreate:
        actors:
          - system
        then:
          - set:
              field: pendingDecisions
              value: $object.programs.length
            description: Initialize the counter to the number of programs being evaluated
          - evaluate: create-decisions-rule
            description: Create one Decision per program
      onEvent:
        - name: intake.application.submitted
          then:
            - invoke:
                POST: eligibility/determinations
                body:
                  applicationId: $this.subject
                  programs: $this.data.programs
              description: |
                Create a Determination when an application is submitted. The Determination
                machine's onCreate then initializes pendingDecisions and creates one
                Decision per program.
        - name: intake.application.review_completed
          transition:
            from: in_progress
          guards:
            conditions:
              - callerIsSystem
          then:
            - evaluate: evaluate-final-determination-rule
              description: >
                Run final eligibility determination for all remaining pending Decisions
                after caseworker review is complete (42 CFR § 435.912)
        - name: eligibility.application.decision_completed
          transition:
            from: in_progress
          guards:
            conditions:
              - callerIsSystem
          then:
            - set:
                field: pendingDecisions
                value:
                  "-": [{var: "$object.pendingDecisions"}, 1]
              description: Decrement the counter now that one more Decision has reached a terminal state
            - evaluate: check-determination-completion-rule
              when:
                "==": [{var: "$object.pendingDecisions"}, 0]
              description: Complete the Determination when all Decisions are resolved
        - name: intake.application.withdrawn
          transition:
            from: in_progress
            to: withdrawn
          guards:
            conditions:
              - callerIsSystem
          then:
            - set:
                field: withdrawnAt
                value: $now
              description: |
                Record when the withdrawal occurred; already-resolved Decisions are preserved as the audit record
    operations:
      - name: flag-expedited
        transition:
          from: in_progress
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        then:
          - set:
              field: expeditedFlagged
              value: true
            description: Record that the household qualifies for expedited SNAP processing
          - emit:
              event: expedited
              data:
                flaggedAt: $now
                applicationId: $object.applicationId
                determinationId: $object.id
            description: |
              Emit eligibility.application.expedited — Intake stores the flag on the Application for caseworker display; Workflow switches the intake task to the expedited SLA track (7 CFR § 273.2(i))
      - name: complete
        transition:
          from: in_progress
          to: completed
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        then:
          - set:
              field: completedAt
              value: $now
            description: Record when all Decisions were resolved
          - emit:
              event: determination_completed
              data:
                completedAt: $now
                applicationId: $object.applicationId
                determinationId: $object.id
            description: |
              Emit eligibility.application.determination_completed — signals all person-program Decisions are resolved; Intake subscribes to close the application and trigger case creation

  # ---------------------------------------------------------------------------
  # Decision — one per program per Determination; tracks per-program outcome.
  # ---------------------------------------------------------------------------
  - object: Decision
    states:
      - id: pending
        slaClock: running
      - id: approved
        slaClock: stopped
      - id: denied
        slaClock: stopped
      - id: ineligible
        slaClock: stopped
    initialState: pending
    triggers:
      onCreate:
        actors:
          - system
        then:
          - evaluate: evaluate-snap-expedited-rule
            when:
              "==": [{var: "$object.program"}, "snap"]
            description: |
              Run expedited SNAP screening when a SNAP Decision is created. The adapter
              evaluates household income and resources against expedited criteria
              (7 CFR § 273.2(i)); if met, flags the Determination for expedited processing.
          - set:
              field: pendingChecks
              value: 2
            when:
              "==": [{var: "$object.program"}, "medicaid"]
            description: |
              Initialize the async data exchange counter for Medicaid Decisions. Two call
              groups are initiated (fdsh_fti and fdsh_medicare/fdsh_vci); each arriving
              data_exchange.call.completed event decrements this counter until ex parte
              evaluation can run.
          - evaluate: initiate-medicaid-data-exchange-rule
            when:
              "==": [{var: "$object.program"}, "medicaid"]
            description: |
              Initiate the two async data exchange call groups needed for Medicaid ex parte
              evaluation: MAGI income (fdsh_fti) and existing enrollment (fdsh_medicare,
              fdsh_vci). Results arrive as data_exchange.call.completed events carrying
              decisionId; each decrements pendingChecks on this Decision.
      onEvent:
        - name: data_exchange.call.completed
          transition:
            from: pending
          guards:
            conditions:
              - callerIsSystem
              - decisionIsForMedicaid
          then:
            - set:
                field: pendingChecks
                value:
                  "-": [{var: "$object.pendingChecks"}, 1]
              description: Decrement the counter as each async data exchange result arrives
            - evaluate: evaluate-medicaid-ex-parte-rule
              when:
                "==": [{var: "$object.pendingChecks"}, 0]
              description: |
                Run Medicaid ex parte evaluation when all data exchange results are in.
                The adapter evaluates MAGI income and existing coverage data and returns
                an outcome; the adapter triggers the corresponding Decision operation
                (42 CFR § 435.911).
    operations:
      - name: approve
        transition:
          from: pending
          to: approved
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        requestBody:
          type: object
          required:
            - path
          properties:
            path:
              type: string
              enum:
                - auto
                - manual
              description: Whether the Decision was reached automatically or by a caseworker
        then:
          - set:
              field: decidedAt
              value: $now
            description: Record when the Decision was finalized
          - set:
              field: path
              value: $request.path
            description: Record whether the Decision was reached automatically or by a caseworker
          - emit:
              event: decision_completed
              data:
                decidedAt: $now
                applicationId: $object.applicationId
                determinationId: $object.determinationId
                decisionId: $object.id
                program: $object.program
                status: approved
                path: $request.path
            description: |
              Emit eligibility.application.decision_completed — Intake subscribes to record the outcome per member per program; may fire at submission for Medicaid Decisions auto-resolved via ex parte evaluation
      - name: deny
        transition:
          from: pending
          to: denied
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        requestBody:
          type: object
          required:
            - path
            - denialReasonCode
          properties:
            path:
              type: string
              enum:
                - auto
                - manual
              description: Whether the Decision was reached automatically or by a caseworker
            denialReasonCode:
              type: string
              description: |
                Machine-readable denial reason code. Program-specific — defined at implementation from FNS code sets (SNAP) or CMS code sets (Medicaid)
        then:
          - set:
              field: decidedAt
              value: $now
            description: Record when the Decision was finalized
          - set:
              field: path
              value: $request.path
            description: Record whether the Decision was reached automatically or by a caseworker
          - set:
              field: denialReasonCode
              value: $request.denialReasonCode
            description: |
              Store the machine-readable denial reason; required for the Notice of Action and as the basis for any appeal (7 CFR § 273.2(h), 42 CFR § 435.917)
          - emit:
              event: decision_completed
              data:
                decidedAt: $now
                applicationId: $object.applicationId
                determinationId: $object.determinationId
                decisionId: $object.id
                program: $object.program
                status: denied
                path: $request.path
                denialReasonCode: $request.denialReasonCode
            description: |
              Emit eligibility.application.decision_completed — Intake subscribes to record the outcome per member per program
      - name: mark-ineligible
        transition:
          from: pending
          to: ineligible
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        requestBody:
          type: object
          required:
            - path
            - denialReasonCode
          properties:
            path:
              type: string
              enum:
                - auto
                - manual
              description: Whether the Decision was reached automatically or by a caseworker
            denialReasonCode:
              type: string
              description: |
                Machine-readable categorical ineligibility code (e.g., citizenship bar, age limit). Program-specific — defined at implementation
        then:
          - set:
              field: decidedAt
              value: $now
            description: Record when the Decision was finalized
          - set:
              field: path
              value: $request.path
            description: Record whether the Decision was reached automatically or by a caseworker
          - set:
              field: denialReasonCode
              value: $request.denialReasonCode
            description: |
              Store the categorical ineligibility reason code (e.g., citizenship bar for SNAP, age limit for TANF)
          - emit:
              event: decision_completed
              data:
                decidedAt: $now
                applicationId: $object.applicationId
                determinationId: $object.determinationId
                decisionId: $object.id
                program: $object.program
                status: ineligible
                path: $request.path
                denialReasonCode: $request.denialReasonCode
            description: |
              Emit eligibility.application.decision_completed — Intake subscribes to record the outcome per member per program

# ---------------------------------------------------------------------------
# Domain-level guards — shared across Determination and Decision machines.
# ---------------------------------------------------------------------------
guards:
  - id: callerIsSystem
    field: $caller.roles
    operator: contains_any
    value:
      - system
  - id: decisionIsForMedicaid
    field: program
    operator: equals
    value: medicaid

# ---------------------------------------------------------------------------
# Rules — named procedures called from machine triggers and operations.
# ---------------------------------------------------------------------------
rules:
  # ---------------------------------------------------------------------------
  # Create one Decision per program when a Determination is created.
  # Called from Determination triggers.onCreate.
  # ---------------------------------------------------------------------------
  - id: create-decisions-rule
    evaluation: all-match
    conditions:
      - id: create-decision-per-program
        order: 1
        condition: true
        then:
          - forEach:
              in: {var: "$object.programs"}
              as: program
              invoke:
                POST: eligibility/determinations/decisions
                body:
                  applicationId: {var: "$object.applicationId"}
                  determinationId: {var: "$object.id"}
                  program: {var: "program"}
        description: Create one Decision per program in the application

  # ---------------------------------------------------------------------------
  # Run expedited SNAP screening when a SNAP Decision is created.
  # Called from Decision triggers.onCreate when program == snap.
  # ---------------------------------------------------------------------------
  - id: evaluate-snap-expedited-rule
    evaluation: first-match-wins
    conditions:
      - id: call-snap-expedited-adapter
        order: 1
        condition: true
        then:
          - invoke:
              POST: eligibility/adapter/snap-expedited
              body:
                determinationId: $object.determinationId
                applicationId: $object.applicationId
        description: |
          Call the SNAP expedited screening adapter with the household's income and
          resource data. If the household meets expedited criteria (7 CFR § 273.2(i)),
          the adapter triggers the flag-expedited operation on the Determination.

  # ---------------------------------------------------------------------------
  # Initiate the two async data exchange call groups needed for Medicaid ex parte.
  # Called from Decision triggers.onCreate when program == medicaid.
  # ---------------------------------------------------------------------------
  - id: initiate-medicaid-data-exchange-rule
    evaluation: all-match
    conditions:
      - id: initiate-magi-income-check
        order: 1
        condition: true
        then:
          - invoke:
              POST: data-exchange/service-calls
              body:
                serviceType: fdsh_fti
                decisionId: $object.id
                applicationId: $object.applicationId
        description: |
          Initiate MAGI income check via FDSH FTI. Results arrive asynchronously as
          data_exchange.call.completed events carrying decisionId, which decrement
          pendingChecks on the Medicaid Decision (42 CFR § 435.940).
      - id: initiate-existing-coverage-check
        order: 2
        condition: true
        then:
          - invoke:
              POST: data-exchange/service-calls
              body:
                serviceType: fdsh_medicare_vci
                decisionId: $object.id
                applicationId: $object.applicationId
        description: |
          Initiate existing enrollment checks via FDSH Medicare and VCI, combined into
          one service call group. Results arrive as data_exchange.call.completed events
          (42 CFR § 435.916).

  # ---------------------------------------------------------------------------
  # Call the Medicaid ex parte adapter after all data exchange results are in.
  # Called from Decision triggers.onEvent data_exchange.call.completed when pendingChecks == 0.
  # ---------------------------------------------------------------------------
  - id: evaluate-medicaid-ex-parte-rule
    evaluation: first-match-wins
    conditions:
      - id: call-ex-parte-adapter
        order: 1
        condition: true
        then:
          - invoke:
              POST: eligibility/adapter/medicaid-ex-parte
              body:
                decisionId: $object.id
                determinationId: $object.determinationId
                applicationId: $object.applicationId
        description: |
          Call the Medicaid ex parte adapter with the data exchange results. The adapter
          evaluates MAGI income (fdsh_fti) and existing coverage (fdsh_medicare, fdsh_vci)
          and returns an outcome. The adapter triggers the corresponding Decision operation
          (approve, deny, or mark-ineligible) with path: auto (42 CFR § 435.911).

  # ---------------------------------------------------------------------------
  # Call the final determination adapter for each remaining pending Decision
  # after caseworker review is complete (42 CFR § 435.912).
  # Called from Determination triggers.onEvent intake.application.review_completed.
  # ---------------------------------------------------------------------------
  - id: evaluate-final-determination-rule
    context:
      - decisions:
          from: eligibility/determinations/decisions
          where:
            determinationId: $object.id
    evaluation: all-match
    conditions:
      - id: call-final-determination-per-pending-decision
        order: 1
        condition: true
        then:
          - forEach:
              in: {var: "$decisions"}
              as: decision
              filter: {"==": [{var: "decision.status"}, "pending"]}
              invoke:
                POST: eligibility/adapter/final-determination
                body:
                  decisionId: {var: "decision.id"}
                  determinationId: $object.id
                  applicationId: $object.applicationId
                  program: {var: "decision.program"}
        description: |
          Call the final determination adapter for each pending Decision. The adapter
          evaluates all submitted documentation and caseworker notes to produce a final
          approve, deny, or ineligible outcome for each program (42 CFR § 435.912).

  # ---------------------------------------------------------------------------
  # Complete the Determination when all Decisions are resolved.
  # Called from Determination triggers.onEvent eligibility.application.decision_completed
  # when pendingDecisions has reached zero.
  # ---------------------------------------------------------------------------
  - id: check-determination-completion-rule
    evaluation: first-match-wins
    conditions:
      - id: complete-if-all-resolved
        order: 1
        condition:
          "==": [{var: "$object.pendingDecisions"}, 0]
        then:
          - invoke:
              POST: eligibility/determinations/{object.id}/complete
        description: |
          Complete the Determination when all Decisions have reached a terminal state.
          For Medicaid-only applications with conclusive ex parte results, this closes
          the Determination automatically at submission without caseworker intervention
          (42 CFR § 435.916).
