$schema: ./schemas/state-machine-schema.yaml
extends: ./platform-state-machine.yaml
version: "1.0"
domain: eligibility
apiSpec: eligibility-openapi.yaml
eventsSpec: eligibility-asyncapi.yaml

machines:
  # ---------------------------------------------------------------------------
  # Determination — aggregate tracking resolution across all program Decisions.
  # ---------------------------------------------------------------------------
  - object: Determination
    states:
      - {id: in_progress, slaClock: running}
      - {id: completed, slaClock: stopped}
      - {id: withdrawn, slaClock: stopped}
    initialState: in_progress
    actions:
      - id: flag-expedited
        description: "POST /determinations/{determinationId}/flag-expedited — System flags a Determination as qualifying for expedited SNAP processing"
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: in_progress}
        steps:
          - set: {field: expeditedFlagged, value: true, description: Record that the household qualifies for expedited SNAP processing}
          - emit: {type: eligibility.application.expedited, subject: $object.applicationId, description: "Emit eligibility.application.expedited — Intake stores the flag; Workflow switches the intake task to the expedited SLA track (7 CFR § 273.2(i))"}
      - id: complete
        description: "POST /determinations/{determinationId}/complete — System marks a Determination as complete after all program Decisions are resolved"
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: in_progress, to: completed}
        steps:
          - set: {field: completedAt, value: $now, description: Record when all Decisions were resolved}
          - emit: {type: eligibility.application.determination_completed, subject: $object.applicationId, description: "Emit eligibility.application.determination_completed — signals all program Decisions are resolved; Intake subscribes to close the application"}
      - id: evaluate
        description: "POST /determinations/{determinationId}/evaluate — Run eligibility determination for all pending Decisions; trial runs project outcomes without changing Decision state or emitting decision_completed events"
        schema:
          request:
            $ref: '#/$defs/EvaluateDeterminationRequest'
        guards:
          - actors: [system, case_worker]
            conditions: [{any: [callerIsSystem, callerIsCaseworker]}]
        transition: {from: in_progress}
        context:
          - determination: {from: eligibility/determinations, where: {id: $object.id}}
        steps:
          - call: evaluateDetermination
            with: {runType: $request.runType}
      - id: withdraw
        description: "POST /determinations/{determinationId}/withdraw — System withdraws a Determination when the associated application is withdrawn"
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: in_progress, to: withdrawn}
        steps:
          - set: {field: withdrawnAt, value: $now, description: Record when the withdrawal occurred; already-resolved Decisions are preserved as the audit record}
          - emit: {type: eligibility.determination.withdrawn, subject: $object.applicationId}
    events:
      - type: intake.application.submitted
        description: Create a Determination, seed pending Decisions for each member and program, and run expedited SNAP screening when an application is submitted
        steps:
          - call: {POST: eligibility/determinations, body: {applicationId: $this.subject, programs: $this.data.programs, status: in_progress}, description: Create a Determination for the submitted application}
          - call: seedDecisions
            with: {applicationId: $this.subject}
          - if: '"snap" in $this.data.programs'
            then:
              - call: evaluateSnapExpedited
                with: {applicationId: $this.subject}
      - type: intake.application_member.created
        description: Seed a pending Decision per program when a member is added to a submitted application
        context:
          - application: {from: intake/applications, where: {id: $this.subject}}
          - determination: {from: eligibility/determinations, where: {applicationId: $this.subject}}
        steps:
          - if: $application.status != "draft" && $application.status != "withdrawn" && $application.status != "closed"
            then:
              - forEach:
                  in: $this.data.programs
                  as: program
                do:
                  - call: {POST: eligibility/determinations/decisions, body: {determinationId: $determination.id, applicationId: $application.id, memberId: $this.data.id, program: $program, status: pending}, description: Seed a pending Decision for the new member per program}
      - type: intake.application.review_completed
        description: Run final eligibility determination for all remaining pending Decisions after caseworker review is complete (42 CFR § 435.912)
        context:
          - determination: {from: eligibility/determinations, where: {applicationId: $this.subject}}
        steps:
          - call: evaluateDetermination
            with: {runType: official}
      - type: eligibility.application.decision_completed
        context:
          - pendingDecision: {from: eligibility/determinations/decisions, where: {determinationId: $this.data.determinationId, status: pending}}
        steps:
          - if: '$pendingDecision == null'
            then: [{call: {POST: eligibility/determinations/$this.data.determinationId/complete, description: Complete the Determination when all program Decisions are resolved}}]
      - type: intake.application.withdrawn
        context:
          - determination: {from: eligibility/determinations, where: {applicationId: $this.subject}}
        steps:
          - if: '$determination.id != null'
            then: [{call: {POST: eligibility/determinations/$determination.id/withdraw, description: Withdraw the Determination; already-resolved Decisions are preserved as the audit record}}]
    procedures:
      - id: evaluateDetermination
        description: >
          Refresh the EligibilitySnapshot, then call the determination adapter for each remaining
          pending Decision (42 CFR § 435.912). Official runs allow the adapter to approve, deny,
          or mark-ineligible each Decision; trial runs return projected outcomes without changing
          Decision state or emitting decision_completed events.

          Correlation IDs (decisionId, determinationId) are passed in metadata so the adapter
          can echo them back for response correlation. For household programs (snap), the platform
          flattens per-member verificationSummary arrays and adds memberId to each entry before
          sending — exact assembly rules are specified in issue #353.
        parameters: [runType]
        steps:
          - call: {PUT: intake/applications/$determination.applicationId/eligibility-snapshot, as: snapshot, description: Refresh and capture the current EligibilitySnapshot}
          - forEach:
              from: eligibility/determinations/decisions
              where: {determinationId: $determination.id, status: pending}
              as: decision
            do:
              - if: $decision.program == "snap"
                then:
                  - call:
                      POST: eligibility-adapter/evaluate/determination
                      body:
                        metadata: {decisionId: $decision.id, determinationId: $determination.id}
                        program: $decision.program
                        runType: $params.runType
                        members: "$snapshot.members[*].memberSnapshot"
                        household: $snapshot.householdSnapshot
                        verificationSummary: "$snapshot.members[*].verificationSummary"
                else:
                  - forEach:
                      in: $snapshot.members
                      where: {memberId: $decision.memberId}
                      as: snapshotMember
                    do:
                      - call:
                          POST: eligibility-adapter/evaluate/determination
                          body:
                            metadata: {decisionId: $decision.id, determinationId: $determination.id}
                            program: $decision.program
                            runType: $params.runType
                            member: $snapshotMember.memberSnapshot
                            verificationSummary: $snapshotMember.verificationSummary
      - id: evaluateSnapExpedited
        description: "Call the SNAP expedited screening adapter; if criteria are met, the adapter triggers flag-expedited on the Determination (7 CFR § 273.2(i))"
        parameters: [applicationId]
        context:
          - determination: {from: eligibility/determinations, where: {applicationId: $params.applicationId}}
        steps:
          - call: {POST: eligibility-adapter/evaluate/expedited-screening, body: {determinationId: $determination.id, applicationId: $determination.applicationId}}
      - id: seedDecisions
        description: Seed one pending Decision per household member per applied-for program for a Determination
        parameters: [applicationId]
        context:
          - determination: {from: eligibility/determinations, where: {applicationId: $params.applicationId}}
        steps:
          - forEach:
              from: intake/application-members
              where: {applicationId: $params.applicationId}
              as: member
            do:
              - forEach:
                  in: $member.programs
                  as: program
                do:
                  - call: {POST: eligibility/determinations/decisions, body: {determinationId: $determination.id, applicationId: $params.applicationId, memberId: $member.id, program: $program, status: pending}, description: Seed a pending Decision for each member/program combination}

  # ---------------------------------------------------------------------------
  # Decision — one per program per Determination; tracks per-program outcome.
  # ---------------------------------------------------------------------------
  - object: Decision
    states:
      - {id: pending, slaClock: running}
      - {id: approved, slaClock: stopped}
      - {id: denied, slaClock: stopped}
      - {id: ineligible, slaClock: stopped}
    initialState: pending
    actions:
      - id: approve
        description: "POST /determinations/{determinationId}/decisions/{decisionId}/approve — System approves a Decision after automatic or caseworker review"
        schema:
          request:
            $ref: '#/$defs/ApproveDecisionRequest'
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: pending, to: approved}
        steps:
          - set: {field: decidedAt, value: $now, description: Record when the Decision was finalized}
          - set: {field: path, value: $request.path, description: Record whether the Decision was reached automatically or by a caseworker}
          - emit: {type: eligibility.application.decision_completed, data: {determinationId: $object.determinationId, memberId: $object.memberId, program: $object.program, status: approved, path: $request.path}, description: "Emit eligibility.application.decision_completed — Intake records the outcome per member; Determination checks if all Decisions are resolved"}
      - id: deny
        description: "POST /determinations/{determinationId}/decisions/{decisionId}/deny — System denies a Decision based on failing eligibility criteria"
        schema:
          request:
            $ref: '#/$defs/DenyDecisionRequest'
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: pending, to: denied}
        steps:
          - set: {field: decidedAt, value: $now}
          - set: {field: path, value: $request.path}
          - set: {field: denialReasonCode, value: $request.denialReasonCode, description: "Store the machine-readable denial reason; required for the Notice of Action and appeal basis (7 CFR § 273.2(h), 42 CFR § 435.917)"}
          - emit: {type: eligibility.application.decision_completed, data: {determinationId: $object.determinationId, memberId: $object.memberId, program: $object.program, status: denied, path: $request.path, denialReasonCode: $request.denialReasonCode}}
      - id: mark-ineligible
        description: "POST /determinations/{determinationId}/decisions/{decisionId}/mark-ineligible — System marks a Decision as categorically ineligible"
        schema:
          request:
            $ref: '#/$defs/MarkIneligibleRequest'
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: pending, to: ineligible}
        steps:
          - set: {field: decidedAt, value: $now}
          - set: {field: path, value: $request.path}
          - set: {field: denialReasonCode, value: $request.denialReasonCode, description: "Store the categorical ineligibility reason code (e.g., citizenship bar for SNAP, age limit for TANF)"}
          - emit: {type: eligibility.application.decision_completed, data: {determinationId: $object.determinationId, memberId: $object.memberId, program: $object.program, status: ineligible, path: $request.path, denialReasonCode: $request.denialReasonCode}}
    events:
      - type: eligibility.decision.created
        description: Initiate Medicaid data exchange when a Medicaid Decision is created
        steps:
          - if: $object.program == "medicaid"
            then:
              - call: initiateMedicaidDataExchange
      - type: data_exchange.call.completed
        description: Run Medicaid ex parte evaluation when all data exchange results for a Decision are in (42 CFR § 435.911)
        steps:
          - call: evaluateMedicaidExParte
    procedures:
      - id: initiateMedicaidDataExchange
        description: Initiate async data exchange for Medicaid ex parte — MAGI income check (FDSH FTI) and existing enrollment check (FDSH Medicare/VCI) (42 CFR § 435.940, 42 CFR § 435.916)
        steps:
          - call: {POST: data-exchange/service-calls, body: {serviceType: fdsh_fti, decisionId: $object.id, applicationId: $object.applicationId}}
          - call: {POST: data-exchange/service-calls, body: {serviceType: fdsh_medicare_vci, decisionId: $object.id, applicationId: $object.applicationId}}
      - id: evaluateMedicaidExParte
        description: Call the Medicaid ex parte adapter when all data exchange results for a Decision are in; adapter triggers approve, deny, or mark-ineligible (42 CFR § 435.911)
        context:
          - decision: {from: eligibility/determinations/decisions, where: {id: $this.data.decisionId}}
          - pendingCall: {from: data-exchange/service-calls, where: {decisionId: $this.data.decisionId, status: pending}}
        if: '$decision.id != null && $decision.program == "medicaid" && $pendingCall == null'
        then:
          - call: {POST: eligibility-adapter/evaluate/medicaid-ex-parte, body: {decisionId: $decision.id, determinationId: $decision.determinationId, applicationId: $decision.applicationId}}

$defs:
  EvaluateDeterminationRequest:
    type: object
    required:
      - runType
    properties:
      runType:
        type: string
        enum:
          - trial
          - official
        description: >
          Whether to run a trial (projected outcomes only) or an official evaluation
          (updates Decision status and emits decision_completed events). Trial runs allow
          caseworkers to preview outcomes without committing; official runs finalize the determination.

  ApproveDecisionRequest:
    type: object
    required:
      - path
    properties:
      path:
        type: string
        enum:
          - auto
          - manual
        description: Whether the Decision was reached automatically (ex parte) or by a caseworker

  DenyDecisionRequest:
    type: object
    required:
      - path
      - denialReasonCode
    properties:
      path:
        type: string
        enum:
          - auto
          - manual
        description: Whether the Decision was reached automatically (ex parte) or by a caseworker
      denialReasonCode:
        type: string
        description: Machine-readable denial reason code. Program-specific — defined at implementation from FNS code sets (SNAP) or CMS code sets (Medicaid)

  MarkIneligibleRequest:
    type: object
    required:
      - path
      - denialReasonCode
    properties:
      path:
        type: string
        enum:
          - auto
          - manual
        description: Whether the Decision was reached automatically (ex parte) or by a caseworker
      denialReasonCode:
        type: string
        description: Machine-readable categorical ineligibility code (e.g., citizenship bar, age limit). Program-specific — defined at implementation
