$schema: ./schemas/state-machine-schema.yaml
version: "1.0"
domain: workflow
apiSpec: workflow-openapi.yaml
machines:
  - object: Task
    states:
      - id: pending
        slaClock: running
      - id: in_progress
        slaClock: running
      - id: completed
        slaClock: stopped
      - id: escalated
        slaClock: running
      - id: cancelled
        slaClock: stopped
      - id: awaiting_client
        slaClock: paused
      - id: awaiting_verification
        slaClock: paused
      - id: pending_review
        slaClock: running
    initialState: pending
    triggers:
      onCreate:
        then:
          - evaluate: assignment-rule
            description: Route task to a queue based on subject and program
          - evaluate: priority-rule
            description: Set task priority on creation
      onUpdate:
        fields:
          - isExpedited
          - programType
          - queueId
        then:
          - evaluate: priority-rule
            description: Re-evaluate priority when expedited status or program type changes
          - evaluate: assignment-rule
            description: Re-evaluate assignment when queue or program type changes
      onEvent:
        - name: intake.application.submitted
          then:
            - invoke:
                POST: workflow/tasks
                body:
                  taskType: application_review
                  name: Application review
                  status: pending
                  subjectType: application
                  subjectId: $this.subject
              description: Create an intake review task when an application is submitted
      onTimer:
        - after: 72h
          relativeTo: createdAt
          calendarType: business
          transition:
            from: pending
            to: escalated
          then:
            - evaluate: priority-rule
              description: Re-evaluate priority on auto-escalation
            - emit:
                event: auto_escalated
                data:
                  reason: deadline_exceeded
              description: Emit a domain event recording the automatic escalation
        - after: "-48h"
          relativeTo: slaDeadline
          calendarType: calendar
          transition:
            from: in_progress
            to: escalated
          then:
            - evaluate: priority-rule
              description: Re-evaluate priority on SLA warning escalation
            - emit:
                event: auto_escalated
                data:
                  reason: sla_deadline_approaching
              description: Emit a domain event recording the SLA-triggered escalation
        - after: 0h
          relativeTo: slaDeadline
          calendarType: calendar
          transition:
            from:
              - pending
              - in_progress
              - escalated
            to: escalated
          then:
            - evaluate: priority-rule
              description: Re-evaluate priority on SLA breach
            - emit:
                event: sla_breached
                data:
                  reason: sla_deadline_exceeded
              description: Emit a domain event recording the SLA deadline breach for federal compliance reporting
        - after: 30d
          relativeTo: blockedAt
          calendarType: calendar
          transition:
            from: awaiting_client
            to: cancelled
          then:
            - set:
                field: cancelledAt
                value: $now
              description: Record when the task was automatically cancelled
            - emit:
                event: auto_cancelled
                data:
                  reason: client_unresponsive
              description: Emit a domain event recording the automatic cancellation
        - after: 7d
          relativeTo: blockedAt
          calendarType: calendar
          transition:
            from: awaiting_verification
            to: in_progress
          then:
            - set:
                field: blockedAt
                value: null
              description: Clear the block timestamp on auto-resume
            - emit:
                event: auto_resumed
                data:
                  reason: verification_timeout
              description: Emit a domain event recording the automatic resumption
    operations:
      - name: claim
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - taskIsUnassigned
        transition:
          from: pending
          to: in_progress
        then:
          - set:
              field: assignedToId
              value: $caller.id
            description: Assign task to the claiming worker
          - emit:
              event: claimed
              data:
                assignedToId: $caller.id
            description: Emit a domain event recording the claim and who claimed the task
      - name: complete
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - callerIsAssignedWorker
        transition:
          from: in_progress
          to: completed
        requestBody:
          type: object
          required:
            - outcome
          properties:
            outcome:
              type: string
              description: Completion outcome (e.g., approved, denied)
            notes:
              type: string
              description: Optional notes about the completion
            createFollowUp:
              type: boolean
              description: When true, a follow-up task is automatically created
        then:
          - set:
              field: completedAt
              value: $now
            description: Record when work finished
          - set:
              field: outcome
              value: $request.outcome
            description: Store the completion outcome from the request
          - set:
              field: completionNotes
              value: $request.notes
            description: Store optional completion notes from the request
          - emit:
              event: completed
              data:
                outcome: $request.outcome
            description: Emit a domain event recording the completion and its outcome
          - invoke: workflow/tasks
            body:
              name: $object.name
              description: $object.description
              subjectType: $object.subjectType
              subjectId: $object.subjectId
              programType: $object.programType
              isExpedited: $object.isExpedited
              status: pending
            when:
              "==":
                - var: $request.createFollowUp
                - true
            description: Create a follow-up task when the caller requests one
      - name: release
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - callerIsAssignedWorker
        transition:
          from: in_progress
          to: pending
        requestBody:
          type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Why the task is being released
        then:
          - set:
              field: assignedToId
              value: null
            description: Clear assignment so task returns to queue
          - emit:
              event: released
              data:
                reason: $request.reason
            description: Emit a domain event recording the release and its reason
          - evaluate: assignment-rule
            description: Re-evaluate assignment rules after release
          - evaluate: priority-rule
            description: Re-evaluate priority rules after release
      - name: escalate
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - any:
                - callerIsAssignedWorker
                - callerIsSupervisor
        transition:
          from: in_progress
          to: escalated
        requestBody:
          type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Why the task is being escalated
        then:
          - set:
              field: escalatedAt
              value: $now
            description: Record when the task was escalated
          - evaluate: priority-rule
            description: Re-evaluate priority after escalation
          - emit:
              event: escalated
              data:
                reason: $request.reason
            description: Emit a domain event recording the escalation
      - name: escalate
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from: pending
          to: escalated
        requestBody:
          type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Why the task is being escalated
        then:
          - set:
              field: escalatedAt
              value: $now
            description: Record when the task was escalated
          - evaluate: priority-rule
            description: Re-evaluate priority after escalation
          - emit:
              event: escalated
              data:
                reason: $request.reason
            description: Emit a domain event recording the escalation
      - name: de-escalate
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from: escalated
          to: pending
        requestBody:
          type: object
          properties:
            notes:
              type: string
              description: Optional notes about the de-escalation
        then:
          - evaluate: assignment-rule
            description: Re-evaluate assignment rules after de-escalation
          - evaluate: priority-rule
            description: Re-evaluate priority rules after de-escalation
          - emit:
              event: de-escalated
            description: Emit a domain event recording the de-escalation
      - name: cancel
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from:
            - pending
            - in_progress
            - escalated
          to: cancelled
        requestBody:
          type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Why the task is being cancelled
        then:
          - set:
              field: cancelledAt
              value: $now
            description: Record when the task was cancelled
          - emit:
              event: cancelled
              data:
                reason: $request.reason
            description: Emit a domain event recording the cancellation
      - name: reopen
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from: cancelled
          to: pending
        requestBody:
          type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Why the cancelled task is being reopened
        then:
          - set:
              field: cancelledAt
              value: null
            description: Clear the cancellation timestamp on reopen
          - evaluate: assignment-rule
            description: Re-evaluate assignment rules after reopen
          - evaluate: priority-rule
            description: Re-evaluate priority rules after reopen
          - emit:
              event: reopened
              data:
                reason: $request.reason
            description: Emit a domain event recording the reopen
      - name: await-client
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - callerIsAssignedWorker
        transition:
          from: in_progress
          to: awaiting_client
        requestBody:
          type: object
          properties:
            notes:
              type: string
              description: Optional context about what action is being awaited from the client
        then:
          - set:
              field: blockedAt
              value: $now
            description: Record when the task entered a waiting state
          - emit:
              event: awaiting_client
            description: Emit a domain event recording the block
      - name: await-verification
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - callerIsAssignedWorker
        transition:
          from: in_progress
          to: awaiting_verification
        requestBody:
          type: object
          properties:
            notes:
              type: string
              description: Optional context about what external verification is pending
        then:
          - set:
              field: blockedAt
              value: $now
            description: Record when the task entered a waiting state
          - emit:
              event: awaiting_verification
            description: Emit a domain event recording the block
      - name: resume
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - any:
                - callerIsAssignedWorker
                - callerIsSupervisor
        transition:
          from:
            - awaiting_client
            - awaiting_verification
          to: in_progress
        then:
          - set:
              field: blockedAt
              value: null
            description: Clear the block timestamp on resume
          - emit:
              event: resumed
            description: Emit a domain event recording the resumption
      - name: system-resume
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        transition:
          from: awaiting_verification
          to: in_progress
        requestBody:
          type: object
          required:
            - source
          properties:
            source:
              type: string
              description: The verification service that returned results (e.g., IEVS, FDSH)
            result:
              type: string
              description: Summary of the verification result
        then:
          - set:
              field: blockedAt
              value: null
            description: Clear the block timestamp on system resume
          - emit:
              event: system_resumed
              data:
                source: $request.source
                result: $request.result
            description: Emit a domain event recording the automated resumption and its result
      - name: submit-for-review
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - callerIsAssignedWorker
        transition:
          from:
            - in_progress
            - escalated
          to: pending_review
        then:
          - emit:
              event: submitted_for_review
            description: Emit a domain event recording the submission for review
      - name: approve
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from: pending_review
          to: completed
        requestBody:
          type: object
          required:
            - outcome
          properties:
            outcome:
              type: string
              description: Completion outcome (e.g., approved, denied)
            notes:
              type: string
              description: Optional notes from the supervisor
        then:
          - set:
              field: completedAt
              value: $now
            description: Record when work was approved and completed
          - set:
              field: outcome
              value: $request.outcome
            description: Store the outcome from the supervisor's approval
          - set:
              field: completionNotes
              value: $request.notes
            description: Store optional notes from the supervisor
          - emit:
              event: approved
              data:
                outcome: $request.outcome
            description: Emit a domain event recording the approval
      - name: return-to-worker
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from: pending_review
          to: in_progress
        requestBody:
          type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Why the work is being returned for revision
        then:
          - emit:
              event: returned_to_worker
              data:
                reason: $request.reason
            description: Emit a domain event recording the return for revision
      - name: assign
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from:
            - pending
            - in_progress
            - escalated
            - awaiting_client
            - awaiting_verification
            - pending_review
        requestBody:
          type: object
          required:
            - assignedToId
          properties:
            assignedToId:
              type: string
              format: uuid
              description: ID of the caseworker to assign the task to
            queueId:
              type: string
              format: uuid
              description: Optional queue to move the task to
        then:
          - set:
              field: assignedToId
              value: $request.assignedToId
            description: Assign the task to the specified caseworker
          - set:
              field: queueId
              value: $request.queueId
            description: Optionally move the task to a different queue
          - emit:
              event: assigned
              data:
                assignedToId: $request.assignedToId
                queueId: $request.queueId
            description: Emit a domain event recording the assignment
      - name: set-priority
        guards:
          actors:
            - supervisor
          conditions:
            - callerIsSupervisor
        transition:
          from:
            - pending
            - in_progress
            - escalated
            - awaiting_client
            - awaiting_verification
            - pending_review
        requestBody:
          type: object
          required:
            - priority
          properties:
            priority:
              type: string
              enum:
                - expedited
                - high
                - normal
              description: New priority level for the task
            reason:
              type: string
              description: Optional reason for the priority change
        then:
          - set:
              field: priority
              value: $request.priority
            description: Override the task priority
          - emit:
              event: priority_changed
              data:
                priority: $request.priority
                reason: $request.reason
            description: Emit a domain event recording the priority change
guards:
  - id: taskIsUnassigned
    field: assignedToId
    operator: is_null
  - id: callerIsAssignedWorker
    field: assignedToId
    operator: equals
    value: $caller.id
  - id: callerIsSupervisor
    field: $caller.roles
    operator: contains_any
    value:
      - supervisor
  - id: callerIsSystem
    field: $caller.roles
    operator: contains_any
    value:
      - system
rules:
  - id: assignment-rule
    context:
      - application:
          from: intake/applications
          where:
            id: $object.subjectId
          optional: true
      - snapQueue:
          from: workflow/queues
          where:
            name: snap-intake
          optional: true
      - generalQueue:
          from: workflow/queues
          where:
            name: general-intake
          optional: true
    evaluation: first-match-wins
    conditions:
      - id: snap-only-to-snap-queue
        order: 1
        condition:
          and:
            - "==":
                - var: $application.programs.length
                - 1
            - in:
                - snap
                - var: $application.programs
            - "!=":
                - var: $snapQueue
                - null
        then:
          - set:
              field: queueId
              value: $snapQueue.id
        description: Route SNAP-only applications to the SNAP intake queue. Falls through when snapQueue is unavailable.
      - id: default-to-general-queue
        order: 2
        condition: true
        then:
          - set:
              field: queueId
              value: $generalQueue.id
        description: Route all other tasks to the general intake queue.
  - id: priority-rule
    evaluation: first-match-wins
    conditions:
      - id: expedited-flag
        order: 1
        condition:
          "==":
            - var: $object.isExpedited
            - true
        then:
          - set:
              field: priority
              value: expedited
        description: Set expedited priority when the task is flagged as expedited.
      - id: default-priority
        order: 2
        condition: true
        then:
          - set:
              field: priority
              value: normal
        description: Set normal priority for all other tasks.
