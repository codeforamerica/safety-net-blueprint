$schema: ./schemas/state-machine-schema.yaml
extends: ./platform-state-machine.yaml
version: "1.0"
domain: workflow
apiSpec: workflow-openapi.yaml
eventsSpec: workflow-asyncapi.yaml
machines:
  - object: Task
    states:
      - {id: pending, slaClock: running}
      - {id: in_progress, slaClock: running}
      - {id: completed, slaClock: stopped}
      - {id: escalated, slaClock: running}
      - {id: cancelled, slaClock: stopped}
      - {id: awaiting_client, slaClock: paused}
      - {id: awaiting_verification, slaClock: paused}
      - {id: pending_review, slaClock: running}
    initialState: pending
    actions:
      - id: claim
        description: "POST /tasks/{taskId}/claim — Caseworker takes ownership of an unassigned pending task"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [taskIsUnassigned]
        transition: {from: pending, to: in_progress}
        steps:
          - set: {field: assignedToId, value: $caller.id, description: Assign task to the claiming worker}
          - emit: {type: workflow.task.claimed, data: {assignedToId: $caller.id}, description: Emit a domain event recording the claim and who claimed the task}
      - id: complete
        description: "POST /tasks/{taskId}/complete — Marks an in-progress task done with an outcome and optional notes"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [callerIsAssignedWorker]
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: in_progress, to: completed}
        schema:
          request:
            $ref: "#/$defs/CompleteTaskRequest"
        steps:
          - set: {field: completedAt, value: $now, description: Record when work finished}
          - set: {field: outcome, value: $request.outcome, description: Store the completion outcome from the request}
          - set: {field: completionNotes, value: $request.notes, description: Store optional completion notes from the request}
          - emit: {type: workflow.task.completed, data: {outcome: $request.outcome}, description: Emit a domain event recording the completion and its outcome}
          - if: $request.createFollowUp == true
            then: [{call: {POST: workflow/tasks, body: {$merge: $object, status: pending}}, description: Create a follow-up task when caller requests one}]
      - id: release
        description: "POST /tasks/{taskId}/release — Returns an in-progress task to the queue, clearing the assignment"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [callerIsAssignedWorker]
        transition: {from: in_progress, to: pending}
        schema:
          request:
            $ref: "#/$defs/ReleaseTaskRequest"
        steps:
          - set: {field: assignedToId, value: null, description: Clear assignment so task returns to queue}
          - emit: {type: workflow.task.released, data: {reason: $request.reason}, description: Emit a domain event recording the release and its reason}
          - call: assignToQueue
          - call: setPriority
      - id: escalate
        description: "POST /tasks/{taskId}/escalate — Escalate a task; assigned workers can escalate in-progress tasks, supervisors can escalate from any state"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [callerIsAssignedWorker]
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
        transition: {from: [pending, in_progress], to: escalated}
        schema:
          request:
            $ref: "#/$defs/EscalateTaskRequest"
        steps:
          - set: {field: escalatedAt, value: $now, description: Record when the task was escalated}
          - call: setPriority
          - emit: {type: workflow.task.escalated, data: {reason: $request.reason}, description: Emit a domain event recording the escalation}
      - id: de-escalate
        description: "POST /tasks/{taskId}/de-escalate — Returns an escalated task to the pending queue"
        guards:
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
        transition: {from: escalated, to: pending}
        schema:
          request:
            $ref: "#/$defs/DeEscalateTaskRequest"
        steps:
          - call: assignToQueue
          - call: setPriority
          - emit: {type: workflow.task.de-escalated, description: Emit a domain event recording the de-escalation}
      - id: cancel
        description: "POST /tasks/{taskId}/cancel — Supervisor cancels a task from any active state"
        guards:
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: [pending, in_progress, escalated], to: cancelled}
        schema:
          request:
            $ref: "#/$defs/CancelTaskRequest"
        steps:
          - set: {field: cancelledAt, value: $now, description: Record when the task was cancelled}
          - emit: {type: workflow.task.cancelled, data: {reason: $request.reason}, description: Emit a domain event recording the cancellation}
      - id: reopen
        description: "POST /tasks/{taskId}/reopen — Supervisor returns a cancelled task to the pending queue"
        guards:
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
        transition: {from: cancelled, to: pending}
        schema:
          request:
            $ref: "#/$defs/ReopenTaskRequest"
        steps:
          - set: {field: cancelledAt, value: null, description: Clear the cancellation timestamp on reopen}
          - call: assignToQueue
          - call: setPriority
          - emit: {type: workflow.task.reopened, data: {reason: $request.reason}, description: Emit a domain event recording the reopen}
      - id: await-client
        description: "POST /tasks/{taskId}/await-client — Pauses an in-progress task while waiting for a client response"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [callerIsAssignedWorker]
        transition: {from: in_progress, to: awaiting_client}
        schema:
          request:
            $ref: "#/$defs/AwaitClientRequest"
        steps:
          - set: {field: blockedAt, value: $now, description: Record when the task entered a waiting state}
          - call: scheduleClientTimeout
          - emit: {type: workflow.task.awaiting_client, description: Emit a domain event recording the block}
      - id: await-verification
        description: "POST /tasks/{taskId}/await-verification — Pauses an in-progress task while waiting for a verification result"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [callerIsAssignedWorker]
        transition: {from: in_progress, to: awaiting_verification}
        schema:
          request:
            $ref: "#/$defs/AwaitVerificationRequest"
        steps:
          - set: {field: blockedAt, value: $now, description: Record when the task entered a waiting state}
          - call: scheduleVerificationTimeout
          - emit: {type: workflow.task.awaiting_verification, description: Emit a domain event recording the block}
      - id: resume
        description: "POST /tasks/{taskId}/resume — Resumes a blocked task, cancelling any active wait timers"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [{any: [callerIsAssignedWorker, callerIsSupervisor]}]
        transition: {from: [awaiting_client, awaiting_verification], to: in_progress}
        steps:
          - set: {field: blockedAt, value: null, description: Clear the block timestamp on resume}
          - call: cancelClientTimeout
          - call: cancelVerificationTimeout
          - emit: {type: workflow.task.resumed, description: Emit a domain event recording the resumption}
      - id: auto-resume
        description: "POST /tasks/{taskId}/auto-resume — System resumes a verification-blocked task when the timeout fires or a verification result arrives"
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: awaiting_verification, to: in_progress}
        schema:
          request:
            $ref: "#/$defs/SystemResumeTaskRequest"
        steps:
          - set: {field: blockedAt, value: null, description: Clear the block timestamp on system resume}
          - call: cancelVerificationTimeout
          - emit: {type: workflow.task.resumed, causationid: $request.causationid, description: Emit a domain event recording the automated resumption; causationid links to the triggering event}
      - id: sla-escalate
        description: "POST /tasks/{taskId}/sla-escalate — System escalates a task when an SLA timer fires (creation deadline, warning, or breach)"
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: [pending, in_progress, escalated], to: escalated}
        schema:
          request:
            $ref: "#/$defs/SystemEscalateTaskRequest"
        steps:
          - if: $object.escalatedAt == null
            then: [{set: {field: escalatedAt, value: $now, description: "Record first escalation time; not overwritten on subsequent timer-triggered escalations"}}]
          - call: setPriority
          - if: $request.reason == "sla_deadline_exceeded"
            then: [{emit: {type: workflow.task.sla_breached, data: {reason: $request.reason}, description: Emit a domain event recording the SLA deadline breach for federal compliance reporting}}]
            else: [{emit: {type: workflow.task.escalated, data: {reason: $request.reason}, description: Emit a domain event recording the automatic escalation}}]
      - id: auto-cancel
        description: "POST /tasks/{taskId}/auto-cancel — System cancels a client-blocked task after 30 days without a response"
        guards:
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: awaiting_client, to: cancelled}
        steps:
          - set: {field: cancelledAt, value: $now, description: Record when the task was automatically cancelled}
          - emit: {type: workflow.task.cancelled, data: {reason: client_unresponsive}, description: Emit a domain event recording the automatic cancellation}
      - id: submit-for-review
        description: "POST /tasks/{taskId}/submit-for-review — Worker submits a completed task to a supervisor for review and approval"
        guards:
          - actors: [caseworker, supervisor]
            conditions: [callerIsAssignedWorker]
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: [in_progress, escalated], to: pending_review}
        steps:
          - emit: {type: workflow.task.submitted_for_review, description: Emit a domain event recording the submission for review}
      - id: approve
        description: "POST /tasks/{taskId}/approve — Supervisor approves a submitted task and records the final outcome"
        guards:
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: pending_review, to: completed}
        schema:
          request:
            $ref: "#/$defs/ApproveTaskRequest"
        steps:
          - set: {field: completedAt, value: $now, description: Record when work was approved and completed}
          - set: {field: outcome, value: $request.outcome, description: Store the outcome from the supervisor's approval}
          - set: {field: completionNotes, value: $request.notes, description: Store optional notes from the supervisor}
          - emit: {type: workflow.task.approved, data: {outcome: $request.outcome}, description: Emit a domain event recording the approval}
      - id: return-to-worker
        description: "POST /tasks/{taskId}/return-to-worker — Supervisor sends a review-pending task back to the worker with feedback"
        guards:
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
          - actors: [system]
            conditions: [callerIsSystem]
        transition: {from: pending_review, to: in_progress}
        schema:
          request:
            $ref: "#/$defs/ReturnToWorkerRequest"
        steps:
          - emit: {type: workflow.task.returned_to_worker, data: {reason: $request.reason}, description: Emit a domain event recording the return for revision}
      - id: assign
        description: "POST /tasks/{taskId}/assign — Supervisor reassigns a task to a specific caseworker or moves it to a different queue"
        guards:
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
        transition:
          from: [pending, in_progress, escalated, awaiting_client, awaiting_verification, pending_review]
        schema:
          request:
            $ref: "#/$defs/AssignTaskRequest"
        steps:
          - set: {field: assignedToId, value: $request.assignedToId, description: Assign the task to the specified caseworker}
          - set: {field: queueId, value: $request.queueId, description: Optionally move the task to a different queue}
          - emit: {type: workflow.task.assigned, data: {assignedToId: $request.assignedToId, queueId: $request.queueId}, description: Emit a domain event recording the assignment}
      - id: set-priority
        description: "POST /tasks/{taskId}/set-priority — Supervisor manually overrides the task priority"
        guards:
          - actors: [supervisor]
            conditions: [callerIsSupervisor]
        transition:
          from: [pending, in_progress, escalated, awaiting_client, awaiting_verification, pending_review]
        schema:
          request:
            $ref: "#/$defs/SetPriorityRequest"
        steps:
          - set: {field: priority, value: $request.priority, description: Override the task priority}
          - emit: {type: workflow.task.priority_changed, data: {priority: $request.priority, reason: $request.reason}, description: Emit a domain event recording the priority change}
    events:
      - type: workflow.task.created
        description: Route and prioritize a new task, then schedule its 72-hour creation deadline
        transition: {}
        steps:
          - call: assignToQueue
          - call: setPriority
          - call: scheduleCreationDeadline
      - type: workflow.task.updated
        description: Re-evaluate priority and queue assignment when relevant fields change; reschedule SLA timers when the SLA deadline is set
        transition: {}
        steps:
          - if: $this.data.changes.exists(c, c.field == "isExpedited" || c.field == "programType")
            then: [{call: setPriority}]
          - if: $this.data.changes.exists(c, c.field == "programType" || c.field == "queueId")
            then: [{call: assignToQueue}]
          - if: $this.data.changes.exists(c, c.field == "slaDeadline") && $object.slaDeadline != null
            then: [{call: scheduleSlaWarning}, {call: scheduleSlaBreachTimer}]
      - type: workflow.creation_deadline
        description: Auto-escalate after 72-business-hour creation deadline
        steps:
          - call: {POST: workflow/tasks/$this.subject/sla-escalate, body: {reason: deadline_exceeded}, description: Auto-escalate after 72h creation deadline}
      - type: workflow.sla_warning
        description: Auto-escalate 48 hours before SLA deadline
        steps:
          - call: {POST: workflow/tasks/$this.subject/sla-escalate, body: {reason: sla_deadline_approaching}, description: Auto-escalate 48h before SLA deadline}
      - type: workflow.sla_breach
        description: Escalate and record SLA breach at deadline
        steps:
          - call: {POST: workflow/tasks/$this.subject/sla-escalate, body: {reason: sla_deadline_exceeded}, description: Escalate and record SLA breach at deadline}
      - type: workflow.client_timeout
        description: Auto-cancel after 30 calendar days of client unresponsiveness
        steps:
          - call: {POST: workflow/tasks/$this.subject/auto-cancel, body: {reason: client_unresponsive}, description: Auto-cancel after 30 days client unresponsive}
      - type: workflow.verification_timeout
        description: Auto-resume after 7 calendar days waiting on verification
        steps:
          - call: {POST: workflow/tasks/$this.subject/auto-resume, body: {causationid: $this.id}, description: Auto-resume after 7 days verification timeout; passes timer event ID as causationid}
      - type: eligibility.application.expedited
        description: Flag the intake review task as expedited and switch it to the 7-day SLA when SNAP expedited criteria are confirmed (7 CFR § 273.2(i))
        context:
          - task: {from: workflow/tasks, where: {subjectId: $this.subject, taskType: application_review}}
        steps:
          - if: $task.id != null
            then:
              - call:
                  PATCH: workflow/tasks/$task.id
                  body:
                    isExpedited: true
                    slaType: snap_expedited
      - type: intake.application.submitted
        description: Create an application review task when a new application is submitted
        steps:
          - call: {POST: workflow/tasks, body: {taskType: application_review, name: Application review, status: pending, subjectType: application, subjectId: $this.subject}, description: Create an intake review task when an application is submitted}
      - type: intake.application.closed
        description: Complete open tasks for the application when intake closes; handles direct close, supervisor-approved close, and auto-determination paths
        context:
          - reviewTask: {from: workflow/tasks, where: {subjectId: $this.subject, taskType: application_review}}
          - approvalTask: {from: workflow/tasks, where: {subjectId: $this.subject, taskType: determination_approval}}
        steps:
          - if: $reviewTask.id != null && $reviewTask.status == "pending_review"
            then:
              - call:
                  POST: workflow/tasks/$reviewTask.id/approve
                  body:
                    outcome: application_closed
                  description: Complete the caseworker task that was awaiting supervisor approval
          - if: $reviewTask.id != null && $reviewTask.status == "in_progress"
            then:
              - call:
                  POST: workflow/tasks/$reviewTask.id/complete
                  body:
                    outcome: application_closed
                  description: Complete the active caseworker task on application close
          - if: $reviewTask.id != null && $reviewTask.status == "pending"
            then:
              - call:
                  POST: workflow/tasks/$reviewTask.id/cancel
                  body:
                    reason: application_closed
                  description: Cancel the unclaimed caseworker task when the application was auto-determined at submission
          - if: $approvalTask.id != null
            then:
              - call:
                  POST: workflow/tasks/$approvalTask.id/complete
                  body:
                    outcome: application_closed
                  description: Complete the supervisor approval task
      - type: intake.determination.approval_needed
        description: Move the caseworker's review task to pending_review and create a supervisor approval task when a determination requires sign-off
        context:
          - reviewTask: {from: workflow/tasks, where: {subjectId: $this.subject, taskType: application_review}}
        steps:
          - if: $reviewTask.id != null
            then:
              - call:
                  POST: workflow/tasks/$reviewTask.id/submit-for-review
                  description: Move caseworker task to pending_review while supervisor reviews the determination
          - call:
              POST: workflow/tasks
              body:
                taskType: determination_approval
                name: Determination approval
                status: pending
                subjectType: application
                subjectId: $this.subject
              description: Create a supervisor approval task
      - type: intake.determination.rejected
        description: Return the caseworker's review task to in_progress and complete the supervisor approval task when a determination is rejected
        context:
          - reviewTask: {from: workflow/tasks, where: {subjectId: $this.subject, taskType: application_review}}
          - approvalTask: {from: workflow/tasks, where: {subjectId: $this.subject, taskType: determination_approval}}
        steps:
          - if: $reviewTask.id != null
            then:
              - call:
                  POST: workflow/tasks/$reviewTask.id/return-to-worker
                  body:
                    reason: determination_rejected
                  description: Return the caseworker task to in_progress for revision
          - if: $approvalTask.id != null
            then:
              - call:
                  POST: workflow/tasks/$approvalTask.id/complete
                  body:
                    outcome: determination_rejected
                  description: Complete the supervisor approval task with a rejected outcome
    timers:
      - id: creation_deadline
        description: 72-business-hour deadline to act on a newly created task before auto-escalation
      - id: sla_warning
        description: Warning fired 48 hours before the task SLA deadline
      - id: sla_breach
        description: Fired at the task SLA deadline to record a breach and escalate
      - id: client_timeout
        description: 30-calendar-day limit on client unresponsiveness before auto-cancellation
      - id: verification_timeout
        description: 7-calendar-day wait on a verification result before auto-resuming
guards:
  - id: taskIsUnassigned
    condition: object.assignedToId == null
  - id: callerIsAssignedWorker
    condition: object.assignedToId == caller.id
procedures:
  - id: assignToQueue
    description: Route SNAP-only tasks to the SNAP intake queue; falls through to the general queue for multi-program or non-SNAP tasks. For tasks linked to an application, SNAP is determined by the application's program list; for standalone tasks, it is determined by the task's programType field.
    context:
      - application: {from: intake/applications, where: {id: $object.subjectId}}
      - snapQueue: {from: workflow/queues, where: {name: snap-intake}}
      - generalQueue: {from: workflow/queues, where: {name: general-intake}}
    if: $snapQueue != null && (($application != null && $application.programs.size() == 1 && "snap" in $application.programs) || ($application == null && $object.programType == "snap"))
    then: [{set: {field: queueId, value: $snapQueue.id}}]
    else: [{set: {field: queueId, value: $generalQueue.id}}]
  - id: setPriority
    description: Set expedited priority (1) when the task is flagged as expedited; otherwise set normal priority (3).
    if: $object.isExpedited == true
    then: [{set: {field: priority, value: 1}}]
    else: [{set: {field: priority, value: 3}}]
  - id: scheduleTimer
    description: Schedule a workflow timer; builds timerId and callback event from timerType and $object.id.
    parameters: [timerType, fireAfter, fireAt, fireOffset, calendarType]
    call: requestTimer
    with:
      $merge: $params
      timerId: "\"workflow.\" + $params.timerType + \".\" + $object.id"
      callback: {event: '"workflow." + $params.timerType', data: {}}
  - id: cancelWorkflowTimer
    description: Cancel a workflow timer by type; idempotent.
    parameters: [timerType]
    call: cancelTimer
    with: {timerId: "\"workflow.\" + $params.timerType + \".\" + $object.id"}
  - id: scheduleCreationDeadline
    description: Schedule auto-escalation 72 business hours after task creation.
    call: scheduleTimer
    with: {timerType: creation_deadline, fireAfter: PT72H, calendarType: business}
  - id: scheduleClientTimeout
    description: Schedule auto-cancellation after 30 calendar days of client unresponsiveness.
    call: scheduleTimer
    with: {timerType: client_timeout, fireAfter: P30D, calendarType: calendar}
  - id: scheduleVerificationTimeout
    description: Schedule auto-resume after 7 calendar days waiting on verification.
    call: scheduleTimer
    with: {timerType: verification_timeout, fireAfter: P7D, calendarType: calendar}
  - id: scheduleSlaWarning
    description: Schedule SLA warning escalation 48 hours before the task SLA deadline.
    call: scheduleTimer
    with: {timerType: sla_warning, fireAt: $object.slaDeadline, fireOffset: "-PT48H", calendarType: calendar}
  - id: scheduleSlaBreachTimer
    description: Schedule SLA breach escalation at the task SLA deadline.
    call: scheduleTimer
    with: {timerType: sla_breach, fireAt: $object.slaDeadline, calendarType: calendar}
  - id: cancelClientTimeout
    description: Cancel the client unresponsive timer; idempotent.
    call: cancelWorkflowTimer
    with: {timerType: client_timeout}
  - id: cancelVerificationTimeout
    description: "Cancel the verification timeout timer; idempotent, safe to call even if already fired."
    call: cancelWorkflowTimer
    with: {timerType: verification_timeout}

$defs:
  ApproveTaskRequest:
    type: object
    required:
      - outcome
    properties:
      outcome:
        type: string
        description: Completion outcome (e.g., approved, denied)
      notes:
        type: string
        description: Optional notes from the supervisor

  AssignTaskRequest:
    type: object
    required:
      - assignedToId
    properties:
      assignedToId:
        type: string
        format: uuid
        description: ID of the caseworker to assign the task to
      queueId:
        type: string
        format: uuid
        description: Optional queue to move the task to

  AwaitClientRequest:
    type: object
    properties:
      notes:
        type: string
        description: Optional context about what action is being awaited from the client

  AwaitVerificationRequest:
    type: object
    properties:
      notes:
        type: string
        description: Optional context about what external verification is pending

  CancelTaskRequest:
    type: object
    required:
      - reason
    properties:
      reason:
        type: string
        description: Why the task is being cancelled

  CompleteTaskRequest:
    type: object
    required:
      - outcome
    properties:
      outcome:
        type: string
        description: Completion outcome (e.g., approved, denied)
      notes:
        type: string
        description: Optional notes about the completion
      createFollowUp:
        type: boolean
        description: When true, a follow-up task is automatically created

  DeEscalateTaskRequest:
    type: object
    properties:
      notes:
        type: string
        description: Optional notes about the de-escalation

  EscalateTaskRequest:
    type: object
    required:
      - reason
    properties:
      reason:
        type: string
        description: Why the task is being escalated

  ReleaseTaskRequest:
    type: object
    required:
      - reason
    properties:
      reason:
        type: string
        description: Why the task is being released

  ReopenTaskRequest:
    type: object
    required:
      - reason
    properties:
      reason:
        type: string
        description: Why the cancelled task is being reopened

  ReturnToWorkerRequest:
    type: object
    required:
      - reason
    properties:
      reason:
        type: string
        description: Why the work is being returned for revision

  SetPriorityRequest:
    type: object
    required:
      - priority
    properties:
      priority:
        type: integer
        minimum: 1
        maximum: 4
        description: "New priority level (1=expedited, 2=high, 3=normal, 4=low)"
      reason:
        type: string
        description: Optional reason for the priority change

  SystemEscalateTaskRequest:
    type: object
    required:
      - reason
    properties:
      reason:
        type: string
        description: Why the task is being automatically escalated (deadline_exceeded, sla_deadline_approaching, sla_deadline_exceeded)

  SystemResumeTaskRequest:
    type: object
    properties:
      causationid:
        type: string
        format: uuid
        description: >
          ID of the event that triggered this resumption (e.g., the
          workflow.verification_timeout or data_exchange.call.completed event).
          Propagated to the emitted workflow.task.resumed event envelope.
