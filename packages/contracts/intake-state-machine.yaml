$schema: ./schemas/state-machine-schema.yaml
version: "1.0"
domain: intake
apiSpec: intake-openapi.yaml
machines:
  - object: Application
    states:
      - id: draft
        slaClock: stopped
      - id: submitted
        slaClock: running
      - id: under_review
        slaClock: running
      - id: withdrawn
        slaClock: stopped
      - id: closed
        slaClock: stopped
    initialState: draft
    triggers:
      onEvent:
        - name: workflow.task.claimed
          then:
            - evaluate: open-application-rule
              description: Transition the linked application from submitted to under_review when a caseworker claims its intake task
            - evaluate: create-interview-rule
              description: Create an Interview record to track the SNAP regulatory interview obligation
        - name: intake.application.submitted
          then:
            - evaluate: initiate-data-exchange-rule
              description: Initiate electronic verification across all applicable federal data sources
            - evaluate: create-document-checklist-rule
              description: Create document requests for each required document type based on programs applied for
        - name: data_exchange.call.completed
          then:
            - evaluate: write-back-verification-rule
              description: Record the electronic verification result on the relevant household member
            - evaluate: handle-fdsh-inconclusive-rule
              description: Request citizenship documentation when FDSH returns inconclusive — ex parte failed, caseworker must collect paper
        - name: scheduling.appointment.scheduled
          then:
            - evaluate: link-appointment-rule
              description: Add the scheduled appointment to the linked Interview's appointments list
        - name: document_management.document.verified
          then:
            - evaluate: verify-application-document-rule
              description: Transition the ApplicationDocument to verified and record the document evidence
        - name: eligibility.determination.completed
          then:
            - evaluate: write-back-determination-rule
              description: Record the eligibility outcome on the relevant household member
    operations:
      - name: submit
        guards:
          actors:
            - applicant
            - caseworker
          conditions:
            - any:
                - callerIsApplicant
                - callerIsCaseworker
        transition:
          from: draft
          to: submitted
        then:
          - set:
              field: submittedAt
              value: $now
            description: Record when the application was formally submitted
          - emit:
              event: submitted
              data:
                submittedAt: $now
                programs: $object.programs
                channel: $object.channel
                isExpedited: $object.isExpedited
            description: Emit application.submitted — starts the regulatory clock; triggers caseworker task creation and confirmation notice
      - name: open
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        transition:
          from: submitted
          to: under_review
        then:
          - emit:
              event: opened
              data:
                openedAt: $now
                programs: $object.programs
            description: Emit application.opened — signals caseworker has begun active review
      - name: withdraw
        guards:
          actors:
            - applicant
            - caseworker
            - supervisor
          conditions:
            - any:
                - callerIsApplicant
                - callerIsCaseworker
                - callerIsSupervisor
        transition:
          from:
            - submitted
            - under_review
          to: withdrawn
        requestBody:
          type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Why the application is being withdrawn
        then:
          - set:
              field: withdrawnAt
              value: $now
            description: Record when the application was withdrawn
          - emit:
              event: withdrawn
              data:
                withdrawnAt: $now
                reason: $request.reason
            description: Emit application.withdrawn — triggers open task cancellation and withdrawal notice
      - name: close
        guards:
          actors:
            - caseworker
            - supervisor
            - system
          conditions:
            - any:
                - callerIsCaseworker
                - callerIsSupervisor
                - callerIsSystem
        transition:
          from: under_review
          to: closed
        then:
          - set:
              field: closedAt
              value: $now
            description: Record when the intake phase closed
          - emit:
              event: closed
              data:
                closedAt: $now
            description: Emit application.closed — signals intake is complete; triggers case creation if approved
      - name: complete-review
        guards:
          actors:
            - caseworker
            - supervisor
          conditions:
            - any:
                - callerIsCaseworker
                - callerIsSupervisor
        transition:
          from: under_review
        then:
          - emit:
              event: review_completed
              data:
                reviewCompletedAt: $now
            description: |
              Emit application.review_completed — signals data collection is complete; triggers eligibility determination. No state change — application stays under_review until eligibility outcomes are received.
      - name: flag-expedited
        guards:
          actors:
            - caseworker
            - supervisor
            - system
          conditions:
            - any:
                - callerIsCaseworker
                - callerIsSupervisor
                - callerIsSystem
        transition:
          from:
            - submitted
            - under_review
        then:
          - set:
              field: isExpedited
              value: true
            description: Mark the application as qualifying for expedited processing
          - emit:
              event: expedited_flagged
              data:
                flaggedAt: $now
            description: Emit application.expedited_flagged — triggers workflow to escalate to expedited SLA track
  - object: ApplicationDocument
    states:
      - id: requested
        slaClock: stopped
      - id: verified
        slaClock: stopped
    initialState: requested
    operations:
      - name: verify
        guards:
          actors:
            - system
          conditions:
            - callerIsSystem
        transition:
          from: requested
          to: verified
        then:
          - emit:
              event: verified
              data:
                verifiedAt: $now
            description: Emit document.verified — signals the document has been verified by document-management
guards:
  - id: callerIsApplicant
    field: $caller.roles
    operator: contains_any
    value:
      - applicant
  - id: callerIsCaseworker
    field: $caller.roles
    operator: contains_any
    value:
      - caseworker
  - id: callerIsSupervisor
    field: $caller.roles
    operator: contains_any
    value:
      - supervisor
  - id: callerIsSystem
    field: $caller.roles
    operator: contains_any
    value:
      - system
rules:
  - id: open-application-rule
    context:
      - task:
          from: workflow/tasks
          where:
            id: $this.subject
      - application:
          from: intake/applications
          where:
            id: $task.subjectId
          optional: true
    evaluation: first-match-wins
    conditions:
      - id: open-submitted-application-review
        order: 1
        condition:
          and:
            - "!=":
                - var: $application.id
                - null
            - "==":
                - var: $task.taskType
                - application_review
            - "==":
                - var: $application.status
                - submitted
        then:
          - invoke:
              POST: intake/applications/{application.id}/open
        description: |
          Transition the linked application from submitted to under_review.
          Guards on the open operation enforce that only system-role callers can execute it.
  - id: create-interview-rule
    context:
      - task:
          from: workflow/tasks
          where:
            id: $this.subject
    evaluation: first-match-wins
    conditions:
      - id: create-interview-for-application-review
        order: 1
        condition:
          "==":
            - var: $task.taskType
            - application_review
        then:
          - invoke:
              POST: intake/applications/interview
              body:
                applicationId: $task.subjectId
        description: Create an Interview record when a caseworker claims an application_review task
  - id: initiate-data-exchange-rule
    context:
      - application:
          from: intake/applications
          where:
            id: $this.subject
    evaluation: first-match-wins
    conditions:
      - id: create-verification-service-call
        order: 1
        condition: true
        then:
          - invoke:
              POST: data-exchange/service-calls
              body:
                applicationId: $application.id
                requestedAt: $this.time
        description: |
          Initiate electronic verification when an application is submitted.
          Forward subscription — the data exchange domain fans out per-member checks internally
          (FDSH, IEVS, SAVE, SSA) and emits data_exchange.call.completed per result.
  - id: create-document-checklist-rule
    context:
      - application:
          from: intake/applications
          where:
            id: $this.subject
    evaluation: all-match
    conditions:
      - id: snap-income-document
        order: 1
        condition:
          in:
            - snap
            - var: $application.programs
        then:
          - invoke:
              POST: intake/applications/documents
              body:
                applicationId: $application.id
                category: income
        description: Request income documentation for SNAP applicants
      - id: snap-identity-document
        order: 2
        condition:
          in:
            - snap
            - var: $application.programs
        then:
          - invoke:
              POST: intake/applications/documents
              body:
                applicationId: $application.id
                category: identity
        description: Request identity documentation for SNAP applicants
      - id: snap-residency-document
        order: 3
        condition:
          in:
            - snap
            - var: $application.programs
        then:
          - invoke:
              POST: intake/applications/documents
              body:
                applicationId: $application.id
                category: residency
        description: Request residency documentation for SNAP applicants
      - id: medicaid-identity-document
        order: 4
        condition:
          in:
            - medicaid
            - var: $application.programs
        then:
          - invoke:
              POST: intake/applications/documents
              body:
                applicationId: $application.id
                category: identity
        description: Request identity documentation for Medicaid applicants
  - id: write-back-verification-rule
    evaluation: first-match-wins
    conditions:
      - id: append-verification-to-member
        order: 1
        condition: true
        then:
          - invoke:
              PATCH: intake/applications/members/{this.data.memberId}
              body:
                verifications:
                  $push:
                    type: $this.data.verificationType
                    status: $this.data.result
                    source: $this.data.serviceType
                    checkedAt: $this.time
        description: Write electronic verification result back to ApplicationMember.verifications
  - id: handle-fdsh-inconclusive-rule
    evaluation: first-match-wins
    conditions:
      - id: create-citizenship-document-on-fdsh-inconclusive
        order: 1
        condition:
          and:
            - "==":
                - var: $this.data.serviceType
                - fdsh
            - "==":
                - var: $this.data.result
                - inconclusive
        then:
          - invoke:
              POST: intake/applications/documents
              body:
                applicationId: $this.data.applicationId
                memberId: $this.data.memberId
                category: citizenship
        description: |
          Request citizenship documentation when FDSH returns an inconclusive result.
          Ex parte verification failed; caseworker must collect paper documentation.
  - id: link-appointment-rule
    evaluation: first-match-wins
    conditions:
      - id: add-appointment-to-interview
        order: 1
        condition:
          "==":
            - var: $this.data.subjectType
            - interview
        then:
          - invoke:
              PATCH: intake/applications/interview/{this.data.subjectId}
              body:
                appointments:
                  $push: $this.subject
        description: |
          Add the scheduled appointment ID to the linked Interview's appointments list.
          Only fires when the appointment's subjectType is "interview", ensuring non-interview
          appointments scheduled via the shared scheduling domain are ignored.
  - id: verify-application-document-rule
    context:
      - applicationDocument:
          from: intake/applications/documents
          where:
            id: $this.data.subjectId
          optional: true
    evaluation: all-match
    conditions:
      - id: transition-document-to-verified
        order: 1
        condition:
          "==":
            - var: $this.data.subjectType
            - application-document
        then:
          - invoke:
              POST: intake/applications/documents/{applicationDocument.id}/verify
        description: |
          Transition the ApplicationDocument to verified when document-management reports success.
          Only fires when subjectType is "application-document" — documents uploaded without
          linking to an ApplicationDocument are silently ignored.
      - id: record-document-evidence
        order: 2
        condition:
          "==":
            - var: $this.data.subjectType
            - application-document
        then:
          - invoke:
              PATCH: intake/applications/documents/{applicationDocument.id}
              body:
                evidence:
                  $push: $this.subject
        description: Record the verified document ID in the ApplicationDocument's evidence list
  - id: write-back-determination-rule
    evaluation: first-match-wins
    conditions:
      - id: append-determination-to-member
        order: 1
        condition: true
        then:
          - invoke:
              PATCH: intake/applications/members/{this.data.memberId}
              body:
                programDeterminations:
                  $push:
                    program: $this.data.program
                    outcome: $this.data.outcome
                    determinedAt: $this.data.determinedAt
        description: |
          Write eligibility determination outcome back to ApplicationMember.programDeterminations.
          Informational write-back only — does not trigger application close. Medicaid RTE results
          may arrive before intake closes; SNAP results typically arrive after.
