components:
  parameters:
    ApplicationIdParam:
      name: applicationId
      in: path
      required: true
      description: Unique identifier of the application.
      schema:
        type: string
        format: uuid

    VerificationIdParam:
      name: verificationId
      in: path
      required: true
      description: Unique identifier of the verification obligation.
      schema:
        type: string
        format: uuid

    MemberIdParam:
      name: memberId
      in: path
      required: true
      description: Unique identifier of the application member.
      schema:
        type: string
        format: uuid

    MemberIncomeIdParam:
      name: incomeId
      in: path
      required: true
      description: Unique identifier of the income record.
      schema:
        type: string
        format: uuid

    MemberExpenseIdParam:
      name: expenseId
      in: path
      required: true
      description: Unique identifier of the expense record.
      schema:
        type: string
        format: uuid

    MemberAssetIdParam:
      name: assetId
      in: path
      required: true
      description: Unique identifier of the asset record.
      schema:
        type: string
        format: uuid

    MemberEmploymentIdParam:
      name: employmentId
      in: path
      required: true
      description: Unique identifier of the employment record.
      schema:
        type: string
        format: uuid

    MemberHealthCoverageIdParam:
      name: healthCoverageId
      in: path
      required: true
      description: Unique identifier of the health coverage record.
      schema:
        type: string
        format: uuid

    NoteIdParam:
      name: noteId
      in: path
      required: true
      description: Unique identifier of the application note.

    ReviewProgressEntryIdParam:
      name: entryId
      in: path
      required: true
      description: Unique identifier of the review-progress entry.
      schema:
        type: string
        format: uuid

  schemas:
    ApplicationWritable:
      type: object
      description: Client-writable fields for an application.
      properties:
        programs:
          type: array
          description: Programs the household is applying for. At least one required at submission.
          items:
            type: string
            enum:
              - snap
              - medicaid
              - tanf
        channel:
          type: string
          description: How the application was filed.
          enum:
            - online
            - in_person
            - phone
            - mail

    Application:
      description: >
        The root entity representing one submitted application from a household.
        Distinct from the downstream benefit case — no platform tracks the final
        determination on the application itself; that lives on the case created
        after eligibility determination. Drives the regulatory processing clock:
        the 30-day SNAP deadline and 45-day Medicaid deadline both run from
        submittedAt (7 CFR § 273.2, 42 CFR § 435.912).
      allOf:
        - $ref: "#/components/schemas/ApplicationWritable"
        - type: object
          required:
            - id
            - status
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              description: Unique identifier for the application.
              readOnly: true
            status:
              type: string
              description: Current lifecycle status of the application.
              readOnly: true
              enum:
                - draft
                - submitted
                - under_review
                - pending_approval
                - withdrawn
                - closed
            isExpedited:
              type:
                - boolean
                - "null"
              description: Whether the application qualifies for expedited processing (e.g., SNAP 7-day track). Set during caseworker expedited screening after submission. Null until screening is complete.
              readOnly: true
            submittedAt:
              type: string
              format: date-time
              description: When the application was formally submitted. Null until submitted.
              readOnly: true
              nullable: true
            withdrawnAt:
              type: string
              format: date-time
              description: When the application was withdrawn. Null unless withdrawn.
              readOnly: true
              nullable: true
            closedAt:
              type: string
              format: date-time
              description: When the intake phase closed. Null until closed.
              readOnly: true
              nullable: true
            createdAt:
              type: string
              format: date-time
              description: When the application record was created.
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              description: When the application record was last modified.
              readOnly: true

    ApplicationCreate:
      allOf:
        - $ref: "#/components/schemas/ApplicationWritable"
        - type: object
          required:
            - programs

    ApplicationUpdate:
      allOf:
        - $ref: "#/components/schemas/ApplicationWritable"
        - type: object
          minProperties: 1

    ApplicationList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Application"

    # ---------------------------------------------------------------------------
    # ApplicationMember
    # ---------------------------------------------------------------------------

    ApplicationMemberWritable:
      description: Client-writable fields for an application member.
      allOf:
        - $ref: "./schemas/common/member.yaml"
        - type: object
          properties:
            roles:
              type: array
              description: Roles this person plays in the application.
              items:
                type: string
                enum:
                  - primary_applicant
                  - household_member
                  - non_applying_member
                  - authorized_representative
                  - absent_parent
            personId:
              type: string
              format: uuid
              nullable: true
              description: Resolved person record ID. Auto-set on a confirmed match; caseworker can set it manually when selecting from match candidates or correcting a bad link.
              x-relationship:
                resource: Person
                domain: client-management

    ApplicationMember:
      description: >
        A person linked to an application. May be the primary applicant, a
        household member applying for benefits, a member counted but not
        applying (their income and resources still count toward the household),
        or an authorized representative. SNAP requires all household members to
        be listed regardless of individual eligibility (7 CFR § 273.1).
      allOf:
        - $ref: "#/components/schemas/ApplicationMemberWritable"
        - type: object
          required:
            - id
            - applicationId
            - roles
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true
            personMatch:
              readOnly: true
              nullable: true
              $ref: "#/components/schemas/PersonMatch"
            programDeterminations:
              type: array
              readOnly: true
              description: Per-program eligibility determination results, populated as decisions arrive from the eligibility domain.
              items:
                $ref: "#/components/schemas/ApplicationMemberProgramDetermination"

    ApplicationMemberCreate:
      allOf:
        - $ref: "#/components/schemas/ApplicationMemberWritable"
        - type: object
          required:
            - roles

    ApplicationMemberUpdate:
      allOf:
        - $ref: "#/components/schemas/ApplicationMemberWritable"
        - type: object
          minProperties: 1

    ApplicationMemberList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ApplicationMember"

    PersonMatch:
      type: object
      description: Person matching state for an application member. Populated when client_management.person.match_resolved is received. Null until matching begins.
      properties:
        matchStatus:
          type: string
          enum:
            - confirmed
            - review_required
            - no_match
        candidates:
          type: array
          description: Match candidates. Populated for review_required; empty otherwise.
          items:
            $ref: "#/components/schemas/PersonMatchCandidate"

    PersonMatchCandidate:
      type: object
      description: A candidate person record returned by the person matching process.
      required:
        - personId
        - confidenceScore
      properties:
        personId:
          type: string
          format: uuid
          description: The candidate person record ID.
          x-relationship:
            resource: Person
            domain: client-management
        confidenceScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Match confidence score from 0 (no confidence) to 1 (certain).

    ApplicationMemberProgramDetermination:
      type: object
      description: A single program eligibility determination result for a household member.
      required:
        - program
        - status
      properties:
        program:
          type: string
          description: Program identifier (e.g., snap, medicaid, tanf).
        outcome:
          type: string
          description: Determination outcome for this member/program combination.
          enum:
            - approved
            - denied
        determinedAt:
          type: string
          format: date-time
          description: When the determination was recorded.

    # ---------------------------------------------------------------------------
    # Member sub-resource schemas
    # ---------------------------------------------------------------------------

    MemberIncome:
      description: An income record for an application member.
      allOf:
        - $ref: "./schemas/common/income.yaml"
        - type: object
          required:
            - id
            - memberId
            - applicationId
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            memberId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: ApplicationMember
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    MemberIncomeCreate:
      $ref: "./schemas/common/income.yaml"

    MemberIncomeUpdate:
      allOf:
        - $ref: "./schemas/common/income.yaml"
        - type: object
          minProperties: 1

    MemberIncomeList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
