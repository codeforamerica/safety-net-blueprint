openapi: 3.1.0
info:
  title: Intake Service API
  version: 0.1.0
  x-domain: intake
  x-status: alpha
  x-visibility: public
  description: |
    REST API for managing public assistance applications. Covers the full
    intake lifecycle: applications, household members, member financial
    sub-resources (income, expenses, assets, employment, health coverage),
    household data, verifications, and interviews.

    > **Status: Alpha** — Breaking changes expected.

  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/intake
    description: Production server
  - url: http://localhost:1080/intake
    description: Local development server

tags:
  - name: Applications
    description: Manage public assistance applications.
  - name: Application Review
    description: Composite read-only context view assembled server-side for the caseworker review workflow.
  - name: Application Review Progress
    description: Per-section review progress tracking. Upsert entries to track caseworker progress through each section.
  - name: Application Notes
    description: Caseworker notes recorded against an application, member, or section.
  - name: Household Info
    description: Household-level data for an application (shelter costs, utilities, composition).
  - name: Interviews
    description: SNAP interview obligation tracking.
  - name: Members
    description: Household members included in an application.
  - name: Member Assets
    description: Asset records for an application member.
  - name: Member Employment
    description: Employment records for an application member.
  - name: Member Expenses
    description: Expense records for an application member.
  - name: Member Health Coverage
    description: Health coverage records for an application member.
  - name: Member Income
    description: Income records for an application member.
  - name: Verifications
    description: Application verification obligations — electronic check results and document evidence.

paths:
  /applications:
    get:
      summary: List applications
      description: Retrieve a paginated list of applications.
      operationId: listApplications
      tags:
        - Applications
      x-sortable:
        # submittedAt is user-meaningful but caseworker recency triage needs it;
        # threat model assumes listApplications scope implies record-read (A01:2025).
        fields: [createdAt, updatedAt, submittedAt, status]
        default: -submittedAt
        tieBreaker: id
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - $ref: "./components/parameters.yaml#/SortParam"
      responses:
        "200":
          description: A paginated collection of applications.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create an application
      description: Create a new public assistance application in draft status.
      operationId: createApplication
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreate"
      responses:
        "201":
          description: Application created successfully.
          headers:
            Location:
              description: URL of the newly created application resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: Get an application
      description: Retrieve a single application by identifier.
      operationId: getApplication
      tags:
        - Applications
      responses:
        "200":
          description: Application retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
              examples:
                ApplicationExample1:
                  $ref: "#/components/examples/ApplicationExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update an application
      description: Apply partial updates to a draft or under-review application.
      operationId: updateApplication
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: Application updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete an application
      description: Permanently remove a draft application record.
      operationId: deleteApplication
      tags:
        - Applications
      responses:
        "204":
          description: Application deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/verifications:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: List application verifications
      description: Retrieve all verification obligations for a specific application.
      operationId: listApplicationVerifications
      tags:
        - Verifications
      x-sortable:
        fields: [createdAt, updatedAt, category, status]
        # Group by category, oldest request first within each.
        default: category,createdAt
        tieBreaker: id
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - $ref: "./components/parameters.yaml#/SortParam"
      responses:
        "200":
          description: A paginated list of application verifications.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create a verification obligation
      description: Create a verification obligation scoped to this application. Under normal circumstances verifications are created by the rules engine at submission; this endpoint supports caseworker-initiated obligations.
      operationId: createApplicationVerification
      tags:
        - Verifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationCreate"
      responses:
        "201":
          description: Verification created successfully.
          headers:
            Location:
              description: URL of the newly created verification resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/verifications/{verificationId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/VerificationIdParam"

    get:
      summary: Get a verification obligation
      description: Retrieve a single verification obligation by identifier.
      operationId: getApplicationVerification
      tags:
        - Verifications
      responses:
        "200":
          description: Verification retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a verification obligation
      description: Apply partial updates to a verification obligation.
      operationId: updateApplicationVerification
      tags:
        - Verifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationUpdate"
      responses:
        "200":
          description: Verification updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete a verification obligation
      description: Remove a verification obligation from this application.
      operationId: deleteApplicationVerification
      tags:
        - Verifications
      responses:
        "204":
          description: Verification deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/interview:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: Get the interview
      description: Retrieve the SNAP interview obligation record for this application.
      operationId: getInterview
      tags:
        - Interviews
      responses:
        "200":
          description: Interview retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interview"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update the interview
      description: Apply partial updates to the interview record (e.g., set waiverGranted, record completedAt).
      operationId: updateInterview
      tags:
        - Interviews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewUpdate"
      responses:
        "200":
          description: Interview updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interview"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/review-context:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: Get review context
      description: >
        Read-only composite view of the application assembled server-side. Returns
        the application, household, all members with their sub-resources (income,
        expenses, assets, employment, health coverage), current review-progress
        entries, and all notes. The front end organizes this data for whatever
        caseworker review workflow the state uses.
      operationId: getApplicationReviewContext
      tags:
        - Application Review
      responses:
        "200":
          description: Review context retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewContext"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/review-progress:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: List review progress
      description: >
        Returns review-progress entries for this application. Optionally filter
        by section and/or memberId.
      operationId: listApplicationReviewProgress
      x-sortable:
        fields: [section, status, updatedAt]
      tags:
        - Application Review Progress
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - name: section
          in: query
          schema:
            $ref: "#/components/schemas/ReviewSection"
          description: Filter by review section.
        - name: memberId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by member ID.
      responses:
        "200":
          description: Review progress entries retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewProgressList"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/review-progress/{entryId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/ReviewProgressEntryIdParam"

    get:
      summary: Get a review progress entry
      description: Retrieve a single review-progress entry by identifier.
      operationId: getApplicationReviewProgress
      tags:
        - Application Review Progress
      responses:
        "200":
          description: Review progress entry retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewProgressEntry"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a review progress entry
      description: Apply partial updates to a review-progress entry (e.g., set status).
      operationId: updateApplicationReviewProgress
      tags:
        - Application Review Progress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewProgressEntryWritable"
      responses:
        "200":
          description: Review progress entry updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewProgressEntry"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/notes:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: List application notes
      description: Retrieve notes recorded against this application, with optional filters.
      operationId: listApplicationNotes
      x-sortable:
        fields: [createdAt, updatedAt, scope, section]
        default: createdAt
      tags:
        - Application Notes
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - name: scope
          in: query
          schema:
            type: string
            enum:
              - application
              - member
              - section
          description: Filter by note scope.
        - name: section
          in: query
          schema:
            $ref: "#/components/schemas/ReviewSection"
          description: Filter by section.
        - name: memberId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by member ID.
      responses:
        "200":
          description: A paginated list of notes for this application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationNoteList"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create an application note
      description: Record a new caseworker note against this application.
      operationId: createApplicationNote
      tags:
        - Application Notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationNoteCreate"
      responses:
        "201":
          description: Note created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationNote"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/notes/{noteId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/NoteIdParam"

    get:
      summary: Get a note
      description: Retrieve a single application note by identifier.
      operationId: getApplicationNote
      tags:
        - Application Notes
      responses:
        "200":
          description: Note retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationNote"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a note
      description: Apply partial updates to an application note.
      operationId: updateApplicationNote
      tags:
        - Application Notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationNoteUpdate"
      responses:
        "200":
          description: Note updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationNote"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete a note
      description: Remove an application note.
      operationId: deleteApplicationNote
      tags:
        - Application Notes
      responses:
        "204":
          description: Note deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/members:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: List application members
      description: Retrieve all household members linked to this application.
      operationId: listApplicationMembers
      tags:
        - Members
      x-sortable:
        # name.* needed for alphabetical browse; ssn/dateOfBirth excluded —
        # sort order is an oracle even when fields aren't projected (A01:2025).
        fields: [createdAt, updatedAt, name.lastName, name.firstName]
        default: name.lastName,name.firstName
        tieBreaker: id
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - $ref: "./components/parameters.yaml#/SortParam"
      responses:
        "200":
          description: A paginated list of application members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMemberList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Add a member
      description: Add a household member to this application.
      operationId: createApplicationMember
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationMemberCreate"
      responses:
        "201":
          description: Member added successfully.
          headers:
            Location:
              description: URL of the newly created member resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMember"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/MemberIdParam"

    get:
      summary: Get a member
      description: Retrieve a single household member by identifier.
      operationId: getApplicationMember
      tags:
        - Members
      responses:
        "200":
          description: Member retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMember"
              examples:
                MemberExample1:
                  $ref: "#/components/examples/MemberExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a member
      description: Apply partial updates to a household member record.
      operationId: updateApplicationMember
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationMemberUpdate"
      responses:
        "200":
          description: Member updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMember"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Remove a member
      description: Remove a household member from this application.
      operationId: deleteApplicationMember
      tags:
        - Members
      responses:
        "204":
          description: Member removed successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  # ---------------------------------------------------------------------------
  # Member sub-resources
  # ---------------------------------------------------------------------------

  /applications/{applicationId}/members/{memberId}/incomes:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/MemberIdParam"
    get:
      summary: List member income
      description: Retrieve all income records for this application member.
      operationId: listMemberIncome
      x-sortable:
        fields: [type, startDate, createdAt, updatedAt]
      tags:
        - Member Income
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
      responses:
        "200":
          description: A list of income records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberIncomeList"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"
    post:
      summary: Add income
      description: Add an income record for this application member.
      operationId: createMemberIncome
      tags:
        - Member Income
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberIncomeCreate"
      responses:
        "201":
          description: Income record created successfully.
          headers:
            Location:
              description: URL of the newly created income record.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberIncome"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/members/{memberId}/incomes/{incomeId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/MemberIdParam"
      - $ref: "#/components/parameters/MemberIncomeIdParam"
    get:
      summary: Get income
      description: Retrieve a single income record by identifier.
      operationId: getMemberIncome
      tags:
        - Member Income
      responses:
        "200":
          description: Income record retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberIncome"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"
    patch:
      summary: Update income
      description: Apply partial updates to an income record.
      operationId: updateMemberIncome
      tags:
        - Member Income
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberIncomeUpdate"
      responses:
        "200":
          description: Income record updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberIncome"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"
    delete:
      summary: Delete income
      description: Permanently remove an income record.
      operationId: deleteMemberIncome
      tags:
        - Member Income
      responses:
        "204":
          description: Income record deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/members/{memberId}/expenses:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/MemberIdParam"
    get:
      summary: List member expenses
      description: Retrieve all expense records for this application member.
      operationId: listMemberExpenses
      x-sortable:
        fields: [createdAt, updatedAt]
