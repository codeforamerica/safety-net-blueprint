              items:
                $ref: "#/components/schemas/MemberHealthCoverage"

    # ---------------------------------------------------------------------------
    # Household
    # ---------------------------------------------------------------------------

    ApplicationHousehold:
      description: Household-level data for an application.
      allOf:
        - $ref: "./schemas/common/household.yaml"
        - type: object
          required:
            - id
            - applicationId
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    ApplicationHouseholdUpdate:
      allOf:
        - $ref: "./schemas/common/household.yaml"
        - type: object
          minProperties: 1

    # ---------------------------------------------------------------------------
    # Application Notes
    # ---------------------------------------------------------------------------

    ApplicationNoteWritable:
      type: object
      description: >
        Client-writable fields for an application note. additionalProperties allows
        states to extend with note types, visibility controls, or other attributes
        via overlay without changing the baseline schema.
      additionalProperties: true
      properties:
        scope:
          type: string
          description: >
            The scope at which this note was recorded. application — general note about
            the application; member — note about a specific household member; section —
            note about a data category, optionally for a specific member.
          enum:
            - application
            - member
            - section
        memberId:
          type: string
          format: uuid
          nullable: true
          description: Member this note is about. Required when scope is member or when scope is section and the note is member-specific.
          x-relationship:
            resource: ApplicationMember
        section:
          description: Section this note is about. Required when scope is section.
          oneOf:
            - $ref: "#/components/schemas/ReviewSection"
            - type: "null"
        text:
          type: string
          description: The note text. Interpret according to textFormat.
          minLength: 1
          maxLength: 5000
        textFormat:
          type: string
          description: Format of the text field. Consumers must render accordingly. Absent or plain means unformatted text.
          default: plain
          enum:
            - plain
            - markdown
            - html

    ApplicationNote:
      description: A caseworker observation recorded against an application, member, or section.
      allOf:
        - $ref: "#/components/schemas/ApplicationNoteWritable"
        - type: object
          required:
            - id
            - applicationId
            - scope
            - text
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    ApplicationNoteCreate:
      allOf:
        - $ref: "#/components/schemas/ApplicationNoteWritable"
        - type: object
          required:
            - scope
            - text

    ApplicationNoteList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ApplicationNote"

    ApplicationNoteUpdate:
      allOf:
        - $ref: "#/components/schemas/ApplicationNoteWritable"
        - type: object
          minProperties: 1

    # ---------------------------------------------------------------------------
    # Verification
    # ---------------------------------------------------------------------------

    VerificationWritable:
      type: object
      description: Client-writable fields for a verification obligation record.
      properties:
        sourceId:
          type: string
          format: uuid
          description: >
            ID of the subject being verified. Points to an ApplicationMember when sourceType
            is `member`, or to an income record when sourceType is `income`. Null for
            household-level obligations (e.g., proof of residency).
          nullable: true
          x-relationship:
            resource: Polymorphic
        sourceType:
          type: string
          description: >
            Identifies what sourceId refers to. Required when sourceId is set; null for
            household-level obligations.
          nullable: true
          enum:
            - member
            - income
        category:
          type: string
          description: Verification obligation category.
          enum:
            - citizenship
            - identity
            - immigration
            - income
            - residency
        verificationType:
          type: string
          description: How this verification obligation is to be fulfilled.
          enum:
            - document
            - electronic

    Verification:
      description: >
        One item on the household's verification checklist, covering both
        electronic service check results and paper document requirements on a
        single lifecycle. Created automatically by state machine event handlers
        at submission — not manually by caseworkers. The two-phase flow (electronic
        check first, document request only if inconclusive) directly encodes the
        ex parte rule (42 CFR § 435.940).
      allOf:
        - $ref: "#/components/schemas/VerificationWritable"
        - type: object
          required:
            - id
            - applicationId
            - category
            - status
            - evidence
            - documentRequests
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            status:
              type: string
              description: Current status of the verification obligation.
              readOnly: true
              enum:
                - pending
                - inconclusive
                - satisfied
                - waived
                - cannot_verify
            evidence:
              type: array
              description: Electronic and document evidence items accumulated against this obligation.
              readOnly: true
              items:
                $ref: "#/components/schemas/VerificationEvidenceItem"
            documentRequests:
              type: array
              description: Outbound document request notices sent to the applicant for this obligation.
              readOnly: true
              items:
                $ref: "#/components/schemas/VerificationDocumentRequest"
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    VerificationCreate:
      allOf:
        - $ref: "#/components/schemas/VerificationWritable"
        - type: object
          required:
            - category

    VerificationUpdate:
      allOf:
        - $ref: "#/components/schemas/VerificationWritable"
        - type: object
          minProperties: 1

    VerificationList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Verification"

    # ---------------------------------------------------------------------------
    # Interview
    # ---------------------------------------------------------------------------

    InterviewWritable:
      type: object
      description: Caseworker-writable fields for an interview obligation record.
      properties:
        waiverGranted:
          type:
            - boolean
            - "null"
          description: Whether the interview requirement has been waived for this applicant.
        waiverReason:
          type: string
          description: Reason the interview was waived. Required when waiverGranted is true.
          nullable: true
        completedAt:
          type: string
          format: date-time
          description: When the caseworker attested the interview obligation was satisfied. Null until completed.
          nullable: true

    Interview:
      description: >
        Tracks the required SNAP interview obligation for an application
        (7 CFR § 273.2(e)). Distinct from individual appointments — one
        interview requirement may span multiple appointments due to rescheduling
        or no-shows. The caseworker explicitly sets completedAt to attest
        which appointment satisfied the regulatory obligation; this is not
        set automatically when an appointment ends.
      allOf:
        - $ref: "#/components/schemas/InterviewWritable"
        - type: object
          required:
            - id
            - applicationId
            - appointments
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            appointments:
              type: array
              description: Appointment IDs from the scheduling domain accumulated for this interview obligation. Populated by the rules engine when scheduling.appointment.scheduled fires.
              readOnly: true
              items:
                type: string
                format: uuid
                x-relationship:
                  resource: External
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    InterviewUpdate:
      allOf:
        - $ref: "#/components/schemas/InterviewWritable"
        - type: object
          minProperties: 1

    # ---------------------------------------------------------------------------
    # Review context and progress
    # ---------------------------------------------------------------------------

    ReviewContext:
      type: object
      description: >
        Read-only composite view of a complete application assembled server-side.
        Returned by GET /applications/{id}/review-context. The front end organizes
        this data for whatever review workflow the state uses. All sub-resource
        mutations go through the individual sub-resource endpoints.
      required:
        - application
        - members
        - reviewProgress
        - notes
      properties:
        application:
          $ref: "#/components/schemas/Application"
        householdInfo:
          description: Household-level data for the application, or null if not yet recorded.
          oneOf:
            - $ref: "#/components/schemas/ApplicationHousehold"
            - type: "null"
        members:
          type: array
          description: All household members with their sub-resources embedded.
          items:
            $ref: "#/components/schemas/ReviewContextMember"
        reviewProgress:
          type: array
          description: Current review-progress entries. Empty until the application transitions to under_review.
          items:
            $ref: "#/components/schemas/ReviewProgressEntry"
        notes:
          type: array
          description: All notes recorded against this application.
          items:
            $ref: "#/components/schemas/ApplicationNote"

    ReviewContextMember:
      description: An application member with all sub-resources embedded for the caseworker review view.
      allOf:
        - $ref: "#/components/schemas/ApplicationMember"
        - type: object
          properties:
            incomes:
              type: array
              description: Income records for this member.
              items:
                $ref: "#/components/schemas/MemberIncome"
            expenses:
              type: array
              description: Expense records for this member.
              items:
                $ref: "#/components/schemas/MemberExpense"
            assets:
              type: array
              description: Asset records for this member.
              items:
                $ref: "#/components/schemas/MemberAsset"
            employmentRecords:
              type: array
              description: Employment records for this member.
              items:
                $ref: "#/components/schemas/MemberEmployment"
            healthCoverages:
              type: array
              description: Health coverage records for this member.
              items:
                $ref: "#/components/schemas/MemberHealthCoverage"

    ReviewProgressEntryWritable:
      type: object
      description: Client-writable fields for a review-progress entry.
      additionalProperties: true
      properties:
        section:
          $ref: "#/components/schemas/ReviewSection"
          description: The review section this entry covers. Baseline taxonomy is extensible via overlay.
        memberId:
          type: string
          format: uuid
          nullable: true
          description: Member this entry is scoped to. Absent for household-level sections.
          x-relationship:
            resource: ApplicationMember
        status:
          type: string
          description: Review status for this section.
          enum:
            - not_started
            - in_progress
            - complete
            - flagged

    ReviewProgressEntry:
      description: >
        Tracks caseworker review progress for one section, optionally scoped to a
        specific member. Section-only entries (memberId absent) cover household-level
        sections; member-scoped entries cover per-member sections.
      allOf:
        - $ref: "#/components/schemas/ReviewProgressEntryWritable"
        - type: object
          required:
            - id
            - applicationId
            - section
            - status
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    ReviewProgressList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ReviewProgressEntry"

    ReviewSection:
      type: string
      description: Taxonomy of review sections in the caseworker workflow. Extensible via overlay.
      enum:
        - assets
        - contact
        - demographics
        - employment
        - expenses
        - health-coverage
        - household
        - identity
        - income

    VerificationDocumentEvidence:
      type: object
      description: A document submitted as evidence against a verification obligation.
      required:
        - type
        - documentId
        - receivedAt
      properties:
        type:
          type: string
          enum:
            - document
        documentId:
          type: string
          format: uuid
          description: ID of the verified document in the document-management domain.
          x-relationship:
            resource: External
        receivedAt:
          type: string
          format: date-time
          description: When the document was received.
        reviewedAt:
          type: string
          format: date-time
          nullable: true
          description: When a caseworker reviewed the document.
        reviewedBy:
          type: string
          format: uuid
          nullable: true
          description: ID of the caseworker who reviewed the document.

    VerificationDocumentRequest:
      type: object
      description: An outbound notice requesting documents from an applicant for a verification obligation.
      required:
        - noticeId
        - type
        - sentAt
      properties:
        noticeId:
          type: string
          format: uuid
          description: ID of the notice in the communication domain.
          x-relationship:
            resource: External
        type:
          type: string
          description: Template identifier for the notice. Matches the type field on the communication.notice.sent event.
          enum:
            - document_request_citizenship_verification
            - document_request_identity_verification
            - document_request_immigration_verification
            - document_request_income_verification
            - document_request_residency_verification
        sentAt:
          type: string
          format: date-time
          description: When the notice was sent.
        dueAt:
          type: string
          format: date-time
          nullable: true
          description: Deadline by which the applicant must respond.
        channel:
          type: string
          nullable: true
          description: Channel through which the notice was sent.
          enum:
            - email
            - in_person
            - mail
            - portal

    VerificationElectronicEvidence:
      type: object
      description: An electronic service check result recorded as evidence against a verification obligation.
      required:
        - type
        - source
        - result
        - receivedAt
      properties:
        type:
          type: string
          enum:
            - electronic
        source:
          type: string
          description: The external service that produced this result.
          enum:
            - fdsh_fti
            - fdsh_ssa
            - fdsh_vlp
            - save
            - ssa_ievs
        result:
          type: string
          description: Whether the service check confirmed the obligation.
          enum:
            - conclusive
            - inconclusive
        serviceCallId:
          type: string
          format: uuid
          description: ID of the data-exchange service call that produced this result.
          x-relationship:
            resource: External
        receivedAt:
          type: string
          format: date-time
          description: When the result was received.

    VerificationEvidenceItem:
      description: An electronic or document evidence item accumulated against a verification obligation.
      oneOf:
        - $ref: "#/components/schemas/VerificationElectronicEvidence"
        - $ref: "#/components/schemas/VerificationDocumentEvidence"
      discriminator:
        propertyName: type
        mapping:
          electronic: "#/components/schemas/VerificationElectronicEvidence"
          document: "#/components/schemas/VerificationDocumentEvidence"

