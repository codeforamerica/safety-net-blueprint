openapi: 3.1.0
info:
  title: Intake Service API
  version: 0.1.0
  x-domain: intake
  x-status: alpha
  x-visibility: public
  description: |
    REST API for managing public assistance applications. This is the minimal
    baseline — ApplicationMember, Income, Expense, and Asset sub-resources
    are added incrementally as the intake domain is built out.

    > **Status: Alpha** — Breaking changes expected.

  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/intake
    description: Production server
  - url: http://localhost:1080/intake
    description: Local development server

tags:
  - name: Applications
    description: Manage public assistance applications.
  - name: Verifications
    description: Application verification obligations — electronic check results and document evidence.
  - name: Interviews
    description: SNAP interview obligation tracking.
  - name: Members
    description: Household members included in an application.

x-events:
  application.created:
    type: org.codeforamerica.safety-net-blueprint.intake.application.created
    summary: Emitted when an application record is first created (auto-emitted on POST)
    payload:
      $ref: "#/components/schemas/ApplicationCreatedEvent"
  application.submitted:
    type: org.codeforamerica.safety-net-blueprint.intake.application.submitted
    summary: Emitted when an applicant formally submits their application; starts the regulatory clock
    payload:
      $ref: "#/components/schemas/ApplicationSubmittedEvent"
  application.opened:
    type: org.codeforamerica.safety-net-blueprint.intake.application.opened
    summary: Emitted when a caseworker begins active review of the application
    payload:
      $ref: "#/components/schemas/ApplicationOpenedEvent"
  application.withdrawn:
    type: org.codeforamerica.safety-net-blueprint.intake.application.withdrawn
    summary: Emitted when an application is withdrawn; triggers open task cancellation
    payload:
      $ref: "#/components/schemas/ApplicationWithdrawnEvent"
  application.closed:
    type: org.codeforamerica.safety-net-blueprint.intake.application.closed
    summary: Emitted when intake is complete and the application is ready for eligibility determination
    payload:
      $ref: "#/components/schemas/ApplicationClosedEvent"
  application.expedited_flagged:
    type: org.codeforamerica.safety-net-blueprint.intake.application.expedited_flagged
    summary: Emitted when an application is flagged for expedited processing
    payload:
      $ref: "#/components/schemas/ApplicationExpeditedFlaggedEvent"
  application.review_completed:
    type: org.codeforamerica.safety-net-blueprint.intake.application.review_completed
    summary: Emitted when a caseworker signals data collection is complete; triggers eligibility determination. No state change.
    payload:
      $ref: "#/components/schemas/ApplicationReviewCompletedEvent"
  application.updated:
    type: org.codeforamerica.safety-net-blueprint.intake.application.updated
    summary: Emitted when application fields are updated via PATCH (auto-emitted)
    payload:
      $ref: "#/components/schemas/ApplicationUpdatedEvent"
  application.deleted:
    type: org.codeforamerica.safety-net-blueprint.intake.application.deleted
    summary: Emitted when an application is deleted (auto-emitted on DELETE)
    payload:
      $ref: "#/components/schemas/ApplicationDeletedEvent"

paths:
  /applications:
    get:
      summary: List applications
      description: Retrieve a paginated list of applications.
      operationId: listApplications
      tags:
        - Applications
      x-sortable:
        # submittedAt is user-meaningful but caseworker recency triage needs it;
        # threat model assumes listApplications scope implies record-read (A01:2025).
        fields: [createdAt, updatedAt, submittedAt, status]
        default: -submittedAt
        tieBreaker: id
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - $ref: "./components/parameters.yaml#/SortParam"
      responses:
        "200":
          description: A paginated collection of applications.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create an application
      description: Create a new public assistance application in draft status.
      operationId: createApplication
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreate"
      responses:
        "201":
          description: Application created successfully.
          headers:
            Location:
              description: URL of the newly created application resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: Get an application
      description: Retrieve a single application by identifier.
      operationId: getApplication
      tags:
        - Applications
      responses:
        "200":
          description: Application retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
              examples:
                ApplicationExample1:
                  $ref: "#/components/examples/ApplicationExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update an application
      description: Apply partial updates to a draft or under-review application.
      operationId: updateApplication
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: Application updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete an application
      description: Permanently remove a draft application record.
      operationId: deleteApplication
      tags:
        - Applications
      responses:
        "204":
          description: Application deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/verifications:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: List application verifications
      description: Retrieve all verification obligations for a specific application.
      operationId: listApplicationVerifications
      tags:
        - Verifications
      x-sortable:
        fields: [createdAt, updatedAt, category, status]
        # Group by category, oldest request first within each.
        default: category,createdAt
        tieBreaker: id
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - $ref: "./components/parameters.yaml#/SortParam"
      responses:
        "200":
          description: A paginated list of application verifications.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create a verification obligation
      description: Create a verification obligation scoped to this application. Under normal circumstances verifications are created by the rules engine at submission; this endpoint supports caseworker-initiated obligations.
      operationId: createApplicationVerification
      tags:
        - Verifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationCreate"
      responses:
        "201":
          description: Verification created successfully.
          headers:
            Location:
              description: URL of the newly created verification resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/verifications/{verificationId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/VerificationIdParam"

    get:
      summary: Get a verification obligation
      description: Retrieve a single verification obligation by identifier.
      operationId: getApplicationVerification
      tags:
        - Verifications
      responses:
        "200":
          description: Verification retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a verification obligation
      description: Apply partial updates to a verification obligation.
      operationId: updateApplicationVerification
      tags:
        - Verifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationUpdate"
      responses:
        "200":
          description: Verification updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete a verification obligation
      description: Remove a verification obligation from this application.
      operationId: deleteApplicationVerification
      tags:
        - Verifications
      responses:
        "204":
          description: Verification deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/interview:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: Get the interview
      description: Retrieve the SNAP interview obligation record for this application.
      operationId: getInterview
      tags:
        - Interviews
      responses:
        "200":
          description: Interview retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interview"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update the interview
      description: Apply partial updates to the interview record (e.g., set waiverGranted, record completedAt).
      operationId: updateInterview
      tags:
        - Interviews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewUpdate"
      responses:
        "200":
          description: Interview updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interview"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/members:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"

    get:
      summary: List application members
      description: Retrieve all household members linked to this application.
      operationId: listApplicationMembers
      tags:
        - Members
      x-sortable:
        # name.* needed for alphabetical browse; ssn/dateOfBirth excluded —
        # sort order is an oracle even when fields aren't projected (A01:2025).
        fields: [createdAt, updatedAt, name.lastName, name.firstName]
        default: name.lastName,name.firstName
        tieBreaker: id
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - $ref: "./components/parameters.yaml#/SortParam"
      responses:
        "200":
          description: A paginated list of application members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMemberList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Add a member
      description: Add a household member to this application.
      operationId: createApplicationMember
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationMemberCreate"
      responses:
        "201":
          description: Member added successfully.
          headers:
            Location:
              description: URL of the newly created member resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMember"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  /applications/{applicationId}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/ApplicationIdParam"
      - $ref: "#/components/parameters/MemberIdParam"

    get:
      summary: Get a member
      description: Retrieve a single household member by identifier.
      operationId: getApplicationMember
      tags:
        - Members
      responses:
        "200":
          description: Member retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMember"
              examples:
                MemberExample1:
                  $ref: "#/components/examples/MemberExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a member
      description: Apply partial updates to a household member record.
      operationId: updateApplicationMember
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationMemberUpdate"
      responses:
        "200":
          description: Member updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationMember"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Remove a member
      description: Remove a household member from this application.
      operationId: deleteApplicationMember
      tags:
        - Members
      responses:
        "204":
          description: Member removed successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

components:
  parameters:
    ApplicationIdParam:
      name: applicationId
      in: path
      required: true
      description: Unique identifier of the application.
      schema:
        type: string
        format: uuid

    VerificationIdParam:
      name: verificationId
      in: path
      required: true
      description: Unique identifier of the verification obligation.
      schema:
        type: string
        format: uuid

    MemberIdParam:
      name: memberId
      in: path
      required: true
      description: Unique identifier of the application member.
      schema:
        type: string
        format: uuid

  schemas:
    ApplicationWritable:
      type: object
      description: Client-writable fields for an application.
      properties:
        programs:
          type: array
          description: Programs the household is applying for. At least one required at submission.
          items:
            type: string
            enum:
              - snap
              - medicaid
              - tanf
        channel:
          type: string
          description: How the application was filed.
          enum:
            - online
            - in_person
            - phone
            - mail

    Application:
      allOf:
        - $ref: "#/components/schemas/ApplicationWritable"
        - type: object
          required:
            - id
            - status
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              description: Unique identifier for the application.
              readOnly: true
            status:
              type: string
              description: Current lifecycle status of the application.
              readOnly: true
              enum:
                - draft
                - submitted
                - under_review
                - withdrawn
                - closed
            isExpedited:
              type:
                - boolean
                - "null"
              description: Whether the application qualifies for expedited processing (e.g., SNAP 7-day track). Set during caseworker expedited screening after submission. Null until screening is complete.
              readOnly: true
            submittedAt:
              type: string
              format: date-time
              description: When the application was formally submitted. Null until submitted.
              readOnly: true
              nullable: true
            withdrawnAt:
              type: string
              format: date-time
              description: When the application was withdrawn. Null unless withdrawn.
              readOnly: true
              nullable: true
            closedAt:
              type: string
              format: date-time
              description: When the intake phase closed. Null until closed.
              readOnly: true
              nullable: true
            createdAt:
              type: string
              format: date-time
              description: When the application record was created.
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              description: When the application record was last modified.
              readOnly: true

    ApplicationCreate:
      allOf:
        - $ref: "#/components/schemas/ApplicationWritable"
        - type: object
          required:
            - programs

    ApplicationUpdate:
      allOf:
        - $ref: "#/components/schemas/ApplicationWritable"
        - type: object
          minProperties: 1

    ApplicationList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Application"

    # ---------------------------------------------------------------------------
    # ApplicationMember
    # ---------------------------------------------------------------------------

    ApplicationMemberWritable:
      type: object
      description: Client-writable fields for an application member.
      properties:
        roles:
          type: array
          description: Roles this person plays in the application.
          items:
            type: string
            enum:
              - primary_applicant
              - household_member
              - non_applying_member
              - authorized_representative
              - absent_parent
        programsApplyingFor:
          type: array
          description: Programs this member is applying for. Subset of the application's programs.
          items:
            type: string
            enum:
              - snap
              - medicaid
              - tanf
        citizenshipStatus:
          type: string
          description: Citizenship or immigration status for this member.
          enum:
            - citizen
            - permanent_resident
            - qualified_non_citizen
            - undocumented
            - other
        immigrationInfo:
          $ref: "./components/identity.yaml#/ImmigrationInfo"
          description: Immigration document details. Required when citizenshipStatus is not citizen and the member is applying for Medicaid.

    ApplicationMember:
      allOf:
        - $ref: "#/components/schemas/ApplicationMemberWritable"
        - type: object
          required:
            - id
            - applicationId
            - roles
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    ApplicationMemberCreate:
      allOf:
        - $ref: "#/components/schemas/ApplicationMemberWritable"
        - type: object
          required:
            - roles

    ApplicationMemberUpdate:
      allOf:
        - $ref: "#/components/schemas/ApplicationMemberWritable"
        - type: object
          minProperties: 1

    ApplicationMemberList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ApplicationMember"

    # ---------------------------------------------------------------------------
    # Verification
    # ---------------------------------------------------------------------------

    VerificationWritable:
      type: object
      description: Client-writable fields for a verification obligation record.
      properties:
        memberId:
          type: string
          format: uuid
          description: Member this obligation is for. Null for household-level obligations (e.g., proof of residency).
          nullable: true
          x-relationship:
            resource: ApplicationMember
        category:
          type: string
          description: Verification obligation category.
          enum:
            - citizenship
            - identity
            - immigration
            - income
            - residency

    Verification:
      allOf:
        - $ref: "#/components/schemas/VerificationWritable"
        - type: object
          required:
            - id
            - applicationId
            - category
            - status
            - evidence
            - documentRequests
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            status:
              type: string
              description: Current status of the verification obligation.
              readOnly: true
              enum:
                - pending
                - inconclusive
                - satisfied
                - waived
                - cannot_verify
            evidence:
              type: array
              description: Electronic and document evidence items accumulated against this obligation.
              readOnly: true
              items:
                $ref: "#/components/schemas/VerificationEvidenceItem"
            documentRequests:
              type: array
              description: Outbound document request notices sent to the applicant for this obligation.
              readOnly: true
              items:
                $ref: "#/components/schemas/VerificationDocumentRequest"
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    VerificationCreate:
      allOf:
        - $ref: "#/components/schemas/VerificationWritable"
        - type: object
          required:
            - category

    VerificationUpdate:
      allOf:
        - $ref: "#/components/schemas/VerificationWritable"
        - type: object
          minProperties: 1

    VerificationList:
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Verification"

    # ---------------------------------------------------------------------------
    # Interview
    # ---------------------------------------------------------------------------

    InterviewWritable:
      type: object
      description: Caseworker-writable fields for an interview obligation record.
      properties:
        waiverGranted:
          type:
            - boolean
            - "null"
          description: Whether the interview requirement has been waived for this applicant.
        waiverReason:
          type: string
          description: Reason the interview was waived. Required when waiverGranted is true.
          nullable: true
        completedAt:
          type: string
          format: date-time
          description: When the caseworker attested the interview obligation was satisfied. Null until completed.
          nullable: true

    Interview:
      allOf:
        - $ref: "#/components/schemas/InterviewWritable"
        - type: object
          required:
            - id
            - applicationId
            - appointments
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            applicationId:
              type: string
              format: uuid
              readOnly: true
              x-relationship:
                resource: Application
            appointments:
              type: array
              description: Appointment IDs from the scheduling domain accumulated for this interview obligation. Populated by the rules engine when scheduling.appointment.scheduled fires.
              readOnly: true
              items:
                type: string
                format: uuid
                x-relationship:
                  resource: External
            createdAt:
              type: string
              format: date-time
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              readOnly: true

    InterviewUpdate:
      allOf:
        - $ref: "#/components/schemas/InterviewWritable"
        - type: object
          minProperties: 1

    # Event payload schemas — referenced by x-events section above

    ApplicationReviewCompletedEvent:
      type: object
      description: Payload for application.review_completed — signals data collection is complete; triggers eligibility determination.
      required:
        - reviewCompletedAt
      properties:
        reviewCompletedAt:
          type: string
          format: date-time
          description: When the caseworker signaled review was complete.

    ApplicationClosedEvent:
      type: object
      description: Payload for application.closed — signals intake is complete.
      required:
        - closedAt
      properties:
        closedAt:
          type: string
          format: date-time
          description: When the intake phase closed.

    ApplicationCreatedEvent:
      description: Snapshot of the newly created application resource.
      $ref: "#/components/schemas/Application"

    ApplicationDeletedEvent:
      type: object
      description: Payload for application.deleted — auto-emitted when an application record is permanently removed.
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the deleted application.

    ApplicationExpeditedFlaggedEvent:
      type: object
      description: Payload for application.expedited_flagged — triggers escalation to expedited SLA track.
      required:
        - flaggedAt
      properties:
        flaggedAt:
          type: string
          format: date-time
          description: When the expedited flag was set.

    ApplicationOpenedEvent:
      type: object
      description: Payload for application.opened — signals caseworker has begun active review.
      required:
        - openedAt
        - programs
      properties:
        openedAt:
          type: string
          format: date-time
          description: When the application moved to under_review.
        programs:
          type: array
          description: Programs the household is applying for. Included so downstream systems can fan out per-program work after intake screening (see Decision 15).
          items:
            type: string
            enum:
              - snap
              - medicaid
              - tanf

    ApplicationSubmittedEvent:
      type: object
      description: Payload for application.submitted — starts the regulatory clock; triggers program-type-aware routing (see Decision 15).
      required:
        - submittedAt
        - programs
      properties:
        submittedAt:
          type: string
          format: date-time
          description: When the application was formally submitted.
        programs:
          type: array
          description: Programs the household is applying for. Consumers route per program type — not all programs generate caseworker tasks at submission.
          items:
            type: string
            enum:
              - snap
              - medicaid
              - tanf
        channel:
          type: string
          description: How the application was filed.
          enum:
            - online
            - in_person
            - phone
            - mail
        isExpedited:
          type:
            - boolean
            - "null"
          description: Whether expedited screening has already determined the application qualifies. Null if not yet screened.

    ApplicationUpdatedEvent:
      type: object
      description: Payload for application.updated — auto-emitted on PATCH; contains only the fields that changed.
      additionalProperties: true

    ApplicationWithdrawnEvent:
      type: object
      description: Payload for application.withdrawn — triggers open task cancellation and withdrawal notice.
      required:
        - withdrawnAt
      properties:
        withdrawnAt:
          type: string
          format: date-time
          description: When the application was withdrawn.
        reason:
          type: string
          description: Why the application was withdrawn.

    VerificationDocumentEvidence:
      type: object
      description: A document submitted as evidence against a verification obligation.
      required:
        - type
        - documentId
        - receivedAt
      properties:
        type:
          type: string
          enum:
            - document
        documentId:
          type: string
          format: uuid
          description: ID of the verified document in the document-management domain.
          x-relationship:
            resource: External
        receivedAt:
          type: string
          format: date-time
          description: When the document was received.
        reviewedAt:
          type: string
          format: date-time
          nullable: true
          description: When a caseworker reviewed the document.
        reviewedBy:
          type: string
          format: uuid
          nullable: true
          description: ID of the caseworker who reviewed the document.

    VerificationDocumentRequest:
      type: object
      description: An outbound notice requesting documents from an applicant for a verification obligation.
      required:
        - noticeId
        - sentAt
      properties:
        noticeId:
          type: string
          format: uuid
          description: ID of the notice in the communication domain.
          x-relationship:
            resource: External
        sentAt:
          type: string
          format: date-time
          description: When the notice was sent.
        dueAt:
          type: string
          format: date-time
          nullable: true
          description: Deadline by which the applicant must respond.
        channel:
          type: string
          nullable: true
          description: Channel through which the notice was sent.
          enum:
            - email
            - in_person
            - mail
            - portal

    VerificationElectronicEvidence:
      type: object
      description: An electronic service check result recorded as evidence against a verification obligation.
      required:
        - type
        - source
        - result
        - receivedAt
      properties:
        type:
          type: string
          enum:
            - electronic
        source:
          type: string
          description: The external service that produced this result.
          enum:
            - fdsh_fti
            - fdsh_ssa
            - fdsh_vlp
            - save
            - ssa_ievs
        result:
          type: string
          description: Whether the service check confirmed the obligation.
          enum:
            - conclusive
            - inconclusive
        serviceCallId:
          type: string
          format: uuid
          description: ID of the data-exchange service call that produced this result.
          x-relationship:
            resource: External
        receivedAt:
          type: string
          format: date-time
          description: When the result was received.

    VerificationEvidenceItem:
      description: An electronic or document evidence item accumulated against a verification obligation.
      oneOf:
        - $ref: "#/components/schemas/VerificationElectronicEvidence"
        - $ref: "#/components/schemas/VerificationDocumentEvidence"
      discriminator:
        propertyName: type
        mapping:
          electronic: "#/components/schemas/VerificationElectronicEvidence"
          document: "#/components/schemas/VerificationDocumentEvidence"

