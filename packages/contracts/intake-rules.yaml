$schema: ./schemas/rules-schema.yaml
version: "1.0"
domain: intake
resource: intake/applications
ruleSets:
  - id: task-claimed-open-application
    "on": workflow.task.claimed
    evaluation: first-match-wins
    context:
      - as: task
        entity: workflow/tasks
        from:
          var: subject
      - as: application
        entity: intake/applications
        from:
          var: task.subjectId
        optional: true
    rules:
      - id: open-application-on-intake-task-claim
        order: 1
        condition:
          and:
            - "!=":
                - var: application.id
                - null
            - "==":
                - var: task.taskType
                - application_review
            - "==":
                - var: application.status
                - submitted
        action:
          triggerTransition:
            entity: intake/applications
            idFrom: application.id
            transition: open
        description: |
          When a caseworker claims an application_review task, transition the linked application from submitted to under_review. Guards on the intake open transition enforce that only system-role callers can execute this.
  - id: task-claimed-create-interview
    "on": workflow.task.claimed
    evaluation: first-match-wins
    context:
      - as: task
        entity: workflow/tasks
        from:
          var: subject
    rules:
      - id: create-interview-on-task-claim
        order: 1
        condition:
          "==":
            - var: task.taskType
            - application_review
        action:
          createResource:
            entity: intake/applications/interview
            fields:
              applicationId:
                var: task.subjectId
        description: Create an Interview record when a caseworker claims an application_review task; the Interview tracks the SNAP regulatory obligation and will accumulate appointment IDs as they are scheduled
  - id: application-submitted-data-exchange
    "on": intake.application.submitted
    evaluation: all-match
    context:
      - as: application
        entity: intake/applications
        from:
          var: subject
      - as: members
        entity: intake/application-members
        where:
          "==":
            - var: applicationId
            - var: application.id
    rules:
      - id: fdsh-ssa
        order: 1
        condition:
          or:
            - in:
                - snap
                - var: application.programs
            - in:
                - medicaid
                - var: application.programs
        action:
          forEach:
            in:
              var: members
            as: member
            createResource:
              entity: data-exchange/service-calls
              fields:
                applicationId:
                  var: application.id
                memberId:
                  var: member.id
                serviceType: fdsh_ssa
                requestedAt:
                  var: this.time
        description: |
          SSA Composite via FDSH for SNAP or Medicaid applicants. Verifies SSN, US-born citizenship, RSDI/SSDI benefit amounts, and incarceration status.
      - id: ssa-ievs
        order: 2
        condition:
          or:
            - in:
                - snap
                - var: application.programs
            - in:
                - medicaid
                - var: application.programs
        action:
          forEach:
            in:
              var: members
            as: member
            createResource:
              entity: data-exchange/service-calls
              fields:
                applicationId:
                  var: application.id
                memberId:
                  var: member.id
                serviceType: ssa_ievs
                requestedAt:
                  var: this.time
        description: |
          SSA SVES/SOLQ via IEVS for SNAP or Medicaid applicants. Returns Title II and Title XVI benefit data and 40-quarter work history (7 CFR § 272.8).
      - id: irs-ievs
        order: 3
        condition:
          in:
            - snap
            - var: application.programs
        action:
          forEach:
            in:
              var: members
            as: member
            createResource:
              entity: data-exchange/service-calls
              fields:
                applicationId:
                  var: application.id
                memberId:
                  var: member.id
                serviceType: irs_ievs
                requestedAt:
                  var: this.time
        description: |
          IRS unearned income via IEVS for SNAP applicants. Returns prior-year unearned income (interest, dividends, capital gains) (7 CFR § 272.8).
      - id: swica
        order: 4
        condition:
          in:
            - snap
            - var: application.programs
        action:
          forEach:
            in:
              var: members
            as: member
            createResource:
              entity: data-exchange/service-calls
              fields:
                applicationId:
                  var: application.id
                memberId:
                  var: member.id
                serviceType: swica
                requestedAt:
                  var: this.time
        description: |
          State Wage Information (SWICA) for SNAP applicants. Returns quarterly employer-reported wages (7 CFR § 272.8).
      - id: uib
        order: 5
        condition:
          in:
            - snap
            - var: application.programs
        action:
          forEach:
            in:
              var: members
            as: member
            createResource:
              entity: data-exchange/service-calls
              fields:
                applicationId:
                  var: application.id
                memberId:
                  var: member.id
                serviceType: uib
                requestedAt:
                  var: this.time
        description: |
          Unemployment Insurance Benefits for SNAP applicants. Returns UI claim status and weekly benefit amount (7 CFR § 272.8).
      - id: fdsh-vlp
        order: 6
        condition:
          in:
            - medicaid
            - var: application.programs
        action:
          forEach:
            in:
              var: members
            as: member
            filter:
              "!=":
                - var: member.citizenshipStatus
                - citizen
            createResource:
              entity: data-exchange/service-calls
              fields:
                applicationId:
                  var: application.id
                memberId:
                  var: member.id
                serviceType: fdsh_vlp
                requestedAt:
                  var: this.time
                metadata:
                  intake:
                    applicationId:
                      var: application.id
                    memberId:
                      var: member.id
        description: |
          Verify Lawful Presence via FDSH for Medicaid applicants (45 CFR § 435.956). Fans out per non-citizen member (citizenshipStatus != citizen). Routes to SAVE for members whose immigrationInfo carries no document number.
  - id: vlp-inconclusive-initiate-save
    "on": data_exchange.call.completed
    evaluation: first-match-wins
    rules:
      - id: save-on-vlp-inconclusive
        order: 1
        condition:
          and:
            - "==":
                - var: this.data.serviceType
                - fdsh_vlp
            - "==":
                - var: this.data.result
                - inconclusive
        action:
          createResource:
            entity: data-exchange/service-calls
            fields:
              applicationId:
                var: this.data.metadata.intake.applicationId
              memberId:
                var: this.data.metadata.intake.memberId
              serviceType: save
              requestedAt:
                var: this.time
        description: |
          Initiate USCIS SAVE when FDSH VLP returns inconclusive for a member (45 CFR § 435.956(b)(2)). VLP is the primary check; SAVE is the fallback.
  - id: application-submitted-document-checklist
    "on": intake.application.submitted
    evaluation: all-match
    context:
      - as: application
        entity: intake/applications
        from:
          var: subject
    rules:
      - id: snap-income-document
        order: 1
        condition:
          in:
            - snap
            - var: application.programs
        action:
          createResource:
            entity: intake/applications/documents
            fields:
              applicationId:
                var: application.id
              category: income
        description: Request income documentation for SNAP applicants (Decision 16).
      - id: snap-identity-document
        order: 2
        condition:
          in:
            - snap
            - var: application.programs
        action:
          createResource:
            entity: intake/applications/documents
            fields:
              applicationId:
                var: application.id
              category: identity
        description: Request identity documentation for SNAP applicants (Decision 16).
      - id: snap-residency-document
        order: 3
        condition:
          in:
            - snap
            - var: application.programs
        action:
          createResource:
            entity: intake/applications/documents
            fields:
              applicationId:
                var: application.id
              category: residency
        description: Request residency documentation for SNAP applicants (Decision 16).
      - id: medicaid-identity-document
        order: 4
        condition:
          in:
            - medicaid
            - var: application.programs
        action:
          createResource:
            entity: intake/applications/documents
            fields:
              applicationId:
                var: application.id
              category: identity
        description: Request identity documentation for Medicaid applicants (Decision 16).
  - id: verification-result-write-back
    "on": data_exchange.call.completed
    evaluation: first-match-wins
    rules:
      - id: append-verification-to-member
        order: 1
        condition: true
        action:
          appendToArray:
            entity: intake/applications/members
            idFrom: this.data.metadata.intake.memberId
            field: verifications
            value:
              type:
                var: this.data.verificationType
              status:
                var: this.data.result
              source:
                var: this.data.serviceType
              checkedAt:
                var: this.time
        description: Write electronic verification result back to ApplicationMember.verifications (Decision 17)
  - id: fdsh-inconclusive-citizenship-document
    "on": data_exchange.call.completed
    evaluation: first-match-wins
    rules:
      - id: create-citizenship-document-on-fdsh-inconclusive
        order: 1
        condition:
          and:
            - "==":
                - var: this.data.serviceType
                - fdsh
            - "==":
                - var: this.data.result
                - inconclusive
        action:
          createResource:
            entity: intake/applications/documents
            fields:
              applicationId:
                var: this.data.metadata.intake.applicationId
              memberId:
                var: this.data.metadata.intake.memberId
              category: citizenship
        description: |
          Request citizenship documentation when FDSH returns an inconclusive result (Decision 14).
          Ex parte verification failed; caseworker must collect paper documentation.
  - id: appointment-scheduled-link-to-interview
    "on": scheduling.appointment.scheduled
    evaluation: first-match-wins
    rules:
      - id: add-appointment-to-interview
        order: 1
        condition:
          "==":
            - var: this.data.subjectType
            - interview
        action:
          appendToArray:
            entity: intake/applications/interview
            idFrom: this.data.subjectId
            field: appointments
            value:
              var: this.subject
        description: |
          Add the scheduled appointment ID to the linked Interview's appointments list (Decision 15).
          Only fires when the appointment's subjectType is "interview", ensuring non-interview
          appointments scheduled via the shared scheduling domain are ignored.
  - id: eligibility-determination-write-back
    "on": eligibility.determination.completed
    evaluation: first-match-wins
    rules:
      - id: append-determination-to-member
        order: 1
        condition: true
        action:
          appendToArray:
            entity: intake/applications/members
            idFrom: this.data.memberId
            field: programDeterminations
            value:
              program:
                var: this.data.program
              outcome:
                var: this.data.outcome
              determinedAt:
                var: this.data.determinedAt
        description: |
          Write eligibility determination outcome back to ApplicationMember.programDeterminations.
          Informational write-back only — does not trigger application close. Medicaid RTE results
          may arrive before intake closes; SNAP results typically arrive after.
  - id: status-transition
    evaluation: first-match-wins
    rules:
      - id: rule-1
        order: 1
        condition:
          and:
            - "!=":
                - var: application.id
                - null
            - "==":
                - var: task.taskType
                - application_review
            - "==":
                - var: application.status
                - submitted
        action:
          triggerTransition:
            entity: intake/applications
            idFrom: application.id
            transition: open
        description: |
          When a caseworker claims an application_review task, transition the linked application from submitted to under_review. Guards on the intake open transition enforce that only system-role callers can execute this.
  - id: document-verified-write-back
    evaluation: first-match-wins
    rules:
      - id: rule-1
        order: 1
        condition:
          "==":
            - var: this.data.subjectType
            - application-document
        action:
          triggerTransition:
            entity: intake/applications/documents
            idFrom: applicationDocument.id
            transition: verify
          appendToArray:
            entity: intake/applications/documents
            idFrom: applicationDocument.id
            field: evidence
            value:
              var: this.subject
        description: |
          Transition the ApplicationDocument to verified and record the document ID in its
          evidence list when document-management reports successful verification (Decision 15).
          Only fires when the document's subjectType is "application-document", ensuring
          documents uploaded in document-management without linking to an ApplicationDocument
          (via subjectType/subjectId) are silently ignored — analogous to an appointment
          scheduled without linking to an interview.
