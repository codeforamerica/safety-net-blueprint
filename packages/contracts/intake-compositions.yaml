# Declarative resource composition definitions for the intake domain.
# Validated against schemas/compositions-schema.yaml.
# Cross-artifact semantic checks (bind field resolution, resource existence)
# are performed by the resolve pipeline.

$schema: "./schemas/compositions-schema.yaml"
version: "1.0"
domain: intake

# Reusable derive expressions for this domain.
# Cross-domain expressions live in ../derives.yaml.
derives:
  # Shared expressions from packages/contracts/derives.yaml are resolved by the
  # resolve pipeline. Inline them here for mock server use until that is built.
  isComplete:
    item: "Object.values($self).every(v => $present(v))"
    collection: "items.length > 0 && items.every(i => Object.values(i).every(v => $present(v)))"
  isIncomplete:
    item: "!Object.values($self).every(v => $present(v))"

compositions:

  # reviewContext — sectionView composite for the caseworker application review workflow.
  #
  # Replaces the hand-authored ReviewContext schema and review-context endpoint.
  # Produces:
  #   GET  /applications/{applicationId}/review              — section index
  #   GET  /applications/{applicationId}/review/{section}    — panel (section + shared panel nodes)
  #   GET  /applications/{applicationId}/review-progress/{section}   — review progress state
  #   PUT  /applications/{applicationId}/review-progress/{section}   — replace review progress state
  #   PATCH /applications/{applicationId}/review-progress/{section}  — partial update
  #
  # Section taxonomy matches the ReviewSection enum in intake-openapi.yaml.
  # Member-scoped sections: demographics, identity, income, employment, health-coverage
  # Household-level sections: assets, contact, expenses, household

  reviewContext:
    compositeType: sectionView
    resource: applications
    endpoint:
      path: /applications/{applicationId}/review
      parentLink: true
    state:
      schema: { $ref: './schemas/intake-compositions-schemas.yaml#/$defs/ReviewProgress' }
      methods: [put, patch]
    views:
      incomplete:
        filter: { $ref: '#/derives/isIncomplete/item' }

    sections:

      # Member-scoped sections — one review-progress entry per member × section

      demographics:
        resource: application-members
        bind: applicationId
        links: true
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          filter: "roles.contains('primary_applicant')"
          fields: [id, firstName, lastName, dateOfBirth, relationshipToHead]

      identity:
        resource: application-members
        bind: applicationId
        include:
          verifications:
            resource: verifications
            bind: applicationId
            filter: "category == 'identity'"
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          filter: "roles.contains('primary_applicant')"
          fields: [id, firstName, lastName, citizenshipStatus, immigrationStatus]

      income:
        resource: member-incomes
        bind: applicationId
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          fields: [id, memberId, type, amount, frequency]

      employment:
        resource: member-employment-records
        bind: applicationId
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          fields: [id, memberId, status, jobTitle]

      health-coverage:
        resource: member-health-coverages
        bind: applicationId
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          fields: [id, memberId, coverageType, planName]

      # Household-level sections — one review-progress entry per section (no memberId)

      assets:
        resource: member-assets
        bind: applicationId
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          fields: [id, memberId, type, value]

      contact:
        resource: application-members
        bind: applicationId
        fields: [id, firstName, lastName, phoneNumber, email, preferredLanguage, preferredContactMethod]
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          filter: "roles.contains('primary_applicant')"
          fields: [id, firstName, lastName, phoneNumber, email]

      expenses:
        resource: member-expenses
        bind: applicationId
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          fields: [id, memberId, category, amount, frequency]

      household:
        resource: household-info
        bind: applicationId
        missing: empty
        derive:
          complete: { $ref: '#/derives/isComplete/collection' }
        index:
          fields: [id, size]

    # Panel nodes — included in every section panel response alongside the section's resource
    panel:
      include:
        verifications:
          resource: verifications
          bind: applicationId
          filter: "category == $section.name"

