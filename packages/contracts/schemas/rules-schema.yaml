# JSON Schema for Rules YAML
# Validates structural correctness. Cross-artifact references
# (e.g., context variables resolving to real fields) are validated by the validation script.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: Rules
description: Schema for behavioral contract rules YAML files.
type: object
required:
  - version
  - domain
  - ruleSets
additionalProperties: false

properties:
  version:
    type: string
    description: Schema version for change tracking.

  domain:
    type: string
    description: Domain namespace (e.g., workflow).

  context:
    type: array
    description: >
      Variable bindings available to rule conditions. Two forms are supported:
      - String form: "task.*" binds the primary resource to the "task" namespace.
      - Object form: resolves a related entity from the database before evaluation.
        Properties: as (alias in conditions), entity (DB collection name), from (dot-path on the resource).
        Example: { as: application, entity: applications, from: task.subjectId }
    items:
      oneOf:
        - type: string
        - type: object
          required: [as, entity, from]
          properties:
            as:
              type: string
              description: Alias used to reference this entity in rule conditions (e.g., "application").
            entity:
              type: string
              description: Database collection name to look up (e.g., "applications").
            from:
              type: string
              description: Dot-path on the primary resource whose value is the entity ID (e.g., "task.subjectId").
          additionalProperties: false

  ruleSets:
    type: array
    description: Grouped sets of rules, filterable by ruleType.
    items:
      $ref: "#/$defs/RuleSet"
    minItems: 1

$defs:
  RuleSet:
    type: object
    description: A group of rules with a shared type and evaluation strategy.
    required:
      - id
      - ruleType
      - evaluation
      - rules
    properties:
      id:
        type: string
        description: Unique identifier for overlay targeting.
      ruleType:
        type: string
        description: Rule category (e.g., assignment, priority, escalation, alert).
      evaluation:
        type: string
        enum:
          - first-match-wins
        description: How rules are evaluated — first match stops.
      rules:
        type: array
        items:
          $ref: "#/$defs/Rule"
        minItems: 1
    additionalProperties: false

  Rule:
    type: object
    description: A single rule with a condition and action.
    required:
      - id
      - order
      - condition
      - action
    properties:
      id:
        type: string
        description: Unique identifier for overlay targeting.
      order:
        type: integer
        description: Evaluation order within the ruleSet.
        minimum: 1
      condition:
        description: >
          JSON Logic expression evaluated against context variables.
          Use `true` for catch-all/default rules.
      action:
        type: object
        description: Type-specific action map (e.g., assignToQueue, setPriority).
        minProperties: 1
        additionalProperties: true
      fallbackAction:
        type: object
        description: Action to take if the primary action fails (e.g., queue not found).
        additionalProperties: true
      description:
        type: string
        description: Human-readable description of what this rule does.
    additionalProperties: false
