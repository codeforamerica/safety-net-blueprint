$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "schemas/common/enums.yaml"
title: CommonEnums
description: >
  Canonical shared enumerations used across domains and artifact types
  (OpenAPI specs, state machines, rules schemas). Define once here;
  reference everywhere. States extend values via overlay.

$defs:
  Domain:
    type: string
    enum:
      - data-exchange
      - document-management
      - eligibility
      - intake
      - workflow
    description: >
      Blueprint domain identifier. Used as the {domain} path parameter on
      metadata mutation endpoints and as the value type for x-domain annotations
      on domain OpenAPI specs.

  Frequency:
    type: string
    enum:
      - hourly
      - daily
      - weekly
      - every_2_weeks
      - twice_a_month
      - monthly
      - yearly
    description: >
      How often an income or expense amount is received or incurred.
      Not all values apply to all contexts — hourly and daily are typical
      for income; weekly through yearly are typical for expenses.

  Language:
    type: string
    description: Preferred language (BCP 47 language tag).
    pattern: "^[a-zA-Z]{2,3}(?:-[a-zA-Z0-9]{2,8})*$"

  Program:
    type: string
    enum:
      - snap          # Supplemental Nutrition Assistance Program
      - medicaid      # Medicaid / MAGI Medicaid
      - chip          # Children's Health Insurance Program (Title XXI)
      - tanf          # Temporary Assistance for Needy Families
    description: >
      Baseline public assistance programs. SNAP, Medicaid/MAGI, and CHIP are
      first-class programs with full intake and eligibility support. TANF is a
      thin baseline — federal requirements are minimal; state-specific intake
      behavior is an overlay concern. Values use the federal program name;
      state-specific names (e.g., "medical_assistance" for Medicaid) are
      overlay concerns. States may extend this list via overlay.
