# JSON Schema for State Machine YAML
# Validates structural correctness. Cross-artifact references
# (e.g., states matching OpenAPI enums) are validated by the validation script.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: State Machine
description: >
  Schema for behavioral contract state machine YAML files.
  Each file covers one domain and may contain one or more machines.
  Domain-level guards and rules are shared across all machines in the file.
type: object
required:
  - version
  - domain
  - apiSpec
  - machines
additionalProperties: false

properties:
  $schema:
    type: string

  version:
    type: string
    description: Schema version for change tracking.

  domain:
    type: string
    description: Domain namespace (e.g., workflow, eligibility).

  apiSpec:
    type: string
    description: Filename of the associated OpenAPI spec.

  machines:
    type: array
    description: State machines for this domain, one per governed entity type.
    minItems: 1
    items:
      $ref: "#/$defs/Machine"

  guards:
    type: array
    description: >
      Named boolean conditions shared across all machines in the domain.
      Referenced by id in guards.conditions lists.
    items:
      $ref: "#/$defs/Guard"

  rules:
    type: array
    description: >
      Named condition-to-consequence procedures shared across triggers and operations.
      Called with evaluate: rule-id when logic touches multiple resources or applies
      in several places. Rules that rename the governed entity as context can apply
      to different object types.
    items:
      $ref: "#/$defs/Rule"

$defs:
  Machine:
    type: object
    description: A state machine for one governed entity type.
    required:
      - object
      - states
      - initialState
    additionalProperties: false
    properties:
      object:
        type: string
        description: The governed entity type (e.g., Task, Determination).
      states:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/State"
      initialState:
        type: string
        description: The state an object starts in after creation.
      triggers:
        $ref: "#/$defs/Triggers"
      operations:
        type: array
        description: Actor- or system-triggered operations. Each becomes a POST /{resource}/{id}/{name} endpoint.
        items:
          $ref: "#/$defs/Operation"

  State:
    type: object
    description: Configuration for a single state.
    required:
      - id
      - slaClock
    additionalProperties: true
    properties:
      id:
        type: string
        description: State identifier, used as the status value on the resource.
      slaClock:
        type: string
        enum:
          - running
          - stopped
          - paused
        description: SLA clock behavior while the object is in this state.

  Triggers:
    type: object
    description: Automatic reactions to lifecycle events — object creation, field changes, domain events, and timers.
    additionalProperties: false
    properties:
      onCreate:
        $ref: "#/$defs/OnCreate"
      onUpdate:
        $ref: "#/$defs/OnUpdate"
      onEvent:
        type: array
        description: >
          Reactions to external domain events arriving on a subscription.
          When transition.from is present, an existing instance is required.
          When absent, the handler may bootstrap a new instance.
        items:
          $ref: "#/$defs/OnEvent"
      onTimer:
        type: array
        description: Automatic steps that fire after a duration elapses.
        items:
          $ref: "#/$defs/OnTimer"

  OnCreate:
    type: object
    description: Steps that run when the object is created.
    required:
      - then
    additionalProperties: false
    properties:
      actors:
        type: array
        items:
          type: string
        description: Roles authorized to create this object.
      then:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/StepItem"

  OnUpdate:
    type: object
    description: Steps that run when watched fields change outside of an operation.
    required:
      - then
    additionalProperties: false
    properties:
      fields:
        type: array
        items:
          type: string
        description: Only fire when one of these fields changes. Omit to fire on any update.
      then:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/StepItem"

  OnEvent:
    type: object
    description: A reaction to an external domain event arriving on a subscription.
    required:
      - name
      - then
    additionalProperties: false
    properties:
      name:
        type: string
        description: Fully qualified event name (e.g., intake.application.submitted).
      transition:
        $ref: "#/$defs/TransitionBlock"
      guards:
        $ref: "#/$defs/Guards"
      then:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/StepItem"

  OnTimer:
    type: object
    description: Automatic steps that fire after a duration elapses.
    required:
      - after
      - relativeTo
      - then
    additionalProperties: false
    properties:
      after:
        type: string
        description: >
          Duration string (e.g., 72h, 7d, -48h). A negative value fires before
          the reference point (e.g., -48h = 48 hours before slaDeadline).
      relativeTo:
        type: string
        description: >
          Reference timestamp. Object fields (createdAt, blockedAt, escalatedAt)
          measure elapsed time. slaDeadline measures time remaining before expiry.
      calendarType:
        type: string
        enum:
          - calendar
          - business
        default: calendar
        description: Whether duration is measured in calendar time or business hours/days.
      transition:
        $ref: "#/$defs/TransitionBlock"
      guards:
        $ref: "#/$defs/Guards"
      then:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/StepItem"

  Operation:
    type: object
    description: An actor- or system-triggered operation. Becomes a POST /{resource}/{id}/{name} endpoint.
    required:
      - name
      - then
    additionalProperties: false
    properties:
      name:
        type: string
        description: Operation name — becomes the URL path segment.
      transition:
        $ref: "#/$defs/TransitionBlock"
      guards:
        $ref: "#/$defs/Guards"
      requestBody:
        type: object
        description: OpenAPI-style schema for the request body.
        additionalProperties: true
      then:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/StepItem"

  TransitionBlock:
    type: object
    description: >
      Groups state change information for a handler. Presence means an existing instance
      is required. to absent means in-place (state does not change).
    additionalProperties: false
    properties:
      from:
        oneOf:
          - type: string
            description: Single source state.
          - type: array
            items:
              type: string
            minItems: 2
            description: Multiple source states — handler fires from any of them.
      to:
        type: string
        description: Target state. Omit for in-place operations.

  Guards:
    type: object
    description: Pre-conditions that must pass for a handler to fire.
    additionalProperties: false
    properties:
      actors:
        type: array
        items:
          type: string
        description: >
          Roles authorized to trigger this handler. Checked before conditions.
          Omit to allow any authenticated caller (guards.conditions still apply).
      conditions:
        type: array
        description: >
          Guard conditions that must pass. Strings are named guard ids (must all pass — AND).
          Objects support composition: any: [...] passes if at least one named guard passes (OR);
          all: [...] passes if all named guards pass (AND, redundant with plain strings but explicit).
        items:
          oneOf:
            - type: string
              description: Named guard id — must pass.
            - type: object
              description: Composition — any or all of the listed guards must pass.
              properties:
                any:
                  type: array
                  items:
                    type: string
                  minItems: 2
                  description: At least one of these named guards must pass (OR).
                all:
                  type: array
                  items:
                    type: string
                  minItems: 2
                  description: All of these named guards must pass (AND).
              additionalProperties: false

  StepItem:
    type: object
    description: >
      A single step in a then: list. Recognized step types:
        set: { field, value }       — update a field on the governed object
        emit: { event, data? }      — emit a domain event
        evaluate: rule-id           — evaluate a named rule
        invoke: entity/path         — POST to create a resource (add body:),
                                      POST to trigger a transition (path ends with operation name),
                                      or PATCH to append to a field (add append: { field, value })
      All items may include:
        when: <JSON Logic>          — only run this step when condition is true
        description: string         — human-readable explanation
    additionalProperties: true
    minProperties: 1

  Guard:
    type: object
    description: A named boolean condition evaluated against the object or caller context.
    required:
      - id
      - field
      - operator
    additionalProperties: false
    properties:
      id:
        type: string
        description: Guard identifier, referenced by name in guards.conditions.
      field:
        type: string
        description: Field path or variable reference to evaluate (e.g., assignedToId, $caller.roles).
      operator:
        type: string
        enum:
          - is_null
          - is_not_null
          - equals
          - not_equals
          - contains_all
          - contains_any
        description: Comparison operator.
      value:
        description: Value to compare against. Omit for is_null and is_not_null.

  Rule:
    type: object
    description: >
      A named condition-to-consequence procedure called with evaluate: rule-id.
      Handles logic that touches resources outside the governed object, or that
      applies in multiple places. Evaluated as a list of condition → then pairs.
    required:
      - id
      - conditions
    additionalProperties: false
    properties:
      id:
        type: string
        description: "Rule identifier, used in evaluate: rule-id calls. Convention: end with -rule."
      evaluation:
        type: string
        enum:
          - first-match-wins
          - all-match
        default: first-match-wins
        description: >
          first-match-wins — stop at the first condition that matches.
          all-match — run every condition whose condition expression is true.
      context:
        type: array
        description: Data lookups available to this rule's conditions.
        items:
          $ref: "#/$defs/ContextBinding"
      conditions:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/RuleCondition"

  ContextBinding:
    type: object
    description: >
      A data lookup that makes entity records available inside a rule.
      The key is the variable name ($varname in step bodies and { var: "$varname" } in conditions).
      The value defines where to look and how to filter.
    minProperties: 1
    maxProperties: 1
    additionalProperties:
      type: object
      required:
        - from
      additionalProperties: false
      properties:
        from:
          type: string
          description: Entity path to query (e.g., intake/applications, workflow/tasks).
        where:
          type: object
          description: "Filter conditions as field-value pairs (e.g., { id: \"$this.subject\" })."
          additionalProperties: true
        optional:
          type: boolean
          description: >
            When true, the rule proceeds even if no record is found. The variable
            will be null. Use when the linked entity may not exist.

  RuleCondition:
    type: object
    description: >
      A condition → consequence pair inside a rule. The then: steps run when
      the condition expression is true (or when condition is omitted / true).
    required:
      - then
    additionalProperties: true
    properties:
      id:
        type: string
        description: Condition identifier for documentation and debugging.
      order:
        type: integer
        description: Evaluation order within the rule.
      condition:
        description: >
          JSON Logic expression or the literal true. When true, always runs
          (useful in all-match evaluation for unconditional steps).
      then:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/StepItem"
        description: Steps to execute when the condition matches.
      description:
        type: string
