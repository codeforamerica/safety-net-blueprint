# Platform event schemas — CloudEvents base envelope and shared platform event payloads.
#
# $defs/EventBase — the author-specified fields of a CloudEvents envelope.
#   Used as the schema for state machine emit steps (EmitStep.emit).
#   Required: type. Optional: subject, causationid, data, description.
#   Platform-generated fields (id, specversion, source, time, datacontenttype)
#   are intentionally absent — emitEventEnvelope populates them at runtime.
#
# $defs/Event — the full CloudEvents 1.0 envelope. Extends EventBase with
#   platform-generated fields. All domain AsyncAPI event schemas extend this.
#
# All other schemas here define the data payloads for:
#   - CRUD lifecycle events (updated, deleted) emitted automatically by all REST handlers
#   - Scheduling service contract events (timer request, cancellation, callback)
#
# ResourceCreatedEvent is intentionally NOT defined here — its payload is the
# full resource snapshot, which varies by domain. Each domain defines a
# {Resource}CreatedEvent schema in its own AsyncAPI file.
#
# Used by: workflow-openapi.yaml, platform-openapi.yaml, domain *-asyncapi.yaml files,
# and any domain OpenAPI spec that emits CRUD lifecycle or scheduling events.

$defs:
  # Minimum event reference — just the type identifier and an optional annotation.
  # Used as the schema for state machine onEvent handlers (OnEvent.type).
  # Also the base for EventBase and Event.
  #
  # Example (onEvent subscription):
  #   - type: intake.application.submitted
  #     description: Start the regulatory clock when an application is submitted.
  #     steps: [...]
  EventRef:
    type: object
    required:
      - type
    properties:
      type:
        type: string
        description: >
          Fully qualified CloudEvents event type following the convention
          {domain}.{entity}.{action} (e.g., intake.application.submitted).
          Must match a channel address declared in the domain's eventsSpec AsyncAPI file.
      description:
        type: string
        description: Human-readable annotation for state machine authors. Not a CloudEvents field.

  # The author-specified fields of a CloudEvents envelope.
  # Extends EventRef with optional emit-time overrides.
  # Used as the schema for state machine emit steps (EmitStep.emit).
  # Platform-generated fields are absent — emitEventEnvelope populates them at runtime.
  #
  # Example (emit step):
  #   - emit:
  #       type: intake.application.submitted
  #       subject: $object.applicationId   # optional; overrides default resourceId
  #       data:
  #         programs: $object.programs
  EventBase:
    allOf:
      - $ref: '#/$defs/EventRef'
      - type: object
        properties:
          subject:
            type: string
            description: >
              CloudEvents subject override. The entity ID the event pertains to.
              Defaults to the emitting resource's own id when omitted.
          causationid:
            type: string
            description: >
              CloudEvents Causation extension (optional). Value expression resolving to the id
              of the event that directly caused this one. Use when an event is emitted in
              response to another event (e.g., auto-resume triggered by a timer callback).
          data:
            type: object
            additionalProperties: true
            description: Event-specific payload. Field values are value expressions resolved at emit time.

  # Full CloudEvents 1.0 envelope. Extends EventBase with platform-generated fields.
  # All domain AsyncAPI event schemas extend this via allOf.
  # The `type` field in each concrete event carries a `const` value with
  # the fully qualified event type (e.g., intake.application.submitted).
  # The org-specific prefix is never written in source — the resolver adds
  # it at resolve time via the x-event-type-prefix overlay config.
  Event:
    allOf:
      - $ref: '#/$defs/EventBase'
      - type: object
        required:
          - specversion
          - id
          - source
          - subject
          - time
          - datacontenttype
        properties:
          specversion:
            type: string
            const: "1.0"
            description: CloudEvents specification version.
          id:
            type: string
            format: uuid
            description: Unique event identifier.
          source:
            type: string
            description: Domain base path that produced the event (e.g., /intake, /workflow).
            example: /intake
          subject:
            type: string
            format: uuid
            description: Entity ID the event pertains to.
          time:
            type: string
            format: date-time
            description: When the event occurred.
          datacontenttype:
            type: string
            const: application/json
            description: Media type of the event payload.
          traceparent:
            type:
              - string
              - "null"
            description: >
              W3C Trace Context header (optional). Propagated from the triggering
              request or event. The trace ID component is stable across the full
              causal chain.
          causationid:
            type:
              - string
              - "null"
            format: uuid
            description: >
              CloudEvents Causation extension (optional). The `id` of the event
              that directly caused this one. Use when an event is emitted in direct
              response to another event (e.g., a task auto-resumed because a timer
              fired). Allows consumers to trace the immediate cause without
              inspecting the full distributed trace.
          authid:
            type:
              - string
              - "null"
            description: >
              CloudEvents Auth Context extension (optional). Principal identifier
              (userId from JWT claims) of the actor who triggered the event. No PII —
              user ID only, not name or email. Required for FTI-governed events per
              IRS Pub. 1075. Omitted when no caller identity is present.
          authtype:
            type:
              - string
              - "null"
            enum:
              - user
              - service_account
              - api_key
              - system
              - unauthenticated
              - unknown
              - null
            description: >
              CloudEvents Auth Context extension (optional). Principal type of the
              actor who triggered the event. Required when authid is present.
              Required for FTI-governed events per IRS Pub. 1075.
          data:
            type: object
            description: Event-specific payload. Schema is defined per event type in each domain's AsyncAPI file.

FieldChange:
  type: object
  description: A single field change recorded in an updated event.
  additionalProperties: false
  required:
    - field
    - before
    - after
  properties:
    field:
      type: string
      description: Name of the changed field.
    before:
      description: Value of the field before the update.
    after:
      description: Value of the field after the update.

ResourceUpdatedEvent:
  type: object
  description: |
    Payload for a CRUD-emitted updated event. Contains a field-level diff
    recording which fields changed and their before/after values.

    Emitted automatically by the mock server on every PATCH request.
    Consumers can react to specific field mutations without fetching the
    full resource.
  required:
    - changes
  properties:
    changes:
      type: array
      description: List of fields that changed, with before and after values.
      items:
        $ref: "#/FieldChange"

ResourceDeletedEvent:
  type: object
  description: |
    Payload for a CRUD-emitted deleted event. Carries no data — the entity
    no longer exists and consumers should treat the subject ID as permanently
    removed.
  properties: {}

SchedulingTimerCancelledEvent:
  type: object
  description: |
    Payload for a timer cancellation request sent to the scheduling service.
    If the timer has already fired or does not exist, this is a no-op.
  required:
    - timerId
  properties:
    timerId:
      type: string
      description: The timer to cancel.

SchedulingTimerRequestedEvent:
  type: object
  description: |
    Payload for a timer request sent to the scheduling service. The scheduling
    service registers the timer and fires the caller-specified callback event
    when the timer expires, passing callback.data through unchanged and adding
    timerId to the payload.
  required:
    - timerId
    - callback
  properties:
    timerId:
      type: string
      description: >
        Deterministic timer identifier in the form domain.timerType.objectId
        (e.g., workflow.creation_deadline.task-123).
        Used as the cancellation key — safe to register idempotently with the same ID.
    fireAfter:
      type: string
      description: ISO 8601 duration to wait before firing (e.g., PT72H, P30D). Mutually exclusive with fireAt.
    fireAt:
      type: string
      format: date-time
      description: Absolute timestamp to fire at. Use when the fire time is tied to a known deadline on the object. Mutually exclusive with fireAfter.
    fireOffset:
      type: string
      description: ISO 8601 duration (negative) applied to fireAt to fire before the target time (e.g., -PT48H fires 48 hours before fireAt). Only valid when fireAt is set.
    calendarType:
      type: string
      enum:
        - calendar
        - business
      description: When business, elapsed time counts only business days. Defaults to calendar.
    callback:
      type: object
      description: What to deliver when the timer fires.
      required:
        - event
        - data
      properties:
        event:
          type: string
          description: >
            CloudEvents type of the domain-specific event to emit when the timer expires
            (e.g., workflow.creation_deadline). The scheduling service passes this through
            unchanged — it does not derive or modify the event name.
        data:
          type: object
          description: Payload to include in the callback event, passed through unchanged. The scheduling service adds timerId to this payload before delivery.
          additionalProperties: true

TimerCallbackEvent:
  type: object
  description: |
    Payload delivered by the scheduling service when a timer expires. Contains
    callback.data from the original scheduling.timer.requested event, passed
    through unchanged, with timerId added by the scheduling service.

    The scheduling service is a pure relay — it does not add, derive, or modify
    any fields beyond timerId. The event name is the domain-specific name from
    callback.event in the original request (e.g., workflow.creation_deadline),
    not a generic scheduler.timer.fired event.
  required:
    - timerId
  properties:
    timerId:
      type: string
      description: The deterministic timer ID from the original scheduling request.
  additionalProperties: true
