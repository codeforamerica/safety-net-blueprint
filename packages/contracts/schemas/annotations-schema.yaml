# JSON Schema for domain annotation YAML files.
# Validates structural correctness. The leaf level (individual annotation objects)
# is intentionally open — states add custom annotation keys via overlay without
# schema changes.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: Domain Annotations
description: >
  Schema for domain annotation YAML files (e.g., intake-annotations.yaml).
  Annotation files attach machine-readable metadata — regulatory citations,
  data classifications, audit requirements — to specific elements in contract
  artifacts (OpenAPI schemas, state machine states and actions, events).


  Top-level structure:
    domain     — domain this file annotates (required).
    openapi/schemas    — annotations for OpenAPI component schemas, keyed by dot-notation path.
    openapi/paths      — annotations for OpenAPI path operations, keyed by dot-notation path.
    state-machine/states   — annotations for state machine states, keyed by state id.
    state-machine/actions  — annotations for state machine actions, keyed by action id.
    state-machine/events   — annotations for state machine event subscriptions, keyed by event type.
    events             — annotations for AsyncAPI event channels, keyed by event type.


  Element paths use dot notation within each section to identify the specific
  element being annotated (e.g., ApplicationMember.ssn, submit).

type: object
required:
  - version
  - domain
additionalProperties: false

properties:
  $schema:
    type: string

  version:
    type: string
    description: Schema version for change tracking.

  domain:
    $ref: "common/enums.yaml#/$defs/Domain"

  openapi/schemas:
    description: >
      Annotations for OpenAPI component schemas.
      Keys are dot-notation element paths (e.g., ApplicationMember.ssn).
    $ref: "#/$defs/AnnotationMap"

  openapi/paths:
    description: >
      Annotations for OpenAPI path operations.
      Keys are dot-notation element paths (e.g., applications.submit).
    $ref: "#/$defs/AnnotationMap"

  state-machine/states:
    description: >
      Annotations for state machine states.
      Keys are state identifiers (e.g., under_review).
    $ref: "#/$defs/AnnotationMap"

  state-machine/actions:
    description: >
      Annotations for state machine actions.
      Keys are action identifiers (e.g., submit).
    $ref: "#/$defs/AnnotationMap"

  state-machine/events:
    description: >
      Annotations for state machine event subscriptions.
      Keys are event type identifiers (e.g., intake.application.submitted).
    $ref: "#/$defs/AnnotationMap"

  events:
    description: >
      Annotations for AsyncAPI event channels.
      Keys are event type identifiers (e.g., application.submitted).
    $ref: "#/$defs/AnnotationMap"

$defs:
  AnnotationMap:
    type: object
    description: Map of element paths (dot notation) to annotation objects.
    minProperties: 1
    additionalProperties:
      $ref: "#/$defs/Annotation"

  Annotation:
    type: object
    description: >
      Annotations for a specific element. Standard keys are defined here;
      additional keys are allowed — states add domain-specific annotation
      types via overlay without schema changes.
    additionalProperties: true
    properties:
      regulatoryCitation:
        type: string
        description: CFR or statutory citation (e.g., "7 CFR § 273.2(g)").
      description:
        type: string
        description: >
          Human-readable summary of the regulatory or classification context.
          Used as card text when generating policy cards from a regulatoryCitation.
          One per annotated element — not per annotation key.
      auditRequired:
        type: boolean
        description: Whether this element must appear in audit logs.
      slaApplicable:
        type: boolean
        description: Whether this element starts or affects a regulatory processing clock.
      dataClassification:
        type: array
        description: Data sensitivity classifications (e.g., pii, fti, phi).
        items:
          type: string
        minItems: 1
