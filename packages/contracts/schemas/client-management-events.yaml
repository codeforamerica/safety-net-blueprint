# Event payload schemas for the Client Management domain.
# Referenced by persons-openapi.yaml (x-events) and available for future AsyncAPI consumption.
#
# All schemas use JSON Schema draft 2020-12 so they can be used standalone
# (e.g., in AsyncAPI message validation) without an OpenAPI resolver.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: Client Management Event Schemas

$defs:
  PersonMatchResolvedEvent:
    type: object
    description: |
      Payload for the client_management.person.match_resolved event.
      Emitted once per applying member after Client Management attempts to match
      against existing person records. Members with an empty programsApplyingFor
      are skipped; no event is emitted for them.
    additionalProperties: false
    required:
      - memberId
      - matchType
      - candidates
    properties:
      memberId:
        type: string
        format: uuid
        description: The ApplicationMember this result applies to.
        x-relationship:
          resource: ApplicationMember
          domain: intake
      matchType:
        type: string
        description: Outcome of the matching attempt.
        enum:
          - confirmed
          - review_required
          - no_match
      candidates:
        type: array
        description: |
          Match candidates. Single entry for confirmed; one or more for review_required;
          empty for no_match. Carries no PII — call the Client Management API for
          display details when rendering the caseworker review UI.
        items:
          $ref: "#/$defs/PersonMatchCandidate"

  PersonMatchCandidate:
    type: object
    description: A candidate person record returned by the matching process.
    additionalProperties: false
    required:
      - personId
      - confidenceScore
    properties:
      personId:
        type: string
        format: uuid
        description: The candidate person record ID.
        x-relationship:
          resource: Person
      confidenceScore:
        type: number
        format: float
        minimum: 0
        maximum: 1
        description: Match confidence score from 0 (no confidence) to 1 (certain).
