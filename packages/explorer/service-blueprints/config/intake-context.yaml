# intake-context.yaml
#
# Blueprint context for the intake service blueprint — generic baseline.
# Represents the ideal caseworker experience enabled by our event-driven
# architecture and contracts. Future state items are marked inline.
#
# Combined with intake-state-machine.yaml by generate-blueprint.js to produce
# intake.json (Figma plugin input) and intake.svg (rendered output).
#
# State-specific versions live in the state's own repo. Run build.js with the
# state's input directory as the first argument to generate state-specific output.
#
# Structure:
#   phases → sub-phases → cards (keyed by lane ID, ordered as they appear on the blueprint)
#   Event slots (items with 'event:') expand in-place from the state machine or rules file.

domain: intake
name: "Intake Service Blueprint"
stateMachine: "../../../contracts/intake-state-machine.yaml"

lanes:
  - id: applicant
    label: "Applicant"
    actors: [applicant]
  - id: caseworker
    label: "Caseworker"
    actors: [caseworker, supervisor]
  - id: system
    label: "System"
    actors: [system]
  - id: regulations
    label: "Regulatory requirements"
    actors: []
  - id: data
    label: "Data & events"
    actors: []

phases:

  # ── Phase 1: Application intake ───────────────────────────────────────────────
  - id: application-intake
    label: "Application intake"
    subPhases:

      # ── Sub-phase 1a: Submission ──────────────────────────────────────────────
      - id: submitted
        label: "Submission"
        description: >
          Applicant submits their application. Regulatory clocks start.
          An Application record is created — not a case.
        cards:
          applicant:
            - event: submit
              text: "Submits application"
              subtext: "Online or in person"
            - type: note
              text: "Submission starts the regulatory clock"
            - type: person-action
              actor: applicant
              text: "Optionally uploads supporting documents at submission"
              subtext: "Can also be uploaded any time during review"
            - type: note
              text: "Documents uploaded at submission are immediately available when the caseworker opens the task"
            - type: note
              text: "Document-to-application linkage must be enforced at the UI layer"
              subtext: "The contract cannot prevent uploads directly to an external document system. The application screen must be the upload entry point to ensure documents link to the right verification item."
          caseworker:
            - event: submit
              text: "Submits application on behalf of applicant"
              subtext: "Assisted or in-person submission"
            - type: person-action
              actor: caseworker
              text: "Uploads documents provided by applicant at submission"
            - type: note
              text: "Document-to-application linkage must be enforced at the UI layer"
          regulations:
            - type: policy
              text: "SNAP: 30-day processing clock starts"
              citation: "7 CFR § 273.2(g)(1)"
            - type: policy
              text: "Expedited SNAP: 7-day clock"
              citation: "7 CFR § 273.2(i)"
              subtext: "If household meets expedited criteria"
            - type: policy
              text: "Medicaid: 45-day clock starts"
              citation: "42 CFR § 435.912"
              subtext: "90 days if disability determination needed"
          data:
            - event: submit
            - type: data-entity
              text: "Application created"
              subtext: "status: submitted, submittedAt, all submitted fields as structured data"
            - type: data-entity
              text: "VerificationItems created"
              subtext: "Income, identity, and residency obligations — one record per requirement"
            - type: data-entity
              text: "Workflow task created"
              subtext: "Added to intake queue; automated confirmation sent to applicant"
          system:
            - type: note
              text: "Future state: submission confirmation sent to applicant automatically"
              subtext: "Requires a communications contract — notification type, channel, and content are not yet defined."

  # ── Phase 2: Application review ───────────────────────────────────────────────
  - id: application-review
    label: "Application review"
    subPhases:

      # ── Sub-phase 2a: Automated screening ─────────────────────────────────────
      - id: automated-screening
        label: "Automated screening"
        description: >
          Concurrent background operations: person matching, eligibility screening,
          queue routing. No caseworker step separates them.
        cards:
          data:
            - type: data-entity
              text: "Application updated"
              subtext: "isExpedited: true, priority: expedited (if flagged)"
            - type: note
              text: "Future work: application.prescreened event"
              subtext: "Per-program eligibility indicators emitted by eligibility domain based on submitted (unverified) data — not a legal determination"
          system:
            - type: system
              domain: data-exchange
              text: "Federal checks initiated"
              subtext: "In response to application.submitted — FDSH, IEVS, SAVE, SSA, RTE (if Medicaid)"
            - type: note
              text: "Multi-program applications share check results across programs"
              subtext: "FDSH Hub consolidates access to SSA and DHS/SAVE data for Medicaid — running those checks separately alongside it is redundant. IEVS is the exception: it is a SNAP-specific federal mandate and runs regardless. Results should be shared across programs rather than re-run per program."
            - type: system
              domain: workflow
              text: "Task created in intake queue"
              subtext: "In response to application.submitted — task routed to program-specific queue"
            - type: system
              domain: client-management
              text: "Person matching"
              subtext: "In response to application.submitted — links application to an existing person record. An exact match may surface a prior or active case. Fuzzy matches are flagged for caseworker review."
            - type: note
              text: "Future work: client management domain contract"
              subtext: "Person matching results (exact, fuzzy, no match) and resolution require a client management contract defining the PersonMatchResult entity and person.match_* event types. Intake consumes the result but identity resolution is owned by client management."
            - type: system
              domain: workflow
              text: "Queue routing and SLA assignment"
              subtext: "In response to application.submitted — routes to program-specific queue; assigns SLA track per program"
            - type: note
              text: "Future state: smart routing by caseworker skills"
              subtext: "Route expedited cases to experienced workers, disability-related Medicaid to specialists, and non-English applications to caseworkers with matching language skills. Requires caseload and skills visibility per worker."
            - type: system
              domain: eligibility
              text: "Expedited screening"
              subtext: "In response to application.submitted — evaluates submitted data against expedited criteria; publishes eligibility.application.expedited if applicable. Future work: requires eligibility domain contract."
            - type: system
              domain: intake
              text: "Application flagged as expedited"
              subtext: "In response to eligibility.application.expedited — updates application (isExpedited: true, assigns expedited SLA track)"
            - type: note
              text: "Future work: eligibility domain — program pre-screening"
              subtext: "Eligibility domain emits application.prescreened with per-program eligibility indicators. Informs queue routing and sets caseworker expectations — not a legal determination."

      # ── Sub-phase 2b: Task assignment ─────────────────────────────────────────
      - id: under-review
        label: "Task assignment"
        description: >
          Caseworker claims the task from a prioritized queue. Full structured
          record is immediately available — no re-entry required. Interview is scheduled.
        cards:
          caseworker:
            - event: workflow.task.claimed
              actor: caseworker
              text: "Reviews prioritized queue and claims task"
            - type: person-action
              actor: caseworker
              text: "Opens application with pre-screened view"
              subtext: "Verification checklist reflects current status — items cleared by fast-returning federal checks or documents uploaded at submission are already resolved"
            - type: note
              text: "Queue shows SLA deadline and priority — caseworker sees what needs attention first"
            - type: note
              text: "Open decision: sort order could be enforced server-side (API sort params) or client-side (UI sorts on slaInfo and priority fields). Data exists on each task; contract does not currently guarantee ordering."
            - type: person-action
              actor: caseworker
              text: "Resolves fuzzy person match if flagged"
              subtext: "Reviews candidate person records and confirms the correct match — or creates a new record if none apply"
            - type: note
              text: "A matched person record may surface a prior or active case"
              subtext: "Caseworker should review any linked case history before proceeding — relevant circumstances may already be on file"
            - type: note
              text: "Future state: person match resolution requires client management domain contract — see #249"
            - event: scheduling.appointment.scheduled
              actor: caseworker
              text: "Schedules interview"
            - type: note
              text: "Appointment-to-application linkage must be enforced at the UI layer"
              subtext: "The contract cannot prevent scheduling directly in an external tool. Launching the scheduler from the application screen ensures the appointment links back to the right application."
          data:
            - type: data-entity
              text: "Application updated"
              subtext: "status: under_review"
            - type: data-entity
              text: "Interview record created"
          system:
            - type: system
              domain: intake
              text: "Interview record created"
              subtext: "In response to scheduling.appointment.scheduled — links appointment to application; creates interview record"

      # ── Sub-phase 2c: Verification review ─────────────────────────────────────
      - id: active-review
        label: "Verification review"
        description: >
          Caseworker works the exception list — reviewing what the system couldn't
          resolve automatically. Federal verification results continue arriving
          asynchronously and update the checklist in real time.
        cards:
          applicant:
            - type: note
              text: "Future state: applicant receives notification when caseworker requests documents"
              subtext: "Triggered by caseworker action 'Requests additional documents for inconclusive items' — requires communications domain contract (#187)"
            - type: person-action
              actor: applicant
              text: "Uploads requested documents"
          caseworker:
            - type: person-action
              actor: caseworker
              text: "Reviews verification checklist — acts on flagged and inconclusive items"
            - type: note
              text: "Already-cleared items are shown resolved — caseworker sees only what needs attention"
            - type: person-action
              actor: caseworker
              text: "Confirms household data not resolvable electronically"
              subtext: "Demographics, household members, and relationships"
            - type: note
              text: "Only for items that couldn't clear through federal checks"
            - type: person-action
              actor: caseworker
              text: "Reviews discrepancies between submitted data and verification results"
            - type: note
              text: "VerificationItem shows submitted value alongside check result — no switching systems to compare"
            - type: person-action
              actor: caseworker
              text: "Requests additional documents for inconclusive items"
            - type: note
              text: "Future state: notification sent to applicant automatically"
              subtext: "Requires communications domain contract — see #187"
            - type: note
              text: "Unresolved items requiring applicant input carry to the interview"
            - type: note
              text: "Future state: outreach tracked as a communication record"
              subtext: "Each document request recorded with what was asked, when, and by whom — visible on the application for audit and continuity."
            - type: person-action
              actor: caseworker
              text: "Uploads documents provided by applicant in person, by mail, or by fax"
            - type: note
              text: "Document-to-application linkage must be enforced at the UI layer"
            - type: person-action
              actor: caseworker
              text: "Reviews documents uploaded by applicant"
              subtext: "Adjudicates each document against the verification item it satisfies; marks item resolved"
            - type: person-action
              actor: caseworker
              text: "Escalates to supervisor when policy interpretation or override is needed"
              subtext: "Complex discrepancies, edge cases, or situations requiring judgment beyond standard guidance"
            - type: person-action
              actor: supervisor
              text: "Reviews escalated case; provides guidance or takes over resolution"
            - type: note
              text: "Guidance documented — creates an audit trail for the decision"
          regulations:
            - type: policy
              text: "Federal verifications required"
              citation: "42 U.S.C. § 1320b-7"
              subtext: "FDSH (citizenship), SAVE (immigration), IEVS (income, SNAP only), SSA (SSN), RTE (existing coverage, Medicaid only)"
            - type: policy
              text: "Medicaid: electronic verification before requesting paper documents"
              citation: "42 CFR § 435.911"
              subtext: "Ex parte rule — electronic checks must be attempted first; paper documents can only be requested when checks return inconclusive"
          data:
            - type: data-entity
              text: "VerificationItems updated"
              subtext: "Results from FDSH, IEVS, SAVE, SSA, RTE — status and result fields updated as results arrive"
            - type: data-entity
              text: "DataExchangeRequests"
              subtext: "One per federal check; status updates as results return"
          system:
            - type: system
              text: "Verification checklist updated automatically as results arrive"
              subtext: "In response to incoming verification results — results push to the caseworker's view in real time; no refresh required"
            - type: system
              text: "VerificationItem status updated when document is adjudicated"
            - type: note
              text: "Future work: eligibility domain re-evaluates indicators as material verification results arrive"
              subtext: "Pre-screening indicators from submission may be stale once IEVS, FDSH, or SSA results return. Eligibility domain re-runs screening on updated data and emits a new application.prescreened event — updated indicators surface to the caseworker in real time."

      # ── Sub-phase 2d: Program verification ────────────────────────────────────
      - id: interview
        label: "Program verification"
        description: >
          Caseworker conducts the required SNAP interview and resolves any
          remaining verification items — including discrepancies that require
          applicant clarification.
        cards:
          applicant:
            - type: person-action
              actor: applicant
              text: "Attends interview"
              subtext: "In person, by phone, or video depending on state policy"
            - type: person-action
              actor: applicant
              text: "Clarifies discrepancies flagged during verification review"
              subtext: "E.g. income reported differently than federal records — applicant explains or provides documentation"
          caseworker:
            - type: person-action
              actor: caseworker
              text: "Conducts SNAP interview"
            - type: person-action
              actor: caseworker
              text: "Resolves discrepancies requiring applicant input"
              subtext: "Updates record based on applicant clarification or documentation provided at interview"
            - type: person-action
              actor: caseworker
              text: "Resolves remaining verification items"
              subtext: "Marks inconclusive items resolved or requests final documents"
            - type: opportunity
              text: "Opportunity: Collect H.R.1 work requirement data at interview"
              subtext: "Stop-gap until the data model is updated to capture work requirement fields at submission. Supplemental interview questions cover hours worked per week, caregiver status and ages of dependents, and enrollment in approved work or community engagement programs. Caseworkers work from an H.R.1 supplement to the standard interview guide."
            - type: opportunity
              text: "Opportunity: Request work compliance documentation"
              subtext: "Use the existing document request mechanism for work requirement evidence — pay stubs, employer statements, volunteer logs, caregiving attestation, and medical exemption documentation. Flows through the standard caseworker document request → applicant upload path."
          regulations:
            - type: policy
              text: "SNAP: Interview required before determination"
              citation: "7 CFR § 273.2(e)"
              subtext: "May be waived by state policy"
            - type: policy
              text: "H.R.1: SNAP ABAWD work requirement expansion"
              citation: "H.R.1 (pending)"
              subtext: "Expands age range subject to ABAWD work requirements; adds parental work requirements for adults with children above the age threshold. Existing application forms likely do not capture the data needed to evaluate compliance or exemption."
            - type: policy
              text: "H.R.1: Medicaid community engagement requirement"
              citation: "H.R.1 (pending)"
              subtext: "Adults required to demonstrate work, volunteering, caregiving, or education hours to maintain Medicaid eligibility. Data fields for engagement type and hours are not currently captured in most state application forms."
          data:
            - type: data-entity
              text: "Interview updated"
              subtext: "Scheduled date, notes, and outcome recorded"
            - type: data-entity
              text: "VerificationItems resolved"
              subtext: "Final status set for each obligation"
            - type: note
              text: "Future work: new VerificationItem types for H.R.1 compliance"
              subtext: "New obligation types needed — ABAWD work compliance, Medicaid community engagement, work requirement exemption. Each tracks submitted evidence and verification status alongside existing income and identity items."

  # ── Phase 3: Eligibility determination ───────────────────────────────────────
  - id: eligibility-determination
    label: "Eligibility determination"
    subPhases:

      # ── Sub-phase 3a: Determination ───────────────────────────────────────────
      - id: benefits-calculation
        label: "Determination"
        description: >
          All verification items resolved — system signals the eligibility domain
          automatically. Rules engine calculates benefit amounts per program.
          Caseworker reviews for unexpected results.
        cards:
          caseworker:
            - type: person-action
              actor: caseworker
              text: "Reviews eligibility calculation results for unexpected outcomes"
            - type: note
              text: "Exception review only — caseworker is not approving a calculation they triggered"
            - type: note
              text: "Future state: decision support indicators"
              subtext: "System surfaces likely eligibility per program based on current record state — helps caseworker anticipate outcomes before the full rules engine runs."
          regulations:
            - type: policy
              text: "SNAP: Determination within 30 days (7 if expedited)"
              citation: "7 CFR § 273.2(g)"
            - type: policy
              text: "Medicaid: Determination within 45 days"
              citation: "42 CFR § 435.912"
          data:
            - type: domain-event-published
              text: "application.review_completed"
              subtext: "Fires automatically when all VerificationItems are resolved — triggers eligibility domain, no caseworker action required"
          system:
            - type: system
              domain: eligibility
              text: "Rules engine invoked automatically"
              subtext: "In response to application.review_completed — income and expense calculations against household data, per program"

      # ── Sub-phase 3b: Closeout ────────────────────────────────────────────────
      - id: decision
        label: "Closeout"
        description: >
          Caseworker records determination with rationale. Supervisor approves
          where required. Application closes and notices queue automatically.
        cards:
          applicant:
            - type: person-action
              actor: applicant
              text: "Receives determination notice"
              subtext: "Approval, denial, or pending notice per program"
          caseworker:
            - event: close
              actor: caseworker
              text: "Records determination and rationale"
              subtext: "Eligibility outcome, date, and reasoning recorded per program"
            - type: note
              text: "Rationale supports appeals and quality review"
            - type: person-action
              actor: caseworker
              text: "Previews notice before it is sent"
              subtext: "Quality check — caseworker confirms notice content is accurate before it reaches the applicant"
            - type: note
              text: "Future state: notice preview generated by system"
              subtext: "System generates a draft notice for caseworker review before sending. Currently notices are queued automatically without a preview step."
            - event: close
              actor: supervisor
              text: "Approves determination"
              subtext: "Required by state policy"
            - type: note
              text: "Future state: supervisor approval queue"
              subtext: "Supervisor sees pending approvals in their own prioritized queue — not just a handoff from the caseworker. Requires supervisor-facing workflow tooling."
            - type: person-action
              actor: supervisor
              text: "Reviews sampled determinations for accuracy and regulatory compliance"
            - type: note
              text: "QC review may be performed by supervisor or a dedicated quality reviewer"
              subtext: "Supports federal compliance audits — FNS for SNAP, CMS for Medicaid"
            - type: note
              text: "Future state: system-assisted QC sampling"
              subtext: "System automatically flags a statistically valid sample of closed cases for review — reviewer works from a QC queue rather than selecting cases manually"
          regulations:
            - type: policy
              text: "Notice of Action required"
              subtext: "Adverse action notice required for denials and closures"
          data:
            - type: data-entity
              text: "Application updated"
              subtext: "status: closed, disposition: approved | denied | referred"
            - type: note
              text: "Service case created only on approval"
              subtext: "A case record is created when an application is approved — not at submission. Linked to the matched or newly created person record."
            - event: close
          system:
            - type: note
              text: "Future state: notices generated and queued automatically"
              subtext: "Requires communications domain contract — see #187"
