  <!-- SLIDE GOAL (S1): You don't own your platform. When a vendor changes something — or
       you want to replace a system — everything connected to it breaks. Change is expensive,
       slow, and risky not because your team is bad at it, but because the platform was never
       designed to change. Compliance isn't baked in either: you're reliant on vendors who
       have no obligation to coordinate with each other, so a change in one system can break
       compliance logic that lives in another. -->

  <template id="tpl-s1">

<style>
  /*
   * 18s one-shot — cumulative blast-radius reveal, holds at full red state:
   * 0–4%   (0–0.7s):   bullet 1 fades in alone
   * 18–20% (3.2–3.6s): Vendor 1 update fires — lines peak bright, bullet 2 in
   * 36–40% (6.5–7.2s): Vendor 2 update fires — compliance warning pops, updates required follows
   * 49–52% (8.8–9.4s): Custom App cascade — lines peak bright
   * 54–56% (9.7–10s):  bullet 3 in
   * 56–100% (10–18s):  all red, hold for emphasis (no reset)
   */

  /* Lines — peak stroke-width on fire, settle after ~1s, hold red */
  @keyframes s1-la {
    0%,3%   { stroke:#EF6C75; opacity:0.25; stroke-width:1.5; }
    20%     { stroke:#AF121D; opacity:1;    stroke-width:3.5; }
    27%,100%{ stroke:#AF121D; opacity:0.95; stroke-width:2.5; }
  }
  @keyframes s1-lb {
    0%,36%  { stroke:#EF6C75; opacity:0.25; stroke-width:1.5; }
    40%     { stroke:#AF121D; opacity:1;    stroke-width:3.5; }
    47%,100%{ stroke:#AF121D; opacity:0.95; stroke-width:2.5; }
  }
  @keyframes s1-lc {
    0%,49%  { stroke:#EF6C75; opacity:0.25; stroke-width:1.5; }
    52%     { stroke:#AF121D; opacity:1;    stroke-width:3.5; }
    58%,100%{ stroke:#AF121D; opacity:0.95; stroke-width:2.5; }
  }

  /* "↑ vendor update" inside circles — fires and holds */
  @keyframes s1-vu1 { 0%,16%{opacity:0} 18%,100%{opacity:1} }
  @keyframes s1-vu2 { 0%,34%{opacity:0} 36%,100%{opacity:1} }

  /* "▲ update/fix required" markers — fire and hold */
  @keyframes s1-xa  { 0%,19%{opacity:0} 21%,100%{opacity:1} }
  @keyframes s1-xb  { 0%,39%{opacity:0} 41%,100%{opacity:1} }
  @keyframes s1-xc  { 0%,51%{opacity:0} 53%,100%{opacity:1} }

  /* Custom App circle — peaks with V2 cascade, holds red */
  @keyframes s1-ca {
    0%,36%  { fill:#FFD699; stroke:#FFB446; stroke-width:1.5; }
    40%     { fill:#F9C8CB; stroke:#AF121D; stroke-width:3; }
    47%,100%{ fill:#F9C8CB; stroke:#AF121D; stroke-width:2.5; }
  }
  @keyframes s1-fix { 0%,51%{opacity:0} 53%,100%{opacity:1} }

  /* V2→CustomApp integration line — breaks and holds broken */
  @keyframes s1-v2ca {
    0%,36%  { stroke:#EF6C75; stroke-width:1; opacity:0.25; stroke-dasharray:none; }
    40%     { stroke:#AF121D; stroke-width:3;  opacity:1;    stroke-dasharray:5,3; }
    47%,100%{ stroke:#AF121D; stroke-width:2;  opacity:0.95; stroke-dasharray:5,3; }
  }
  /* Compliance warning — pops with V2 vendor update, holds */
  @keyframes s1-warn {
    0%,34%{opacity:0}
    37%,100%{opacity:1}
  }

  #s1-la1,#s1-la2,#s1-la3,#s1-la4 { animation: s1-la 18s ease-in-out 1 both; }
  #s1-lb1,#s1-lb2,#s1-lb3,#s1-lb4 { animation: s1-lb 18s ease-in-out 1 both; }
  #s1-lc1,#s1-lc2,#s1-lc3,#s1-lc4 { animation: s1-lc 18s ease-in-out 1 both; }
  #s1-vu1      { animation: s1-vu1 18s ease-in-out 1 both; }

  #s1-v1-label { animation: s1-xa  18s ease-in-out 1 both; }

  #s1-warn      { animation: s1-warn  18s ease-in-out 1 both; }

  #s1-fix       { animation: s1-fix  18s ease-in-out 1 both; }

  /* Bullets — staggered in, hold visible */
  @keyframes s1-b1 { 0%,1%{opacity:0} 4%,100%{opacity:1} }
  @keyframes s1-b2 { 0%,19%{opacity:0} 22%,100%{opacity:1} }

  }

  #s1-cases-label { animation: s1-cases 18s ease-in-out 1 both; }
</style>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480">
<style>
  /*
   * Slide 2 — two-phase animation:
   *
   * Phase 1 (18s, one-shot, fill: both):
   *   0–32%  tiles build in staggered

   *   IBM Curam ↔ Salesforce / Tyler Technologies

  <script>
    const CONTENT = {
      s1: document.getElementById('tpl-s1').innerHTML.trim(),
      s2: document.getElementById('tpl-s2').innerHTML.trim(),
      s3: document.getElementById('tpl-s3').innerHTML.trim(),
      s4: document.getElementById('tpl-s4').innerHTML.trim(),
      s5: document.getElementById('tpl-s5').innerHTML.trim(),
    };

    const wrapper = document.getElementById('map-wrapper');

    function fitDiagram() {
      const w = window.outerWidth || window.innerWidth || 1400;
      const scale = w / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      wrapper.innerHTML = CONTENT[id];
      window.scrollTo(0, 0);
      document.querySelectorAll('#top-nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === id);
      });
      requestAnimationFrame(fitDiagram);
    }

    document.querySelectorAll('#top-nav button').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });

    window._navigate = navigate;
    navigate('s1');
    window.addEventListener('resize', fitDiagram);
  </script>
