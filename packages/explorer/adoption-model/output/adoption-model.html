  <template id="tpl-s1">
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480">
<style>
  /*
   * 9s cycle — the story of vendor lock-in:
   * 0–40%  (0–3.6s):  normal state, 4 direct connections shown

   */

  @keyframes s1-switch-q {
    0%, 8%, 100% { opacity: 0; }
    13%  { opacity: 0.75; }
    84%  { opacity: 0.75; }
    91%  { opacity: 0; }

  @keyframes s1-ln1 {

    84%           { stroke: #AF121D; opacity: 0.85; stroke-width: 4; }
    91%           { stroke: #EF6C75; opacity: 0.35; stroke-width: 2; }
  }
  @keyframes s1-ln2 {
    0%, 32%, 100% { stroke: #EF6C75; opacity: 0.35; stroke-width: 2; }
    37%           { stroke: #AF121D; opacity: 1;    stroke-width: 4; }
    84%           { stroke: #AF121D; opacity: 0.85; stroke-width: 4; }
    91%           { stroke: #EF6C75; opacity: 0.35; stroke-width: 2; }
  }
  @keyframes s1-ln3 {
    0%, 46%, 100% { stroke: #EF6C75; opacity: 0.35; stroke-width: 2; }
    51%           { stroke: #AF121D; opacity: 1;    stroke-width: 4; }
    84%           { stroke: #AF121D; opacity: 0.85; stroke-width: 4; }
    91%           { stroke: #EF6C75; opacity: 0.35; stroke-width: 2; }
  }
  @keyframes s1-ln4 {
    0%, 60%, 100% { stroke: #EF6C75; opacity: 0.35; stroke-width: 2; }
    65%           { stroke: #AF121D; opacity: 1;    stroke-width: 4; }
    84%           { stroke: #AF121D; opacity: 0.85; stroke-width: 4; }
    91%           { stroke: #EF6C75; opacity: 0.35; stroke-width: 2; }
  }
  /* "rebuild" label on each connection, staggered */
  @keyframes s1-rl1 {
    0%, 23%, 100% { opacity: 0; }
    27%  { opacity: 1; }  84%  { opacity: 1; }  91%  { opacity: 0; }
  }
  @keyframes s1-rl2 {
    0%, 37%, 100% { opacity: 0; }
    41%  { opacity: 1; }  84%  { opacity: 1; }  91%  { opacity: 0; }
  }
  @keyframes s1-rl3 {
    0%, 51%, 100% { opacity: 0; }
    55%  { opacity: 1; }  84%  { opacity: 1; }  91%  { opacity: 0; }
  }
  @keyframes s1-rl4 {
    0%, 65%, 100% { opacity: 0; }
    69%  { opacity: 1; }  84%  { opacity: 1; }  91%  { opacity: 0; }
  }
  /* Summary count appears after all 4 are lit */
  @keyframes s1-total {
    0%, 69%, 100% { opacity: 0; }
    73%  { opacity: 1; }  84%  { opacity: 1; }  91%  { opacity: 0; }
  }

  #s1-switch-q { animation: s1-switch-q 5s ease-in-out infinite; }
  #s1-ln1      { animation: s1-ln1      5s ease-in-out infinite; }
  #s1-ln2      { animation: s1-ln2      5s ease-in-out infinite; }
  #s1-ln3      { animation: s1-ln3      5s ease-in-out infinite; }
  #s1-ln4      { animation: s1-ln4      5s ease-in-out infinite; }
  #s1-rl1      { animation: s1-rl1      5s ease-in-out infinite; }
  #s1-rl2      { animation: s1-rl2      5s ease-in-out infinite; }
  #s1-rl3      { animation: s1-rl3      5s ease-in-out infinite; }
  #s1-rl4      { animation: s1-rl4      5s ease-in-out infinite; }
  #s1-total    { animation: s1-total    5s ease-in-out infinite; }
</style>

  <template id="tpl-s2">
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480">
<style>
  /*
   * 9s cycle — direct rebuttal to slide 1:
   * 0–40%  (0–3.6s):  normal state — 4 apps → standard → vendor, all calm
   * 40–47% (3.6–4.2s): same question as slide 1 — "want to switch vendors?"
   * 47–65% (4.2–5.8s): only the right side changes — adapter line highlights, vendor swaps
   * 65–88% (5.8–7.9s): left connections untouched — "1 connection updated", apps still green
   * 88–100% (7.9–9s):  reset
   */

  /* The single adapter connection on the right highlights */
  @keyframes s2-adapter-line {
    0%, 18%, 100% { stroke: #C2C0E8; stroke-width: 2; }
    23%           { stroke: #AF121D; stroke-width: 4; }
    40%           { stroke: #00AD93; stroke-width: 3; }
    83%           { stroke: #00AD93; stroke-width: 3; }
    90%           { stroke: #C2C0E8; stroke-width: 2; }
  }
  /* Old vendor label fades out during swap */
  @keyframes s2-old-vendor {
    0%, 18%, 100% { opacity: 1; }
    23%           { opacity: 0; }
    83%           { opacity: 0; }
    90%           { opacity: 1; }
  }
  /* Vendor circle dims briefly then recovers — showing the swap */
  @keyframes s2-vendor-swap {
    0%, 18%, 100% { fill: #FFD699; stroke: #FFB446; }
    23%           { fill: #E9CCBE; stroke: #C2C0E8; }
    40%           { fill: #FFD699; stroke: #FFB446; }
  }
  /* "New Vendor" label fades in after swap */
  @keyframes s2-new-vendor {
    0%, 37%, 100% { opacity: 0; }
    42%           { opacity: 1; }
    83%           { opacity: 1; }
    90%           { opacity: 0; }
  }
  /* "want to switch vendors?" — same cue as slide 1 */
  @keyframes s2-switch-q {
    0%, 8%, 100% { opacity: 0; }
    13%  { opacity: 0.75; }
    83%  { opacity: 0.75; }
    90%  { opacity: 0; }
  }
  /* "1 connection updated" label on adapter line */
  @keyframes s2-one-label {
    0%, 40%, 100% { opacity: 0; }
    44%  { opacity: 1; }
    83%  { opacity: 1; }
    90%  { opacity: 0; }
  }
  /* Left app connections glow green briefly — still working */
  @keyframes s2-apps-ok {
    0%, 40%, 100% { stroke: #C2C0E8; stroke-width: 2; }
    45%           { stroke: #00AD93; stroke-width: 3; }
    83%           { stroke: #00AD93; stroke-width: 2.5; }
    90%           { stroke: #C2C0E8; stroke-width: 2; }
  }

  #s2-adapter        { animation: s2-adapter-line 5s ease-in-out infinite; }
  #s2-vendor         { animation: s2-vendor-swap  5s ease-in-out infinite; }
  #s2-vold, #s2-vold2 { animation: s2-old-vendor  5s ease-in-out infinite; }
  #s2-vnew, #s2-vnew2 { animation: s2-new-vendor  5s ease-in-out infinite; }
  #s2-switch-q       { animation: s2-switch-q     5s ease-in-out infinite; }
  #s2-one-label      { animation: s2-one-label    5s ease-in-out infinite; }
  #s2-lc1            { animation: s2-apps-ok      9s ease-in-out infinite 0.00s; }
  #s2-lc2            { animation: s2-apps-ok      9s ease-in-out infinite 0.08s; }
  #s2-lc3            { animation: s2-apps-ok      9s ease-in-out infinite 0.16s; }
  #s2-lc4            { animation: s2-apps-ok      9s ease-in-out infinite 0.24s; }
</style>

  <template id="tpl-s3">
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480">
<style>
  /*
   * 7s cycle — contract generates running software:
   * 0–30%  (0–2.1s):  apps connected to Blueprint bar, right side empty

      s4: document.getElementById('tpl-s4').innerHTML.trim(),
      s5: document.getElementById('tpl-s5').innerHTML.trim(),
      s6: document.getElementById('tpl-s6').innerHTML.trim(),
      s7: document.getElementById('tpl-s7').innerHTML.trim(),
      s8: document.getElementById('tpl-s8').innerHTML.trim(),
    };

    const wrapper = document.getElementById('map-wrapper');

    function fitDiagram() {
      const w = window.outerWidth || window.innerWidth || 1400;
      const scale = w / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      wrapper.innerHTML = CONTENT[id];
      window.scrollTo(0, 0);
      document.querySelectorAll('#top-nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === id);
      });
      requestAnimationFrame(fitDiagram);
    }

    document.querySelectorAll('#top-nav button').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });

    // Expose for Puppeteer PNG export
    window._navigate = navigate;

    navigate('s1');
    window.addEventListener('resize', fitDiagram);
  </script>
</body>
