  <script>
    const CONTENT = {
      overview:  document.getElementById('tpl-overview').innerHTML.trim(),
      detail:    document.getElementById('tpl-detail').innerHTML.trim(),
      migration: document.getElementById('tpl-migration').innerHTML.trim(),
      build:     document.getElementById('tpl-build').innerHTML.trim(),
    };

    const wrapper = document.getElementById('map-wrapper');

    function fitDiagram() {
      const w = window.outerWidth || window.innerWidth || 1400;
      const scale = w / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      wrapper.innerHTML = CONTENT[id];
      window.scrollTo(0, 0);
      document.querySelectorAll('#top-nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === id);
      });
      requestAnimationFrame(fitDiagram);
    }

    document.querySelectorAll('#top-nav button').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });

    // Expose for Puppeteer PNG export
    window._navigate = navigate;

    navigate('overview');
    window.addEventListener('resize', fitDiagram);
  </script>
