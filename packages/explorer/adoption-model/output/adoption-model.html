  <!-- SLIDE GOAL (S1): You don't own your platform. When a vendor changes something — or
       you want to replace a system — everything connected to it breaks. Change is expensive,
       slow, and risky not because your team is bad at it, but because the platform was never
       designed to change. Compliance isn't baked in either: you're reliant on vendors who
       have no obligation to coordinate with each other, so a change in one system can break
       compliance logic that lives in another. -->

  <script>
    const CONTENT = {
      s1: document.getElementById('tpl-s1').innerHTML.trim(),
      s2: document.getElementById('tpl-s2').innerHTML.trim(),
      s3: document.getElementById('tpl-s3').innerHTML.trim(),
      s4: document.getElementById('tpl-s4').innerHTML.trim(),
      s5: document.getElementById('tpl-s5').innerHTML.trim(),
    };

    const wrapper = document.getElementById('map-wrapper');

    function fitDiagram() {
      const w = window.outerWidth || window.innerWidth || 1400;
      const scale = w / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      wrapper.innerHTML = CONTENT[id];
      window.scrollTo(0, 0);
      document.querySelectorAll('#top-nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === id);
      });
      requestAnimationFrame(fitDiagram);
    }

    document.querySelectorAll('#top-nav button').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });

    window._navigate = navigate;
    navigate('s1');
    window.addEventListener('resize', fitDiagram);
  </script>
