      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Document Management</text>
    <text x="130" y="451" text-anchor="middle"
      font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#9ca3af"
      textLength="200" lengthAdjust="spacingAndGlyphs">Document · Upload · DocumentRequest</text>
    <text x="130" y="472" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">Files, uploads & verification</text>
  </g>
  <g data-navigate="workflow" style="cursor:pointer">
    <rect x="420" y="405" width="220" height="105" rx="8"
      fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
    <text x="530" y="433" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Workflow</text>
    <text x="530" y="451" text-anchor="middle"
      font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#2563eb"
      textLength="200" lengthAdjust="spacingAndGlyphs">Task · Queue · VerificationTask · SLAType</text>
    <text x="530" y="472" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">Task lifecycle, queues & SLA tracking</text>
  </g>
  <g data-navigate="data_exchange" style="cursor:pointer">
    <rect x="820" y="405" width="220" height="105" rx="8"
      fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
    <text x="930" y="433" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Data Exchange</text>
    <text x="930" y="451" text-anchor="middle"
      font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#16a34a"
      textLength="200" lengthAdjust="spacingAndGlyphs">ExternalServiceCall · IncomeVerification · IdentityVerification · ImmigrationStatus · EligibilityHub</text>
    <text x="930" y="472" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">External service facade (IRS, SSA, SAVE)</text>
  </g>
  <g data-navigate="scheduling" style="cursor:pointer">
    <rect x="420" y="555" width="220" height="105" rx="8"
      fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
    <text x="530" y="583" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Scheduling</text>
