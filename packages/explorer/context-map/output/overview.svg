<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="760" viewBox="0 0 1080 760" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>

  <!-- Background -->
  <rect width="1080" height="760" fill="white"/>

  <!-- Title -->
  <text x="25" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Safety Net Blueprint — Context Map</text>
  <text x="25" y="43" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">Event-driven domain integration</text>

  <!-- Cross-cutting banner -->
  <rect x="25" y="54" width="1030" height="36" rx="6"
    fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="540" y="68" text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="700" fill="#15803d" letter-spacing="0.07em">CROSS-CUTTING CONCERNS</text>
  <text x="540" y="81" text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#166534">Communication  ·  Search  ·  Observability  ·  Reporting  ·  Configuration Management</text>

  <!-- Domains (click to drill in) -->
  <g data-navigate="client_management" style="cursor:pointer">
    <rect x="20" y="100" width="220" height="105" rx="8"
      fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="130" y="128" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Client Management</text>
    <text x="130" y="146" text-anchor="middle"
      font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#9ca3af"
      textLength="200" lengthAdjust="spacingAndGlyphs">Person · Client · Relationship</text>
    <text x="130" y="167" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">Persistent client identity & history</text>
  </g>
  <g data-navigate="intake" style="cursor:pointer">
    <rect x="420" y="100" width="220" height="105" rx="8"
      fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
    <text x="530" y="128" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Intake</text>
    <text x="530" y="146" text-anchor="middle"
      font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#2563eb"
      textLength="200" lengthAdjust="spacingAndGlyphs">Application · ApplicationMember · Income · Expense · Resource</text>
    <text x="530" y="167" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">Application submission & intake processing</text>
  </g>
  <g data-navigate="eligibility" style="cursor:pointer">
    <rect x="820" y="100" width="220" height="105" rx="8"
      fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="930" y="128" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Eligibility</text>
    <text x="930" y="146" text-anchor="middle"
      font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#9ca3af"
      textLength="200" lengthAdjust="spacingAndGlyphs">EligibilityRequest · EligibilityUnit · Determination · VerificationRequirement</text>
    <text x="930" y="167" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">Program eligibility determination</text>
  </g>
  <g data-navigate="case_management" style="cursor:pointer">
