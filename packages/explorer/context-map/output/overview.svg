    <text x="530" y="622" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">Appointments & interviews</text>
  </g>

  <g transform="translate(25, 712)">
    <rect x="0" y="0" width="1030" height="30" rx="4"
      fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    
    <rect x="12" y="9" width="12" height="12" rx="2"
      fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="28" y="20" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#374151">Partial implementation</text>
    <rect x="355.3333333333333" y="9" width="12" height="12" rx="2"
      fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="371.3333333333333" y="20" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#374151">Design complete</text>
    <rect x="698.6666666666666" y="9" width="12" height="12" rx="2"
      fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="714.6666666666666" y="20" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#374151">Not started</text>
  </g>
