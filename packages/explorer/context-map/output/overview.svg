      textLength="200" lengthAdjust="spacingAndGlyphs">Case · CaseWorker · Assignment · Office</text>
    <text x="330" y="322" text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280"
      textLength="200" lengthAdjust="spacingAndGlyphs">Cases, workers & staff assignments</text>
  </g>
  <g data-navigate="document_management" style="cursor:pointer">
