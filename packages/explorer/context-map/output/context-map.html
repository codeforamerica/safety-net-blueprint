;font-weight:600;color:#00AD93;white-space:nowrap;\">Submits application</div></div>\n<div style=\"position:absolute;left:205.0px;top:186.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">Online or in person; caseworker may submit on behalf of applicant</div>\n<div class=\"int-hit\" data-int-id=\"r0\" style=\"position:absolute;left:258.2px;top:175px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r0\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(g)</div><div style=\"font-size:8px;color:#374151;\">Agency must accept any application on the date of first contact, even if incomplete. The date received is the application filing date and starts the processing clock.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(c)(1)</div><div style=\"font-size:8px;color:#374151;\">Agency must date-stamp or otherwise record the date of receipt on every application. The date stamp establishes the filing date used for timeliness determinations.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(i)(1)</div><div style=\"font-size:8px;color:#374151;\">Agency must act on an application and provide benefits or send a notice of denial within 30 days of the date of application.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(i)(3)(i)</div><div style=\"font-size:8px;color:#374151;\">Benefits must be issued within 7 days for households with gross monthly income below $150 and liquid resources at or below $100, or households whose combined monthly gross income and liquid resources are less than the monthly rent or mortgage and utilities.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.912</div><div style=\"font-size:8px;color:#374151;\">States must make eligibility determinations within 45 days of application for most applicants and within 90 days for applicants who require a disability determination.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(a)</div><div style=\"font-size:8px;color:#374151;\">Any household may apply for SNAP benefits regardless of current participation in other programs. Agencies may not screen out applicants before accepting an application.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.1</div><div style=\"font-size:8px;color:#374151;\">All household members must be listed on the application regardless of whether they are individually applying for SNAP. Members who are ineligible — such as non-citizens who do not qualify — must still be listed because their income and resources are counted when calculating the benefit amount for the rest of the household.</div></div>\n<div style=\"position:absolute;left:329.0px;top:217.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Verifications created per program and household member</div>\n<div style=\"position:absolute;left:329.0px;top:230.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">Income, identity, residency for SNAP; citizenship and immigration for Medicaid (per member)</div>\n<div style=\"position:absolute;left:615.0px;top:281.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">Store documents</div></div>\n<div style=\"position:absolute;left:329.0px;top:329.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Documents linked to verification items</div>\n<div style=\"position:absolute;left:533.0px;top:407.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">identity Verification (fdsh_ssa)</div></div>\n<div style=\"position:absolute;left:533.0px;top:424.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">If Medicaid also applied, result also satisfies citizenship Verification</div>\n<div style=\"position:absolute;left:533.0px;top:451.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">income Verification (ssa_ievs, irs_ievs, swica, uib)</div></div>\n<div style=\"position:absolute;left:533.0px;top:495.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#AF121D;white-space:nowrap;\">⚠️ immigration Verification (save)</div></div>\n<div class=\"int-hit\" data-int-id=\"g0\" style=\"position:absolute;left:533.0px;top:494px;width:295.2px;height:28px;transform:translateX(-50% fore requesting paper documents — Income is checked against federal tax data electronically (FDSH FTI) before requesting documentation from the applicant. Paper documentation (pay stubs, tax returns) may only be requested if the electronic check is inconclusive.</div></div>\n<div style=\"position:absolute;left:697.0px;top:1487.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">existing coverage check (fdsh_medicare, fdsh_vci)</div></div>\n<div class=\"int-hit\" data-int-id=\"r2\" style=\"position:absolute;left:750.2px;top:1493px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r2\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.916</div><div style=\"font-size:8px;color:#374151;\">Check for existing Medicare or Medicaid enrollment before starting verification — active coverage may allow auto-approval — Two federal data hub checks must be performed before requesting documents from the applicant: one for existing Medicare enrollment and one for existing Medicaid or other health coverage. If active coverage is found, the application may be auto-approved without further verification. Otherwise, standard electronic verification continues.</div></div>\n<div style=\"position:absolute;left:697.0px;top:1531.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ call.completed</div></div>\n<div style=\"position:absolute;left:697.0px;top:1548.0px;transform:translate(-50%,0);text-align:center lvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">Per person per program; may fire multiple times as each resolves</div>\n<div style=\"position:absolute;left:552.5px;top:543.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Decision recorded per person per program</div>\n<div style=\"position:absolute;left:699.5px;top:597.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.determination_completed</div></div>\n<div style=\"position:absolute;left:699.5px;top:614.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">Fires once all program+member combinations are determined</div>\n<div style=\"position:absolute;left:552.5px;top:645.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Application closed (or routed to pending_approval if state approval thresholds met)</div>\n<div style=\"position:absolute;left:321.5px;top:709.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">Reviews all determination results</div></div>\n<div class=\"int-hit\" data-int-id=\"ov0\" style=\"position:absolute;left:438.9px;top:715px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#FEF3C7;border:1px solid #D97706;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;color:#D97706;\">&#8853;</div><div class=\"int-content\" data-int-id=\"ov0\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#D97706;\">&#8853; State overlay point</div><div style=\"font-size:8px;color:#374151;\">States may automate caseworker review of determination results; federal regulations require documentation of the outcome, not manual review of the calculation</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">rules config</div></div>\n<div style=\"position:absolute;left:321.5px;top:753.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">Records determination and rationale</div></div>\n<div class=\"int-hit\" data-int-id=\"r0\" style=\"position:absolute;left:438.9px;top:759px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r0\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.15</div><div style=\"font-size:8px;color:#374151;\">Applicants have the right to a fair hearing if the agency delays or denies benefits. Supervisor review is a prerequisite for escalated cases prior to formal hearing proceedings.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(h)</div><div style=\"font-size:8px;color:#374151;\">Written notice of eligibility or denial must be sent to each applicant household within the 30-day processing deadline (7 days for expedited). Notice must include the eligibility decision, benefit amount if approved, or denial reason if denied.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.917</div><div style=\"font-size:8px;color:#374151;\">Written notice of eligibility, denial, or termination must be sent within the 45-day processing deadline (90 days if a disability determination is required). Notice must state the decision, the reason, and the applicant's right to appeal.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.15(a)</div><div style=\"font-size:8px;color:#374151;\">Every household has the right to a fair hearing to contest any agency action affecting their benefits, including delays, denials, reductions, and terminations.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 431.17(b)(1)</div><div style=\"font-size:8px;color:#374151;\">Each eligibility determination must be documented with the date of the decision, the regulatory basis for the decision, and all information and documents used to support it. Applies to approvals, denials, and terminations.</div></div>\n<div class=\"int-hit\" data-int-id=\"ov1\" style=\"position:absolute;left:552.5px;top:825.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:4;cursor:help;\">Evaluates determination against supervisor approval thresholds<span style=\"display:inline-block;margin-left:4px;width:12px;height:12px;line-height:12px;text-align:center;vertical-align:middle;background:#FEF3C7;border:1px solid #D97706;border-radius:2px;font-size:8px;color:#D97706;\">&#8853;</span></div><div class=\"int-content\" data-int-id=\"ov1\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#D97706;\">&#8853; State overlay point</div><div style=\"font-size:8px;color:#374151;\">States configure supervisor approval threshold rules (benefit amount, denial type, exception flags)</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">rules config</div></div>\n<div style=\"position:absolute;left:605.0px;top:865.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ determination.approval_needed</div></div>\n<div style=\"position:absolute;left:741.5px;top:913.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Caseworker task → pending_review; supervisor approval task created</div>\n<div style=\"position:absolute;left:416.0px;top:953.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">Claims task from queue</div></div>\n<div style=\"position:absolute;left:416.0px;top:970.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">Supervisor selects from supervisor review queue</div>\n<div style=\"position:absolute;left:605.0px;top:997.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">Claim task</div></div>\n<div style=\"position:absolute;left:605.0px;top:1014.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">API call to workflow</div>\n<div style=\"position:absolute;left:552.5px;top:1045.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Application status → pending_approval</div>\n<div style=\"position:absolute;left:416.0px;top:1085.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">Reviews and approves or rejects determination</div></div>\n<div style=\"position:absolute;left:416.0px;top:1102.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;white-space:nowrap;z-index:3;\">On approval: application closes, workflow completes both tasks. On rejection: intake returns application to under_review; workflow calls return-to-worker on caseworker task</div>\n<div style=\"position:absolute;left:794.0px;top:1143.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#AF121D;white-space:nowrap;\">⚠️ Send Notice of Action</div></div>\n<div class=\"int-hit\" data-int-id=\"r1\" style=\"position:absolute;left:968.1px;top:1149px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r1\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(h)</div><div style=\"font-size:8px;color:#374151;\">Written notice of eligibility or denial must be sent to each applicant household within the 30-day processing deadline (7 days for expedited). Notice must include the eligibility decision, benefit amount if approved, or denial reason if denied.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.917</div><div style=\"font-size:8px;color:#374151;\">Written notice of eligibility, denial, or termination must be sent within the 45-day processing deadline (90 days if a disability determination is required). Notice must state the decision, the reason, and the applicant's right to appeal.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.15(a)</div><div style=\"font-size:8px;color:#374151;\">Every household has the right to a fair hearing to contest any agency action affecting their benefits, including delays, denials, reductions, and terminations.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 431.17(b)(1)</div><div style=\"font-size:8px;color:#374151;\">Each eligibility determination must be documented with the date of the decision, the regulatory basis for the decision, and all information and documents used to support it. Applies to approvals, denials, and terminations.</div></div>\n<div class=\"int-hit\" data-int-id=\"g0\" style=\"position:absolute;left:794.0px;top:1142px;width:340.2px;height:28px;transform:translateX(-50%);background:transparent;cursor:help;z-index:4;\"></div><div class=\"int-content\" data-int-id=\"g0\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#AF121D;\">⚠️ Gap</div><div style=\"font-size:8px;color:#374151;\">Notice template catalog not yet designed</div></div>\n<div style=\"position:absolute;left:888.5px;top:1187.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.closed</div></div>\n<div style=\"position:absolute;left:1224.5px;top:1235.0px;transform:translate(-100%,0);text-align:right;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Creates case</div>\n<div style=\"position:absolute;left:605.0px;top:1275.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.closed</div></div>\n<div style=\"position:absolute;left:741.5px;top:1323.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;z-index:3;\">Completes or cancels open tasks: pending_review task → completed (approval path); in_progress task → completed (manual path); pending task → cancelled (auto-determination path)</div>\n</div>"
    };

    let current = '__overview__';
    const wrapper = document.getElementById('map-wrapper');

    // Shared cursor-following tooltip for integration details on domain detail pages.
    // position:fixed keeps it relative to the viewport and never causes document scroll.
    const intTooltip = document.createElement('div');
    intTooltip.id = 'int-tooltip';
    intTooltip.style.cssText = [
      'position:fixed', 'display:none', 'pointer-events:none',
      "font-family:'Helvetica Neue',Helvetica,Arial,sans-serif",
      'font-size:8.5px', 'line-height:1.65', 'white-space:nowrap',
      'z-index:9999', 'background:white', 'border:1px solid #E9CCBE',
      'border-radius:5px', 'padding:5px 8px',
      'box-shadow:0 2px 8px rgba(0,0,0,0.12)'
    ].join(';');
    document.body.appendChild(intTooltip);

    // Scale the diagram to fill the available viewport width.
    // transform: scale() keeps internal coordinates at 1400px; marginBottom compensates
    // for the layout gap (scale < 1) or extension (scale > 1) left by the transform.
    // Formula: offsetHeight * (scale - 1) is naturally negative below 1, positive above.
    function fitDiagram() {
      // outerWidth is the physical window size, unaffected by browser zoom level.
      // clientWidth shrinks when the user zooms in, which fights the browser's
      // native zoom and pushes the diagram off-screen. outerWidth stays constant
      // across zoom changes and only changes when the window is actually resized.
      // Content must stay at x ≤ ~1360 to avoid clipping from the ~20px gap
      // between outerWidth (includes OS chrome) and innerWidth (visible viewport).
      const scale = window.outerWidth / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      current = id;
      intTooltip.style.display = 'none';
      wrapper.innerHTML = CONTENT[id];
      fitDiagram();
      window.scrollTo(0, 0);

      wrapper.querySelectorAll('[data-navigate]').forEach(el => {
        el.addEventListener('click', () => navigate(el.getAttribute('data-navigate')));
      });

      // Map content by id for O(1) lookup
      const intContent = {};
      wrapper.querySelectorAll('.int-content').forEach(el => {
        intContent[el.dataset.intId] = el.innerHTML;
      });

      // Wire up cursor-following tooltip on connection hit areas
      wrapper.querySelectorAll('.int-hit').forEach(el => {
        const html = intContent[el.dataset.intId] || '';
        if (!html) return;
        el.addEventListener('mouseenter', () => {
          intTooltip.innerHTML = html;
          intTooltip.style.display = 'block';
        });
        el.addEventListener('mousemove', e => {
          intTooltip.style.left = (e.clientX + 16) + 'px';
          intTooltip.style.top  = (e.clientY + 10) + 'px';
        });
        el.addEventListener('mouseleave', () => {
          intTooltip.style.display = 'none';
        });
      });
    }

    navigate('domains');
    window.addEventListener('resize', fitDiagram);
  </script>
</body>
</html>
