al;z-index:3;\">API call to workflow</div>\n<div style=\"position:absolute;left:552.5px;top:1079.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Determination status → pending approval</div>\n<div style=\"position:absolute;left:416.0px;top:1119.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#2B1A78;white-space:nowrap;\">Reviews and approves determination</div></div>\n<div style=\"position:absolute;left:416.0px;top:1136.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">If rejected, intake flags for revision and workflow reassigns caseworker task</div>\n<div style=\"position:absolute;left:794.0px;top:1191.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#AF121D;white-space:nowrap;\">⚠️ Send Notice of Action</div></div>\n<div class=\"int-hit\" data-int-id=\"r2\" style=\"position:absolute;left:968.1px;top:1197px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r2\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(h)</div><div style=\"font-size:8px;color:#374151;\">SNAP: written notice of eligibility or denial must be sent to each applicant household</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.917</div><div style=\"font-size:8px;color:#374151;\">Medicaid: written notice of eligibility, denial, or termination required</div></div>\n<div class=\"int-hit\" data-int-id=\"g1\" style=\"position:absolute;left:794.0px;top:1190px;width:340.2px;height:28px;transform:translateX(-50%);background:transparent;cursor:help;z-index:4;\"></div><div class=\"int-content\" data-int-id=\"g1\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#AF121D;\">⚠️ Gap</div><div style=\"font-size:8px;color:#374151;\">Notice template catalog not yet designed</div></div>\n<div style=\"position:absolute;left:888.5px;top:1235.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.closed</div></div>\n<div style=\"position:absolute;left:1224.5px;top:1283.0px;transform:translate(-100%,0);text-align:right;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Creates case</div>\n<div style=\"position:absolute;left:605.0px;top:1347.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.closed</div></div>\n<div style=\"position:absolute;left:741.5px;top:1395.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Cancels open intake task for this application</div>\n</div>"
    };

    let current = '__overview__';
    const wrapper = document.getElementById('map-wrapper');

    // Shared cursor-following tooltip for integration details on domain detail pages.
    // position:fixed keeps it relative to the viewport and never causes document scroll.
    const intTooltip = document.createElement('div');
    intTooltip.id = 'int-tooltip';
    intTooltip.style.cssText = [
      'position:fixed', 'display:none', 'pointer-events:none',
      "font-family:'Helvetica Neue',Helvetica,Arial,sans-serif",
      'font-size:8.5px', 'line-height:1.65', 'white-space:nowrap',
      'z-index:9999', 'background:white', 'border:1px solid #E9CCBE',
      'border-radius:5px', 'padding:5px 8px',
      'box-shadow:0 2px 8px rgba(0,0,0,0.12)'
    ].join(';');
    document.body.appendChild(intTooltip);

    // Scale the diagram to fill the available viewport width.
    // transform: scale() keeps internal coordinates at 1400px; marginBottom compensates
    // for the layout gap (scale < 1) or extension (scale > 1) left by the transform.
    // Formula: offsetHeight * (scale - 1) is naturally negative below 1, positive above.
    function fitDiagram() {
      // outerWidth is the physical window size, unaffected by browser zoom level.
      // clientWidth shrinks when the user zooms in, which fights the browser's
      // native zoom and pushes the diagram off-screen. outerWidth stays constant
      // across zoom changes and only changes when the window is actually resized.
      // Content must stay at x ≤ ~1360 to avoid clipping from the ~20px gap
      // between outerWidth (includes OS chrome) and innerWidth (visible viewport).
      const scale = window.outerWidth / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      current = id;
      intTooltip.style.display = 'none';
      wrapper.innerHTML = CONTENT[id];
      fitDiagram();
      window.scrollTo(0, 0);

      wrapper.querySelectorAll('[data-navigate]').forEach(el => {
        el.addEventListener('click', () => navigate(el.getAttribute('data-navigate')));
      });

      // Map content by id for O(1) lookup
      const intContent = {};
      wrapper.querySelectorAll('.int-content').forEach(el => {
        intContent[el.dataset.intId] = el.innerHTML;
      });

      // Wire up cursor-following tooltip on connection hit areas
      wrapper.querySelectorAll('.int-hit').forEach(el => {
        const html = intContent[el.dataset.intId] || '';
        if (!html) return;
        el.addEventListener('mouseenter', () => {
          intTooltip.innerHTML = html;
          intTooltip.style.display = 'block';
        });
        el.addEventListener('mousemove', e => {
          intTooltip.style.left = (e.clientX + 16) + 'px';
          intTooltip.style.top  = (e.clientY + 10) + 'px';
        });
        el.addEventListener('mouseleave', () => {
          intTooltip.style.display = 'none';
        });
      });
    }

    navigate('domains');
    window.addEventListener('resize', fitDiagram);
  </script>
