top:1049.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#16a34a;white-space:nowrap;\">⚡ task.claimed</div></div>\n<div style=\"position:absolute;left:552.5px;top:1117.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Determination status → pending approval</div>\n<div style=\"position:absolute;left:416.0px;top:1177.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#4f46e5;white-space:nowrap;\">Reviews and approves determination</div></div>\n<div style=\"position:absolute;left:416.0px;top:1194.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">If rejected, intake flags for revision and workflow reassigns caseworker task</div>\n<div style=\"position:absolute;left:699.5px;top:1241.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#9ca3af;white-space:nowrap;\">⚡ determination.recorded</div></div>\n<div style=\"position:absolute;left:846.5px;top:1309.0px;transform:translate(-100%,0);text-align:right;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Sends Notice of Action</div>\n<div style=\"position:absolute;left:888.5px;top:1369.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#16a34a;white-space:nowrap;\">⚡ application.closed</div></div>\n<div style=\"position:absolute;left:1224.5px;top:1437.0px;transform:translate(-100%,0);text-align:right;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Creates case</div>\n</div>"
    };

    let current = '__overview__';
    const wrapper = document.getElementById('map-wrapper');

    // Shared cursor-following tooltip for integration details on domain detail pages.
    // position:fixed keeps it relative to the viewport and never causes document scroll.
    const intTooltip = document.createElement('div');
    intTooltip.id = 'int-tooltip';
    intTooltip.style.cssText = [
      'position:fixed', 'display:none', 'pointer-events:none',
      "font-family:'Helvetica Neue',Helvetica,Arial,sans-serif",
      'font-size:8.5px', 'line-height:1.65', 'white-space:nowrap',
      'z-index:9999', 'background:white', 'border:1px solid #e5e7eb',
      'border-radius:5px', 'padding:5px 8px',
      'box-shadow:0 2px 8px rgba(0,0,0,0.12)'
    ].join(';');
    document.body.appendChild(intTooltip);

    // Scale the diagram to fill the available viewport width.
    // transform: scale() keeps internal coordinates at 1400px; marginBottom compensates
    // for the layout gap (scale < 1) or extension (scale > 1) left by the transform.
    // Formula: offsetHeight * (scale - 1) is naturally negative below 1, positive above.
    function fitDiagram() {
      // outerWidth is the physical window size, unaffected by browser zoom level.
      // clientWidth shrinks when the user zooms in, which fights the browser's
      // native zoom and pushes the diagram off-screen. outerWidth stays constant
      // across zoom changes and only changes when the window is actually resized.
      // Content must stay at x ≤ ~1360 to avoid clipping from the ~20px gap
      // between outerWidth (includes OS chrome) and innerWidth (visible viewport).
      const scale = window.outerWidth / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      current = id;
      intTooltip.style.display = 'none';
      wrapper.innerHTML = CONTENT[id];
      fitDiagram();
      window.scrollTo(0, 0);

      wrapper.querySelectorAll('[data-navigate]').forEach(el => {
        el.addEventListener('click', () => navigate(el.getAttribute('data-navigate')));
      });

      // Map content by id for O(1) lookup
      const intContent = {};
      wrapper.querySelectorAll('.int-content').forEach(el => {
        intContent[el.dataset.intId] = el.innerHTML;
      });

      // Wire up cursor-following tooltip on connection hit areas
      wrapper.querySelectorAll('.int-hit').forEach(el => {
        const html = intContent[el.dataset.intId] || '';
        if (!html) return;
        el.addEventListener('mouseenter', () => {
          intTooltip.innerHTML = html;
          intTooltip.style.display = 'block';
        });
        el.addEventListener('mousemove', e => {
          intTooltip.style.left = (e.clientX + 16) + 'px';
          intTooltip.style.top  = (e.clientY + 10) + 'px';
        });
        el.addEventListener('mouseleave', () => {
          intTooltip.style.display = 'none';
        });
      });
    }

    navigate('domains');
    window.addEventListener('resize', fitDiagram);
  </script>
