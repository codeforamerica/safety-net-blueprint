e. Expedited criteria include low income, low resources, or migrant/seasonal farm worker status.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.912</div><div style=\"font-size:8px;color:#374151;\">Medicaid: 45-day processing clock starts at submission</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Determination must be completed within 45 days. 90 days if disability determination required — indicated by program type (e.g., Medicaid ABD vs. MAGI Medicaid).</div></div>\n<div style=\"position:absolute;left:329.0px;top:231.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Verifications created per program and household member</div>\n<div style=\"position:absolute;left:615.0px;top:309.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">Store documents</div></div>\n<div style=\"position:absolute;left:329.0px;top:357.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Documents linked to verification items</div>\n<div style=\"position:absolute;left:533.0px;top:435.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">identity Verification (fdsh_ssa)</div></div>\n<div style=\"position:absolute;left:533.0px;top:452.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">If Medicaid also applied, result also satisfies citizenship Verification</div>\n<div class=\"int-hit\" data-int-id=\"r1\" style=\"position:absolute;left:684.6px;top:441px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r1\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 U.S.C. § 1320b-7</div><div style=\"font-size:8px;color:#374151;\">SSN must be verified via SSA</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Applicants must disclose their SSN; it is verified electronically via SSA before determination.</div></div>\n<div style=\"position:absolute;left:533.0px;top:481.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">income Verification (ssa_ievs, irs_ievs, swica, uib)</div></div>\n<div class=\"int-hit\" data-int-id=\"r2\" style=\"position:absolute;left:684.6px;top:487px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r2\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 272.8</div><div style=\"font-size:8px;color:#374151;\">IEVS: must query SSA, IRS, state wage records, and unemployment insurance separately</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Each source is a separate electronic query and must be queried independently — results cannot be satisfied by a single combined check. Sources: SSA (Social Security earnings), IRS (federal tax data), SWICA (state wage records), UIB (unemployment insurance).</div></div>\n<div style=\"position:absolute;left:533.0px;top:525.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#AF121D;white-space:nowrap;\">⚠️ immigration Verification (save)</div></div>\n<div class=\"int-hit\" data-int-id=\"r3\" style=\"position:absolute;left:684.6px;top:531px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r3\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">8 U.S.C. § 1611</div><div style=\"font-size:8px;color:#374151;\">SNAP: immigration status verified electronically via SAVE</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Non-qualified aliens are ineligible for federal public benefits. SNAP verifies immigration status electronically via SAVE before determination. When electronic verification is inconclusive, acceptable document proofs include green card (I-551), I-94, or employment authorization card (I-766/I-688B).</div></div>\n<div class=\"int-hit\" data-int-id=\"g0\" style=\"position:absolute;left:533.0px;top:524px;width:295.2px;height:28px;transform:translateX(-50%);background:transparent;cursor:help;z-index:4;\"></div><div class=\"int-content\" data-int-id=\"g0\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#AF121D;\">⚠️ Gap</div><div style=\"font-size:8px;color:#374151;\">SNAP immigration verification via SAVE not yet implemented — intake rules do not yet create an immigration verification item for SNAP applicants</div></div>\n<div style=\"position:absolute;left:533.0px;top:607.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">citizenship Verification (fdsh_ssa)</div></div>\n<div style=\"position:absolute;left:533.0px;top:624.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">[if SNAP not applied]<br>fdsh_ssa result shared with identity Verification when both programs applied</div>\n<div class=\"int-hit\" data-int-id=\"r4\" style=\"position:absolute;left:684.6px;top:613px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r4\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.956(b)</div><div style=\"font-size:8px;color:#374151;\">Citizenship verified electronically via FDSH SSA before requesting paper documents</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">The federal data hub's Social Security Administration check is run first; if conclusive, no document request is needed. If inconclusive, paper documents (passport, birth certificate, U.S. certificate of naturalization) may be requested.</div></div>\n<div style=\"position:absolute;left:533.0px;top:665.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">immigration Verification (fdsh_vlp)</div></div>\n<div class=\"int-hit\" data-int-id=\"r5\" style=\"position:absolute;left:684.6px;top:671px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r5\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.956(c)</div><div style=\"font-size:8px;color:#374151;\">Immigration status verified electronically via FDSH VLP</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">The federal data hub's immigration status check (VLP) is run first; if inconclusive or document number unavailable, SAVE is tried next. Paper documents (I-551, I-94, I-766) are only requested after both electronic checks return inconclusive.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">8 U.S.C. § 1611</div><div style=\"font-size:8px;color:#374151;\">Medicaid: immigration status verified electronically via FDSH VLP</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Non-qualified aliens are ineligible for federal public benefits. Medicaid verifies immigration status using the federal data hub's immigration status check (VLP) first, then falls back to SAVE if inconclusive. When electronic verification is inconclusive, acceptable document proofs include green card (I-551), I-94, or employment authorization card (I-766/I-688B).</div></div>\n<div style=\"position:absolute;left:533.0px;top:709.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">immigration Verification (save)</div></div>\n<div style=\"position:absolute;left:533.0px;top:726.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">[if VLP inconclusive or document number unavailable]<br></div>\n<div style=\"position:absolute;left:533.0px;top:769.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ call.completed</div></div>\n<div style=\"position:absolute;left:533.0px;top:786.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">One per service call; results arrive asynchronously and in any order</div>\n<div style=\"position:absolute;left:329.0px;top:831.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Verification status updated; electronic evidence appended</div>\n<div style=\"position:absolute;left:697.0px;top:895.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#AF121D;white-space:nowrap;\">⚠️ Send document request notice</div></div>\n<div class=\"int-hit\" data-int-id=\"g1\" style=\"position:absolute;left:697.0px;top:894px;width:492.0px;height:28px;transform:translateX(-50%);background:transparent;cursor:help;z-index:4;\"></div><div class=\"int-content\" data-int-id=\"g1\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#AF121D;\">⚠️ Gap</div><div style=\"font-size:8px;color:#374151;\">Communications needs verification category and program on the payload to select the right notice template; template catalog not yet designed</div></div>\n<div class=\"int-hit\" data-int-id=\"g2\" style=\"position:absolute;left:1065.0px;top:943.0px;transform:translate(-100%,0);text-align:right;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#AF121D;white-space:nowrap;z-index:4;cursor:help;\">⚠️ Document request notice sent to applicant</div><div class=\"int-content\" data-int-id=\"g2\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#AF121D;\">⚠️ Gap</div><div style=\"font-size:8px;color:#374151;\">Notice template catalog not yet designed</div></div>\n<div style=\"position:absolute;left:369.0px;top:1021.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.submitted</div></div>\n<div style=\"position:absolute;left:493.0px;top:1069.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Task created in intake queue; SLA and queue routing assigned</div>\n<div style=\"position:absolute;left:451.0px;top:1133.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.submitted</div></div>\n<div style=\"position:absolute;left:657.0px;top:1181.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Expedited screening initiated</div>\n<div style=\"position:absolute;left:451.0px;top:1267.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.expedited</div></div>\n<div style=\"position:absolute;left:329.0px;top:1315.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Set isExpedited = true on application</div>\n<div style=\"position:absolute;left:533.0px;top:1379.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z- \">Income is checked against federal tax data electronically (FDSH FTI) before requesting documentation from the applicant. Paper documentation (pay stubs, tax returns) may only be requested if the electronic check is inconclusive.</div></div>\n<div style=\"position:absolute;left:697.0px;top:1549.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">existing coverage check (fdsh_medicare, fdsh_vci)</div></div>\n<div class=\"int-hit\" data-int-id=\"r7\" style=\"position:absolute;left:750.2px;top:1555px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r7\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.916</div><div style=\"font-size:8px;color:#374151;\">Check for existing Medicare or Medicaid enrollment before starting verification — active coverage may allow auto-approval</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Two federal data hub checks must be performed before requesting documents from the applicant: one for existing Medicare enrollment and one for existing Medicaid or other health coverage. If active coverage is found, the application may be auto-approved without further verification. Otherwise, standard electronic verification continues.</div></div>\n<div style=\"position:absolute;left:697.0px;top:1593.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ call.completed</div></div>\n<div style=\"position:absolute;left:697.0px;top:1610.0px;transform index:3;\"><div style=\"font-size:9px;font-weight:600;color:#5650BE;white-space:nowrap;\">Claim task</div></div>\n<div style=\"position:absolute;left:605.0px;top:1048.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">API call to workflow</div>\n<div style=\"position:absolute;left:552.5px;top:1079.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Application status → pending_approval</div>\n<div style=\"position:absolute;left:416.0px;top:1119.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#2B1A78;white-space:nowrap;\">Reviews and approves or rejects determination</div></div>\n<div style=\"position:absolute;left:416.0px;top:1136.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#6b7280;max-width:220px;white-space:normal;z-index:3;\">On approval: application closes, workflow completes both tasks. On rejection: intake returns application to under_review; workflow calls return-to-worker on caseworker task</div>\n<div style=\"position:absolute;left:794.0px;top:1215.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#AF121D;white-space:nowrap;\">⚠️ Send Notice of Action</div></div>\n<div class=\"int-hit\" data-int-id=\"r1\" style=\"position:absolute;left:968.1px;top:1221px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:#E6EBF9;border:1px solid #C2C0E8;border-radius:3px;cursor:help;z-index:4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;color:#5650BE;\">&#9878;</div><div class=\"int-content\" data-int-id=\"r1\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">7 CFR § 273.2(h)</div><div style=\"font-size:8px;color:#374151;\">SNAP: written notice of eligibility or denial must be sent to each applicant household</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Notice must be sent within the 30-day processing deadline (7 days for expedited). Must include the eligibility decision, benefit amount if approved, or denial reason if denied.</div><div style=\"border-top:1px solid #e5e7eb;margin-top:4px;padding-top:4px;\"></div><div style=\"font-size:7.5px;font-weight:700;color:#2B1A78;\">42 CFR § 435.917</div><div style=\"font-size:8px;color:#374151;\">Medicaid: written notice of eligibility, denial, or termination required</div><div style=\"font-size:7.5px;color:#6b7280;font-style:italic;\">Notice must be sent within the 45-day processing deadline (90 days if disability determination required). Must state the decision, the reason, and the applicant's right to appeal.</div></div>\n<div class=\"int-hit\" data-int-id=\"g0\" style=\"position:absolute;left:794.0px;top:1214px;width:340.2px;height:28px;transform:translateX(-50%);background:transparent;cursor:help;z-index:4;\"></div><div class=\"int-content\" data-int-id=\"g0\" style=\"display:none;\"><div style=\"font-size:7.5px;font-weight:700;color:#AF121D;\">⚠️ Gap</div><div style=\"font-size:8px;color:#374151;\">Notice template catalog not yet designed</div></div>\n<div style=\"position:absolute;left:888.5px;top:1259.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.closed</div></div>\n<div style=\"position:absolute;left:1224.5px;top:1307.0px;transform:translate(-100%,0);text-align:right;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Creates case</div>\n<div style=\"position:absolute;left:605.0px;top:1347.0px;transform:translate(-50%,0);text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;z-index:3;\"><div style=\"font-size:9px;font-weight:600;color:#00AD93;white-space:nowrap;\">⚡ application.closed</div></div>\n<div style=\"position:absolute;left:741.5px;top:1395.0px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:600;color:#6b7280;white-space:nowrap;z-index:3;\">Completes or cancels open tasks: pending_review task → completed (approval path); in_progress task → completed (manual path); pending task → cancelled (auto-determination path)</div>\n</div>"
    };

    let current = '__overview__';
    const wrapper = document.getElementById('map-wrapper');

    // Shared cursor-following tooltip for integration details on domain detail pages.
    // position:fixed keeps it relative to the viewport and never causes document scroll.
    const intTooltip = document.createElement('div');
    intTooltip.id = 'int-tooltip';
    intTooltip.style.cssText = [
      'position:fixed', 'display:none', 'pointer-events:none',
      "font-family:'Helvetica Neue',Helvetica,Arial,sans-serif",
      'font-size:8.5px', 'line-height:1.65', 'white-space:nowrap',
      'z-index:9999', 'background:white', 'border:1px solid #E9CCBE',
      'border-radius:5px', 'padding:5px 8px',
      'box-shadow:0 2px 8px rgba(0,0,0,0.12)'
    ].join(';');
    document.body.appendChild(intTooltip);

    // Scale the diagram to fill the available viewport width.
    // transform: scale() keeps internal coordinates at 1400px; marginBottom compensates
    // for the layout gap (scale < 1) or extension (scale > 1) left by the transform.
    // Formula: offsetHeight * (scale - 1) is naturally negative below 1, positive above.
    function fitDiagram() {
      // outerWidth is the physical window size, unaffected by browser zoom level.
      // clientWidth shrinks when the user zooms in, which fights the browser's
      // native zoom and pushes the diagram off-screen. outerWidth stays constant
      // across zoom changes and only changes when the window is actually resized.
      // Content must stay at x ≤ ~1360 to avoid clipping from the ~20px gap
      // between outerWidth (includes OS chrome) and innerWidth (visible viewport).
      const scale = window.outerWidth / 1400;
      wrapper.style.transform = 'scale(' + scale + ')';
      wrapper.style.marginBottom = Math.round(wrapper.offsetHeight * (scale - 1)) + 'px';
    }

    function navigate(id) {
      if (!CONTENT[id]) return;
      current = id;
      intTooltip.style.display = 'none';
      wrapper.innerHTML = CONTENT[id];
      fitDiagram();
      window.scrollTo(0, 0);

      wrapper.querySelectorAll('[data-navigate]').forEach(el => {
        el.addEventListener('click', () => navigate(el.getAttribute('data-navigate')));
      });

      // Map content by id for O(1) lookup
      const intContent = {};
      wrapper.querySelectorAll('.int-content').forEach(el => {
        intContent[el.dataset.intId] = el.innerHTML;
      });

      // Wire up cursor-following tooltip on connection hit areas
      wrapper.querySelectorAll('.int-hit').forEach(el => {
        const html = intContent[el.dataset.intId] || '';
        if (!html) return;
        el.addEventListener('mouseenter', () => {
          intTooltip.innerHTML = html;
          intTooltip.style.display = 'block';
        });
        el.addEventListener('mousemove', e => {
          intTooltip.style.left = (e.clientX + 16) + 'px';
          intTooltip.style.top  = (e.clientY + 10) + 'px';
        });
        el.addEventListener('mouseleave', () => {
          intTooltip.style.display = 'none';
        });
      });
    }

    navigate('domains');
    window.addEventListener('resize', fitDiagram);
  </script>
